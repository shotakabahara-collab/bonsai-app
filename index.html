<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#09100c"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="BONSAI"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon.svg"><title>BONSAI</title><style>html,body{min-height:100%;margin:0;background:#09100c;color:#eee8da;font-family:-apple-system,BlinkMacSystemFont,sans-serif}main{min-height:100vh;min-height:100dvh;display:grid;place-content:center;gap:14px;padding:32px;text-align:center}strong{font:32px Georgia,serif;letter-spacing:.24em}p{margin:0;color:#9daa9f;font-size:13px;line-height:1.7}a{display:block;border-radius:14px;padding:14px;background:#eee8da;color:#101611;text-decoration:none;font-weight:700}</style></head><body><main><strong>BONSAI</strong><p id="status">作品を安全に読み込んでいます…</p><a id="repair" href="./recovery-v4.html" hidden>起動を修復する</a></main><script>(function(){'use strict';function normalize(){var KEY='bonsai_live_1',raw=null;try{raw=JSON.parse(localStorage.getItem(KEY)||'null')}catch(e){try{localStorage.setItem(KEY+'_corrupt_backup',localStorage.getItem(KEY)||'')}catch(_){}}var x=raw&&typeof raw==='object'&&!Array.isArray(raw)?raw:{};var n={started:false,name:'あなた',mentor:0,sp:'pine',tree:'',born:Date.now(),water:80,last:Date.now(),vit:84,stress:2,prune:0,wire:0,fert:0,pot:'starter',money:5000,rep:0,owned:['starter'],awards:[],log:[],lastWeek:'',stats:{water:0,prune:0,wire:0,shows:0}};Object.assign(n,x);var species={pine:1,maple:1,azalea:1};if(!species[n.sp])n.sp='pine';var pots={starter:1,blue:1,black:1,moon:1,old:1};if(!pots[n.pot])n.pot='starter';n.mentor=Math.max(0,Math.min(6,Number.isFinite(Number(n.mentor))?Math.trunc(Number(n.mentor)):0));n.stats=Object.assign({water:0,prune:0,wire:0,shows:0},x.stats&&typeof x.stats==='object'?x.stats:{});n.owned=Array.isArray(x.owned)?x.owned.filter(function(v){return pots[v]}):['starter'];if(n.owned.indexOf('starter')<0)n.owned.unshift('starter');if(n.owned.indexOf(n.pot)<0)n.owned.push(n.pot);n.awards=Array.isArray(x.awards)?x.awards:[];n.log=Array.isArray(x.log)?x.log:[];['born','water','last','vit','stress','prune','wire','fert','money','rep'].forEach(function(k){var v=Number(n[k]);if(!Number.isFinite(v))n[k]={born:Date.now(),water:80,last:Date.now(),vit:84,stress:2,prune:0,wire:0,fert:0,money:5000,rep:0}[k]});n.started=n.started===true;n.name=String(n.name||'あなた');n.tree=String(n.tree||'');n.lastWeek=typeof n.lastWeek==='string'?n.lastWeek:'';localStorage.setItem(KEY,JSON.stringify(n));return n}var status=document.getElementById('status'),repair=document.getElementById('repair');function fail(){status.textContent='起動キャッシュを修復してください。';repair.hidden=false}try{normalize();var version='ios-recovery-v4';var seen=localStorage.getItem('__bonsai_launch_version');var query=new URL(location.href).searchParams;if(seen!==version||query.get('repair')==='1'){Promise.resolve().then(async function(){try{if('serviceWorker'in navigator){var regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(function(r){return r.unregister()}))}if('caches'in window){var names=await caches.keys();await Promise.all(names.map(function(n){return caches.delete(n)}))}}catch(e){}localStorage.setItem('__bonsai_launch_version',version);location.replace('./app.html?v='+version+'&t='+Date.now())}).catch(fail)}else{location.replace('./app.html?v='+version+'&t='+Date.now())}setTimeout(fail,10000)}catch(e){fail()}})();</script></body></html>
