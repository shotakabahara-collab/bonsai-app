<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#09100c"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="BONSAI"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon.svg"><title>BONSAI</title><style>
*{box-sizing:border-box}body{margin:0;background:#09100c;color:#eee8da;font-family:-apple-system,sans-serif}.app{max-width:700px;margin:auto;padding:12px 12px 84px}.top{display:flex;justify-content:space-between;align-items:center;padding:8px 2px 14px}.logo{font:22px Georgia;letter-spacing:.22em}.small{font-size:10px;color:#9daa9f}.card,.item{background:#152119;border:1px solid #ffffff18;border-radius:20px}.card{overflow:hidden}.head{padding:14px}.head h1,.page h1{font:26px Georgia;margin:4px 0}.badge{display:inline-block;padding:5px 8px;border:1px solid #d9b77b55;border-radius:99px;color:#e9c991;font-size:9px}.stage{height:320px;position:relative;background:radial-gradient(circle at 50% 24%,#b8cab322,transparent 42%),linear-gradient(180deg,#1b2b21,#0d1711 70%,#08100b);display:grid;place-items:center}.tree{width:100%;height:100%}.metrics{position:absolute;bottom:8px;left:8px;right:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.metric{background:#08100bcc;border:1px solid #ffffff18;border-radius:12px;padding:7px;text-align:center}.metric b{display:block}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px}.actions button,.btn{border:1px solid #ffffff18;border-radius:13px;background:#ffffff0d;color:#eee8da;padding:12px}.actions button span{font-size:21px;display:block}.mentor{margin:10px 0;padding:12px;border-left:2px solid #d9b77b;background:#d9b77b10}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.item{padding:13px;margin-bottom:8px}.gold{color:#d9b77b;font:24px Georgia}.nav{position:fixed;bottom:0;left:0;right:0;background:#071009ee;border-top:1px solid #ffffff18;display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}.nav button{border:0;background:none;color:#94a096;padding:9px 2px;font-size:9px}.nav button.on{color:white}.nav span{font-size:18px;display:block}.potgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pot{text-align:center}.potshape{width:88px;height:34px;margin:10px auto;border-radius:4px 4px 22px 22px;background:var(--c)}.person{display:grid;grid-template-columns:55px 1fr;gap:10px}.face{width:55px;height:55px;border-radius:50%;background:#7f5c49;display:grid;place-items:center;font-size:31px}.quote{font:12px Georgia;line-height:1.6}.modal{position:fixed;inset:0;background:#000b;display:flex;align-items:flex-end;z-index:20}.sheet{background:#152119;border-radius:24px 24px 0 0;padding:18px;width:100%;max-width:700px;margin:auto}.primary{width:100%;border:0;border-radius:13px;padding:13px;background:#eee8da;color:#101611;font-weight:bold;margin-top:8px}.danger{background:#8b3e35;color:white}.onboard{min-height:100vh;padding:40px 16px;max-width:700px;margin:auto}.onboard h1{font:38px Georgia;letter-spacing:.2em}.choice{width:100%;display:flex;gap:12px;align-items:center;text-align:left;background:#152119;color:white;border:1px solid #ffffff18;border-radius:15px;padding:10px;margin:6px 0}.choice.on{border-color:#d9b77b}.choice span{font-size:32px}.input{width:100%;padding:12px;border-radius:12px;border:1px solid #ffffff18;background:#ffffff0d;color:white;margin-top:8px}.wall{position:fixed;inset:0;background:#071009;z-index:30;display:grid;place-items:center}.wall button{position:absolute;bottom:25px}.rank{display:grid;grid-template-columns:28px 1fr 42px}.you{border-color:#d9b77b}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:white;color:#111;padding:9px 13px;border-radius:99px;z-index:40}@media(max-width:370px){.grid,.potgrid{grid-template-columns:1fr}}
.photo-bonsai{position:relative;width:100%;height:100%;margin:0;overflow:hidden;background:#08100b}.photo-bonsai img{width:100%;height:100%;display:block;object-fit:cover;object-position:center 48%;filter:saturate(.94) contrast(1.06) brightness(.9)}.photo-bonsai:after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 43%,transparent 42%,rgba(3,8,5,.28) 82%,rgba(2,5,3,.62) 100%),linear-gradient(180deg,rgba(255,255,255,.04),transparent 24%,rgba(0,0,0,.3));box-shadow:inset 0 0 0 1px rgba(218,193,146,.12)}.wall .photo-bonsai{width:min(94vw,700px);height:min(86vh,900px);border-radius:24px;box-shadow:0 35px 90px rgba(0,0,0,.7)}</style></head><body><div id="root"></div><script src="photo-assets.js"></script><script src="photo-source-v2.js"></script><script src="tree-renderer.js"></script><script>
(()=>{'use strict';const KEY='bonsai_live_1',DAY=8640000;const SP={pine:['黒松','🌲','#365f40',[86,78,82,92],1.7],maple:['山もみじ','🍁','#6d9c65',[94,72,100,84],2.3],azalea:['皐月','🌸','#58835b',[100,80,74,68],2.1]},POTS=[['starter','素焼き入門鉢',0,72,'#8d6043'],['blue','青嵐釉楕円鉢',1800,88,'#477b7b'],['black','黒土長方鉢',3400,92,'#302b28'],['moon','月光白釉鉢',7200,95,'#b5b0a3'],['old','古渡・琥珀鉢',15000,98,'#895433']],PEOPLE=[['榊 玄斎','古典盆栽・宗匠','👴','枝を切るな。迷いを切れ。'],['水城 志乃','季節盆栽作家','👩','どこで咲かせるかが作品になる。'],['橘 蓮','現代盆栽アーティスト','🧑','作品は更新するものだ。'],['岩城 岳斗','松柏専門・若手筆頭','👨','派手さはいらん。幹を見ろ。'],['三嶋 宗一郎','全国樹藝会 審査長','🧓','十年後にも立つ姿か。'],['牧村 玲二','樹藝評論家','🧔','技術はある。だが景色がない。'],['東雲 崇','名木コレクター','🤵','手放せない理由を買いたい。']];const base=()=>({started:false,name:'あなた',mentor:0,sp:'pine',tree:'',born:Date.now(),water:80,last:Date.now(),vit:84,stress:2,prune:0,wire:0,fert:0,pot:'starter',money:5000,rep:0,owned:['starter'],awards:[],log:[],lastWeek:'',stats:{water:0,prune:0,wire:0,shows:0}});let s;try{s={...base(),...JSON.parse(localStorage.getItem(KEY)||'null')}}catch{s=base()}let tab='home',modal='',wall=false,toast='';const save=()=>localStorage.setItem(KEY,JSON.stringify(s)),days=()=>Math.max(0,(Date.now()-s.born)/DAY*10),season=()=>Math.floor(days()%360/90),week=()=>{let d=new Date(),j=new Date(d.getFullYear(),0,1);return`${d.getFullYear()}-${Math.ceil(((d-j)/DAY+j.getDay()+1)/7)}`},rank=()=>s.rep>=450?'名匠':s.rep>=250?'盆栽作家':s.rep>=120?'一級盆栽師':s.rep>=60?'若手盆栽師':'若木の友',d=()=>{let h=(Date.now()-s.last)/36e5,w=Math.max(0,s.water-h*SP[s.sp][4]),s2=Math.max(0,s.stress-days()*.02),v=Math.max(0,Math.min(100,s.vit-Math.max(0,35-w)*.34-s2*.13+s.fert)),m=Math.min(100,10+Math.log10(days()+1)*24+s.prune*4+s.wire*3);return{w,v,m,s:s2}},log=x=>{s.log.unshift({at:Date.now(),x});s.log=s.log.slice(0,50)},flash=x=>{toast=x;render();setTimeout(()=>{toast='';render()},1900)},esc=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function care(t){if(t==='water'){s.water=100;s.last=Date.now();s.vit=Math.min(100,s.vit+2);s.stats.water++;log('土の乾きを見て水を与えた。')}if(t==='wire'){s.wire++;s.stress+=6;s.stats.wire++;log('針金で枝の流れを整えた。')}if(t==='fert'){s.fert=Math.min(8,s.fert+1);s.stress+=2;log('施肥を行い樹勢を支えた。')}save();flash('手入れを記録しました')}function confirmPrune(){s.prune++;s.stats.prune++;s.stress+=12;s.vit=Math.max(0,s.vit-2);log(`第${s.prune}回の剪定を確定。不可逆の決断。`);modal='';save();flash('切った枝は戻りません')}function pot(id){let p=POTS.find(x=>x[0]===id);if(!s.owned.includes(id)){if(s.money<p[2])return flash('資金不足です');s.money-=p[2];s.owned.push(id)}s.pot=id;log(`${p[1]}へ鉢替えした。`);save();render()}function score(){let x=d(),p=POTS.find(p=>p[0]===s.pot);return Math.min(99,Math.max(20,Math.round(x.v*.2+x.m*.24+p[3]*.2+SP[s.sp][3][season()]*.18+Math.min(100,s.prune*7+s.wire*5)*.18)))}function rivals(){let n=[['橘 蓮','現代の余白',3],['岩城 岳斗','幹を読む者',5],['翠川みのり','紅葉を待つ人',0],['風間宗樹','松柏の旅人',2],['花守あかり','季節の編者',-2],['結城庵','古鉢蒐集家',3]],z=[...week()].reduce((a,c)=>a+c.charCodeAt(),0);return n.map((x,i)=>({name:x[0],title:x[1],score:60+(z*(i+3)*17)%29+x[2]}))}function enterShow(){if(s.lastWeek===week())return flash('今週は出展済み');let me=score(),field=[...rivals(),{name:s.name,title:rank(),score:me,you:true}].sort((a,b)=>b.score-a.score),r=field.findIndex(x=>x.you)+1,award=r===1?'金賞':r<=3?'優秀賞':me>=72?'入選':'選外';s.money+=r===1?5000:r<=3?2500:me>=72?900:250;s.rep+=r===1?45:r<=3?25:me>=72?10:3;s.stats.shows++;s.lastWeek=week();s.awards.unshift({at:Date.now(),score:me,rank:r,award,field});log(`${award}。${field.length}作品中${r}位、${me}点。`);save();modal='result';render()}function svg(){if(s.sp==='pine'&&window.BonsaiPhotos&&window.BonsaiPhotos.pine){return `<figure class="photo-bonsai"><img src="${window.BonsaiPhotos.pine}" alt="実写品質で撮影された黒松盆栽" draggable="false"></figure>`}return window.BonsaiVisual.render(s,SP,POTS,season(),d())}function home(){let x=d(),tip=x.w<45?'土が乾いている。水を急げ。':x.s>30?'今は触らず回復を待て。':'急いで完成させるな。十年後の姿を見ろ。';return`<div class="card"><div class="head"><span class="badge">${rank()}</span><h1>${esc(s.tree)}</h1><div class="small">${SP[s.sp][0]}・樹齢${days().toFixed(1)}年・${POTS.find(p=>p[0]===s.pot)[1]}</div></div><div class="stage">${svg()}<div class="metrics"><div class="metric"><b>${Math.round(x.w)}%</b><span>水分</span></div><div class="metric"><b>${Math.round(x.v)}%</b><span>樹勢</span></div><div class="metric"><b>${Math.round(x.m)}%</b><span>作品性</span></div></div></div><div class="actions"><button data-care="water"><span>💧</span>水</button><button data-prune><span>✂️</span>剪定</button><button data-care="wire"><span>🪢</span>針金</button><button data-care="fert"><span>🌿</span>施肥</button></div></div><div class="mentor"><b>師匠 ${PEOPLE[s.mentor][0]}</b><div class="small">「${tip}」</div></div><div class="grid"><div class="item"><div class="small">名声</div><div class="gold">${s.rep}</div></div><div class="item"><div class="small">大会出展</div><div class="gold">${s.stats.shows}</div></div></div><button class="btn" data-wall>盆栽と鉢だけで鑑賞</button>`}function pots(){return`<div class="page"><h1>鉢蔵</h1><p class="small">木との調和が作品価値を左右します。</p><div class="potgrid">${POTS.map(p=>`<div class="item pot ${s.pot===p[0]?'you':''}" style="--c:${p[4]}"><div class="potshape"></div><b>${p[1]}</b><div class="small">相性${p[3]}・${p[2]?p[2].toLocaleString()+'円':'無料'}</div><button class="btn" data-pot="${p[0]}">${s.pot===p[0]?'使用中':s.owned.includes(p[0])?'替える':'購入'}</button></div>`).join('')}</div></div>`}function show(){return`<div class="page"><h1>週次展覧会</h1><p class="small">同時ログイン不要。他の盆栽師の作品と同じ会場へ出展します。</p><div class="item"><span class="badge">${week()}</span><h2>四季盆栽公募展</h2><div class="gold">予測 ${score()}点</div><button class="primary" data-enter ${s.lastWeek===week()?'disabled':''}>${s.lastWeek===week()?'今週は出展済み':'出展する'}</button></div>${rivals().sort((a,b)=>b.score-a.score).slice(0,5).map((r,i)=>`<div class="item rank"><b>${i+1}</b><div>${r.name}<div class="small">${r.title}</div></div><b>${r.score}</b></div>`).join('')}</div>`}function persons(){return`<div class="page"><h1>人物録</h1>${PEOPLE.map(p=>`<div class="item person"><div class="face">${p[2]}</div><div><b>${p[0]}</b><div class="small">${p[1]}</div><div class="quote">「${p[3]}」</div></div></div>`).join('')}</div>`}function memorial(){return`<div class="page"><h1>銘木録</h1><div class="card"><div class="stage" style="height:250px">${svg()}</div><div class="head"><h2>${esc(s.tree)}</h2><div class="small">${SP[s.sp][0]}・${rank()} ${esc(s.name)}</div></div></div><h2>受賞歴</h2>${s.awards.length?s.awards.map(a=>`<div class="item">🏅 <b>${a.award}</b><div class="small">${a.score}点・${a.rank}位</div></div>`).join(''):'<div class="item small">まだ受賞歴はありません。</div>'}<h2>生涯年表</h2>${s.log.map(e=>`<div class="item"><div class="small">${new Date(e.at).toLocaleString('ja-JP')}</div>${esc(e.x)}</div>`).join('')}</div>`}function modalHtml(){if(modal==='prune')return`<div class="modal"><div class="sheet"><span class="badge">不可逆の作業</span><h2>剪定を確定しますか</h2><p>剪定後は取り消せません。切った枝は戻りません。</p><button class="primary danger" data-confirm>剪定を確定</button><button class="btn" data-close>まだ切らない</button></div></div>`;if(modal==='result'){let a=s.awards[0];return`<div class="modal"><div class="sheet"><span class="badge">RESULT</span><h2>${a.award}</h2><div class="gold">${a.score}点・${a.rank}位</div>${a.field.slice(0,6).map((r,i)=>`<div class="item rank ${r.you?'you':''}"><b>${i+1}</b><div>${r.name}<div class="small">${r.title}</div></div><b>${r.score}</b></div>`).join('')}<button class="primary" data-close>銘木録へ保存</button></div></div>`}return''}function onboard(){return`<div class="onboard"><h1>BONSAI</h1><p>育てた時間が、作品になる。</p><h2>最初の一樹</h2>${Object.entries(SP).map(([id,x])=>`<button class="choice ${s.sp===id?'on':''}" data-sp="${id}"><span>${x[1]}</span><div><b>${x[0]}</b><div class="small">${id==='pine'?'幹と古木感':id==='maple'?'四季と枝作り':'花と展示'}</div></div></button>`).join('')}<h2>師匠</h2>${[0,1].map(i=>`<button class="choice ${s.mentor===i?'on':''}" data-mentor="${i}"><span>${PEOPLE[i][2]}</span><div><b>${PEOPLE[i][0]}</b><div class="small">${PEOPLE[i][3]}</div></div></button>`).join('')}<input id="name" class="input" value="${esc(s.name)}" placeholder="盆栽師名"><input id="tree" class="input" value="${esc(s.tree||SP[s.sp][0]+'・若樹')}" placeholder="盆栽の銘"><button class="primary" data-start>育成を始める</button></div>`}function render(){let r=document.getElementById('root');if(!s.started){r.innerHTML=onboard();bind();return}let body=tab==='home'?home():tab==='pots'?pots():tab==='show'?show():tab==='people'?persons():memorial();r.innerHTML=`<div class="app"><div class="top"><div><div class="logo">BONSAI</div><div class="small">${rank()}・${esc(s.name)}</div></div><b>¥${s.money.toLocaleString()}</b></div>${body}<div class="nav">${[['home','🌿','育成'],['pots','🏺','鉢'],['show','🏆','大会'],['people','👥','人物'],['memorial','📜','銘木録']].map(n=>`<button class="${tab===n[0]?'on':''}" data-tab="${n[0]}"><span>${n[1]}</span>${n[2]}</button>`).join('')}</div>${modalHtml()}${wall?`<div class="wall">${svg()}<button class="btn" data-wall>終了</button></div>`:''}${toast?`<div class="toast">${toast}</div>`:''}</div>`;bind()}function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;location.hash=tab;render()});document.querySelectorAll('[data-care]').forEach(b=>b.onclick=()=>care(b.dataset.care));document.querySelectorAll('[data-pot]').forEach(b=>b.onclick=()=>pot(b.dataset.pot));document.querySelectorAll('[data-sp]').forEach(b=>b.onclick=()=>{s.sp=b.dataset.sp;render()});document.querySelectorAll('[data-mentor]').forEach(b=>b.onclick=()=>{s.mentor=+b.dataset.mentor;render()});document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{modal='';render()});document.querySelectorAll('[data-wall]').forEach(b=>b.onclick=()=>{wall=!wall;render()});let x=document.querySelector('[data-prune]');if(x)x.onclick=()=>{modal='prune';render()};x=document.querySelector('[data-confirm]');if(x)x.onclick=confirmPrune;x=document.querySelector('[data-enter]');if(x)x.onclick=enterShow;x=document.querySelector('[data-start]');if(x)x.onclick=()=>{s.name=document.getElementById('name').value||'あなた';s.tree=document.getElementById('tree').value||SP[s.sp][0]+'・若樹';s.started=true;s.born=Date.now();log(`${s.tree}を迎え、${PEOPLE[s.mentor][0]}へ入門した。`);save();render()}}if(location.hash)tab=location.hash.slice(1);addEventListener('hashchange',()=>{tab=location.hash.slice(1)||'home';render()});if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));setInterval(()=>s.started&&render(),60000);render()})();
</script><script src="advanced-care.js"></script><script src="advanced-care-bridge.js"></script><script src="completion-core.js"></script><script src="judging-engine.js"></script><script src="state-image-runtime.js"></script></body></html>
