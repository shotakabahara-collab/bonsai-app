<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#09100c"><title>BONSAI 起動修復</title><style>html,body{min-height:100%;margin:0;background:#09100c;color:#eee8da;font-family:-apple-system,BlinkMacSystemFont,sans-serif}main{max-width:560px;min-height:100vh;min-height:100dvh;margin:auto;display:grid;align-content:center;gap:14px;padding:28px}h1{font:31px Georgia,serif;letter-spacing:.18em;margin:0}p{color:#aeb9b0;line-height:1.75;margin:0}.box{padding:15px;border:1px solid #ffffff20;border-radius:15px;background:#152119}button,a{border:0;border-radius:14px;padding:14px 17px;background:#eee8da;color:#101611;text-decoration:none;font-weight:700;text-align:center;font-size:15px}.secondary{background:#ffffff10;color:#eee8da;border:1px solid #ffffff20}</style></head><body><main><h1>BONSAI</h1><p>セーブデータは残したまま、古いキャッシュとService Workerだけを削除します。</p><div class="box" id="save-status">セーブデータを確認しています…</div><button id="repair">起動キャッシュを修復</button><a class="secondary" href="./app.html?v=ios-recovery-v4&direct=1">修復せず直接開く</a></main><script>(function(){'use strict';function normalize(){var KEY='bonsai_live_1',raw=null;try{raw=JSON.parse(localStorage.getItem(KEY)||'null')}catch(e){try{localStorage.setItem(KEY+'_corrupt_backup',localStorage.getItem(KEY)||'')}catch(_){}}var x=raw&&typeof raw==='object'&&!Array.isArray(raw)?raw:{};var n={started:false,name:'あなた',mentor:0,sp:'pine',tree:'',born:Date.now(),water:80,last:Date.now(),vit:84,stress:2,prune:0,wire:0,fert:0,pot:'starter',money:5000,rep:0,owned:['starter'],awards:[],log:[],lastWeek:'',stats:{water:0,prune:0,wire:0,shows:0}};Object.assign(n,x);var species={pine:1,maple:1,azalea:1};if(!species[n.sp])n.sp='pine';var pots={starter:1,blue:1,black:1,moon:1,old:1};if(!pots[n.pot])n.pot='starter';n.mentor=Math.max(0,Math.min(6,Number.isFinite(Number(n.mentor))?Math.trunc(Number(n.mentor)):0));n.stats=Object.assign({water:0,prune:0,wire:0,shows:0},x.stats&&typeof x.stats==='object'?x.stats:{});n.owned=Array.isArray(x.owned)?x.owned.filter(function(v){return pots[v]}):['starter'];if(n.owned.indexOf('starter')<0)n.owned.unshift('starter');if(n.owned.indexOf(n.pot)<0)n.owned.push(n.pot);n.awards=Array.isArray(x.awards)?x.awards:[];n.log=Array.isArray(x.log)?x.log:[];['born','water','last','vit','stress','prune','wire','fert','money','rep'].forEach(function(k){var v=Number(n[k]);if(!Number.isFinite(v))n[k]={born:Date.now(),water:80,last:Date.now(),vit:84,stress:2,prune:0,wire:0,fert:0,money:5000,rep:0}[k]});n.started=n.started===true;n.name=String(n.name||'あなた');n.tree=String(n.tree||'');n.lastWeek=typeof n.lastWeek==='string'?n.lastWeek:'';localStorage.setItem(KEY,JSON.stringify(n));return n}var raw=localStorage.getItem('bonsai_live_1')||'';document.getElementById('save-status').textContent=raw?'セーブデータを検出しました（'+raw.length+'文字）。修復後も保持します。':'セーブデータはまだありません。';document.getElementById('repair').onclick=async function(){this.disabled=true;this.textContent='修復しています…';try{normalize();if('serviceWorker'in navigator){var regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(function(r){return r.unregister()}))}if('caches'in window){var names=await caches.keys();await Promise.all(names.map(function(n){return caches.delete(n)}))}}catch(e){}localStorage.setItem('__bonsai_launch_version','ios-recovery-v4');location.replace('./app.html?v=ios-recovery-v4&recovered=1&t='+Date.now())}})();</script></body></html>
