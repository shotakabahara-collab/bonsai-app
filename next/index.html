<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07100b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BONSAI" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%BASE_URL%icon.svg" />
    <title>BONSAI</title>
    <style>
      html,body,#root{min-height:100%;margin:0;background:#07100b;color:#f1eadb}
      .boot-shell{min-height:100vh;min-height:100dvh;display:grid;place-content:center;gap:14px;padding:32px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif}
      .boot-shell strong{font:32px Georgia,serif;letter-spacing:.25em}.boot-shell span{color:#91a094;font-size:12px}
      .boot-line{width:168px;height:2px;border-radius:99px;background:#ffffff12;overflow:hidden;margin:auto}.boot-line:after{content:"";display:block;width:42%;height:100%;background:#d6b777;animation:boot 1.1s ease-in-out infinite alternate}@keyframes boot{from{transform:translateX(-100%)}to{transform:translateX(240%)}}
    </style>
  </head>
  <body>
    <div id="root"><main class="boot-shell"><strong>BONSAI</strong><span>作品を読み込んでいます</span><div class="boot-line"></div></main></div>
    <script src="%BASE_URL%photo-assets.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
