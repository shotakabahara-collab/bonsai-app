name: Patch iPhone hotfix normalized-state persistence

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-ios-hotfix-persistence.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Persist the normalized state before first render
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/hotfix-ios-white-screen.yml')
          text = path.read_text(encoding='utf-8')
          old = "n.tree=String(n.tree||'');return n};let s;try{s=normalizeSavedState(JSON.parse(localStorage.getItem(KEY)||'null'))}catch{s=base()}"
          new = "n.tree=String(n.tree||'');return n};let s;try{s=normalizeSavedState(JSON.parse(localStorage.getItem(KEY)||'null'));localStorage.setItem(KEY,JSON.stringify(s))}catch{s=base()}"
          if new not in text:
              if old not in text:
                  raise SystemExit('normalized-state workflow marker missing')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit and trigger the corrected recovery workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/hotfix-ios-white-screen.yml
          git diff --cached --quiet && exit 0
          git commit -m '正規化した保存データを初回起動時に確定'
          git push origin HEAD:main
