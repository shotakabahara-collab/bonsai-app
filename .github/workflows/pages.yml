name: Test and Deploy BONSAI
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate app and irreversible pruning
        run: |
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const scripts=[...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
          if(!scripts.length) throw Error('inline app missing');
          new vm.Script(scripts.at(-1)[1],{filename:'bonsai.js'});
          for(const x of ['confirmPrune','剪定後は取り消せません','enterShow','銘木録','localStorage'])if(!html.includes(x))throw Error('missing '+x);
          const m=JSON.parse(fs.readFileSync('manifest.webmanifest','utf8'));
          if(m.short_name!=='BONSAI'||m.display!=='standalone')throw Error('manifest invalid');
          console.log('BONSAI validation: PASS');
          NODE
      - name: Static HTTP smoke
        run: |
          python3 -m http.server 4173 >/tmp/http.log 2>&1 &
          server=$!; trap 'kill $server' EXIT
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:4173/ >/tmp/index.html && break; sleep .2; done
          grep -Fq '<title>BONSAI</title>' /tmp/index.html
          curl -fsS http://127.0.0.1:4173/manifest.webmanifest | grep -Fq 'BONSAI'
          curl -fsS http://127.0.0.1:4173/sw.js | grep -Fq 'bonsai-live-v1'
  deploy:
    needs: verify
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify published app
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          base="${PAGE_URL%/}/"
          curl --fail --silent --show-error --retry 10 --retry-all-errors "$base" -o /tmp/live.html
          grep -Fq '<title>BONSAI</title>' /tmp/live.html
          curl --fail --silent --show-error --retry 10 --retry-all-errors "${base}manifest.webmanifest" | grep -Fq 'BONSAI'
  record:
    if: always()
    needs: [verify, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const passed = process.env.VERIFY_RESULT === 'success' && process.env.DEPLOY_RESULT === 'success';
            const pageUrl = process.env.PAGE_URL || 'https://shotakabahara-collab.github.io/bonsai-app/';
            const body = [
              '# BONSAI release audit',
              '',
              `- 記録日時: ${new Date().toISOString()}`,
              `- main SHA: \`${context.sha}\``,
              `- verify: ${process.env.VERIFY_RESULT || 'unknown'}`,
              `- deploy + post-deploy smoke: ${process.env.DEPLOY_RESULT || 'unknown'}`,
              `- Pages URL: ${pageUrl}`,
              '',
              passed
                ? '公開検査はPASSです。iPhoneのSafariでPages URLを開き、ホーム画面に追加できます。'
                : '検査または公開に失敗しています。Actionsログを確認してください。'
            ].join('\n');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: `BONSAI release audit: ${passed ? 'PASS' : 'FAIL'}`,
              body,
              state: passed ? 'closed' : 'open',
              ...(passed ? {state_reason: 'completed'} : {})
            });
