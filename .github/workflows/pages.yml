name: Test and Deploy BONSAI
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate app and irreversible pruning
        run: |
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const scripts=[...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
          if(!scripts.length) throw Error('inline app missing');
          new vm.Script(scripts.at(-1)[1],{filename:'bonsai.js'});
          for(const x of ['confirmPrune','剪定後は取り消せません','enterShow','銘木録','localStorage'])if(!html.includes(x))throw Error('missing '+x);
          const m=JSON.parse(fs.readFileSync('manifest.webmanifest','utf8'));
          if(m.short_name!=='BONSAI'||m.display!=='standalone')throw Error('manifest invalid');
          console.log('BONSAI validation: PASS');
          NODE
      - name: Static HTTP smoke
        run: |
          python3 -m http.server 4173 >/tmp/http.log 2>&1 &
          server=$!; trap 'kill $server' EXIT
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:4173/ >/tmp/index.html && break; sleep .2; done
          grep -Fq '<title>BONSAI</title>' /tmp/index.html
          curl -fsS http://127.0.0.1:4173/manifest.webmanifest | grep -Fq 'BONSAI'
          curl -fsS http://127.0.0.1:4173/sw.js | grep -Fq 'bonsai-live-v1'
  deploy:
    needs: verify
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        id: artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy Pages
        id: deployment
        if: steps.artifact.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Verify published app
        id: smoke
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          base="${PAGE_URL%/}/"
          curl --fail --silent --show-error --retry 12 --retry-delay 3 --retry-all-errors "$base" -o /tmp/live.html
          grep -Fq '<title>BONSAI</title>' /tmp/live.html
          curl --fail --silent --show-error --retry 12 --retry-delay 3 --retry-all-errors "${base}manifest.webmanifest" | grep -Fq 'BONSAI'
      - name: Record detailed deployment audit
        if: always()
        uses: actions/github-script@v7
        env:
          CONFIGURE: ${{ steps.configure.outcome }}
          ARTIFACT: ${{ steps.artifact.outcome }}
          DEPLOY: ${{ steps.deployment.outcome }}
          SMOKE: ${{ steps.smoke.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const outcomes = {
              configure: process.env.CONFIGURE || 'not-run',
              artifact: process.env.ARTIFACT || 'not-run',
              deploy: process.env.DEPLOY || 'not-run',
              smoke: process.env.SMOKE || 'not-run'
            };
            const passed = Object.values(outcomes).every(value => value === 'success');
            const pageUrl = process.env.PAGE_URL || 'https://shotakabahara-collab.github.io/bonsai-app/';
            const body = [
              '# BONSAI release audit',
              '',
              `- 記録日時: ${new Date().toISOString()}`,
              `- main SHA: \`${context.sha}\``,
              '- verify: success',
              `- configure Pages: ${outcomes.configure}`,
              `- upload artifact: ${outcomes.artifact}`,
              `- deploy Pages: ${outcomes.deploy}`,
              `- post-deploy smoke: ${outcomes.smoke}`,
              `- Pages URL: ${pageUrl}`,
              '',
              passed
                ? '公開検査はPASSです。iPhoneのSafariでPages URLを開き、ホーム画面に追加できます。'
                : '上記の失敗工程を確認してください。アプリ本体の検査はPASSしています。'
            ].join('\n');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: `BONSAI release audit: ${passed ? 'PASS' : 'FAIL'}`,
              body,
              state: passed ? 'closed' : 'open',
              ...(passed ? {state_reason: 'completed'} : {})
            });
      - name: Fail deployment job when an audited step failed
        if: always() && (steps.configure.outcome != 'success' || steps.artifact.outcome != 'success' || steps.deployment.outcome != 'success' || steps.smoke.outcome != 'success')
        run: exit 1
  record-verify-failure:
    if: always() && needs.verify.result != 'success'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: 'BONSAI release audit: FAIL',
              body: `# BONSAI release audit\n\n- 記録日時: ${new Date().toISOString()}\n- main SHA: \`${context.sha}\`\n- verify: failure\n\nアプリ本体の構文または静的配信検査に失敗しています。`,
              state: 'open'
            });
