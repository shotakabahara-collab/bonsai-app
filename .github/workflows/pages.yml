name: Test and Deploy BONSAI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate application contracts and scoring
        run: |
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const inline=[...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)]
            .map(match=>match[1]).filter(code=>code.trim());
          if(!inline.length) throw Error('inline app missing');
          inline.forEach((code,index)=>new vm.Script(code,{filename:`inline-${index}.js`}));

          const files=[
            'photo-assets.js','tree-renderer.js','advanced-care.js','advanced-care-bridge.js',
            'completion-core.js','judging-engine.js','state-image-runtime.js'
          ];
          for(const file of files) {
            if(!fs.existsSync(file)) throw Error(`missing file: ${file}`);
            new vm.Script(fs.readFileSync(file,'utf8'),{filename:file});
          }
          for(const token of [
            'confirmPrune','剪定後は取り消せません','enterShow','銘木録','localStorage',
            'advanced-care.js','advanced-care-bridge.js','completion-core.js','judging-engine.js','state-image-runtime.js'
          ]) if(!html.includes(token)) throw Error(`missing application contract: ${token}`);

          vm.runInThisContext(fs.readFileSync('advanced-care.js','utf8'),{filename:'advanced-care.js'});
          vm.runInThisContext(fs.readFileSync('completion-core.js','utf8'),{filename:'completion-core.js'});
          const A=globalThis.BonsaiAdvancedCare;
          const C=globalThis.BonsaiCompletion;
          if(!A||!C) throw Error('advanced or completion API missing');
          let healthy=A.migrateState({started:true,sp:'pine',born:Date.now()-86400000,last:Date.now(),water:82,vit:92,stress:2,pot:'black',money:5000,rep:160,stats:{water:0,prune:0,wire:0,shows:0},awards:[],log:[]});
          for(const id of ['apex','first_left','second_right','third_left','back_branch','front_branch']) {
            healthy.advanced.parts[id].foliage={apex:64,first_left:78,second_right:72,third_left:66,back_branch:54,front_branch:46}[id];
          }
          const healthyScore=C.exhibitionEvaluation(healthy).score;
          const damaged=JSON.parse(JSON.stringify(healthy));
          damaged.advanced.parts.first_left.disease='needle_blight';
          damaged.advanced.parts.second_right.pest='scale';
          damaged.advanced.parts.first_left.health=42;
          damaged.advanced.parts.second_right.health=48;
          const damagedScore=C.exhibitionEvaluation(damaged).score;
          if(!(healthyScore>damagedScore)) throw Error(`pathology scoring invalid: ${healthyScore} <= ${damagedScore}`);

          const runtime=fs.readFileSync('state-image-runtime.js','utf8');
          for(const token of ['BonsaiStateRuntime','indexedDB','作品状態記録','bonsai-state-canvas','visualSignature','deadwood','shari']) {
            if(!runtime.includes(token)) throw Error(`missing state image contract: ${token}`);
          }
          const judging=fs.readFileSync('judging-engine.js','utf8');
          for(const token of ['BonsaiJudging','病害虫','針金と傷跡','神舎利']) {
            if(!judging.includes(token)) throw Error(`missing judging contract: ${token}`);
          }
          const manifest=JSON.parse(fs.readFileSync('manifest.webmanifest','utf8'));
          if(manifest.short_name!=='BONSAI'||manifest.display!=='standalone') throw Error('manifest invalid');
          console.log(`BONSAI contracts: PASS; healthy=${healthyScore}; damaged=${damagedScore}`);
          NODE

      - name: Static HTTP smoke
        run: |
          python3 -m http.server 4173 >/tmp/http.log 2>&1 &
          server=$!; trap 'kill $server' EXIT
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:4173/ >/tmp/index.html && break; sleep .2; done
          grep -Fq '<title>BONSAI</title>' /tmp/index.html
          for asset in photo-assets.js tree-renderer.js advanced-care.js advanced-care-bridge.js completion-core.js judging-engine.js state-image-runtime.js; do
            grep -Fq "$asset" /tmp/index.html
            curl -fsS "http://127.0.0.1:4173/$asset" >/tmp/asset
            test -s /tmp/asset
          done
          curl -fsS http://127.0.0.1:4173/manifest.webmanifest | grep -Fq 'BONSAI'
          for asset in completion-core.js judging-engine.js state-image-runtime.js; do
            curl -fsS http://127.0.0.1:4173/sw.js | grep -Fq "$asset"
          done

  deploy:
    needs: verify
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Pages through REST API
        id: enable
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set +e
          auth=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")
          get_code=$(curl -sS -o /tmp/pages-get.json -w '%{http_code}' "${auth[@]}" "https://api.github.com/repos/${REPOSITORY}/pages")
          if [ "$get_code" = "200" ]; then
            echo "detail=already-enabled" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          post_code=$(curl -sS -o /tmp/pages-post.json -w '%{http_code}' -X POST "${auth[@]}" "https://api.github.com/repos/${REPOSITORY}/pages" -d '{"build_type":"workflow"}')
          message=$(node -e "const fs=require('fs');let x={};try{x=JSON.parse(fs.readFileSync('/tmp/pages-post.json','utf8'))}catch{};process.stdout.write(String(x.message||'').replace(/[\r\n|]/g,' ').slice(0,160))")
          echo "detail=GET ${get_code}; POST ${post_code}; ${message}" >> "$GITHUB_OUTPUT"
          if [ "$post_code" = "201" ] || [ "$post_code" = "204" ] || [ "$post_code" = "409" ]; then exit 0; fi
          exit 1
      - name: Configure Pages
        id: configure
        if: steps.enable.outcome == 'success'
        continue-on-error: true
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        id: artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy Pages
        id: deployment
        if: steps.enable.outcome == 'success' && steps.configure.outcome == 'success' && steps.artifact.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Verify published app
        id: smoke
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          base="${PAGE_URL%/}/"
          curl --fail --silent --show-error --retry 12 --retry-delay 3 --retry-all-errors "$base" -o /tmp/live.html
          grep -Fq '<title>BONSAI</title>' /tmp/live.html
          for asset in photo-assets.js advanced-care.js advanced-care-bridge.js completion-core.js judging-engine.js state-image-runtime.js; do
            grep -Fq "$asset" /tmp/live.html
            curl --fail --silent --show-error --retry 12 --retry-delay 3 --retry-all-errors "${base}${asset}" >/tmp/live-asset
            test -s /tmp/live-asset
          done
          curl --fail --silent --show-error --retry 12 --retry-delay 3 --retry-all-errors "${base}manifest.webmanifest" | grep -Fq 'BONSAI'
          for asset in completion-core.js judging-engine.js state-image-runtime.js; do
            curl --fail --silent --show-error --retry 12 --retry-delay 3 --retry-all-errors "${base}sw.js" | grep -Fq "$asset"
          done
      - name: Record detailed deployment audit
        if: always()
        uses: actions/github-script@v7
        env:
          ENABLE: ${{ steps.enable.outcome }}
          ENABLE_DETAIL: ${{ steps.enable.outputs.detail }}
          CONFIGURE: ${{ steps.configure.outcome }}
          ARTIFACT: ${{ steps.artifact.outcome }}
          DEPLOY: ${{ steps.deployment.outcome }}
          SMOKE: ${{ steps.smoke.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const outcomes = {
              enable: process.env.ENABLE || 'not-run',
              configure: process.env.CONFIGURE || 'not-run',
              artifact: process.env.ARTIFACT || 'not-run',
              deploy: process.env.DEPLOY || 'not-run',
              smoke: process.env.SMOKE || 'not-run'
            };
            const passed = Object.values(outcomes).every(value => value === 'success');
            const pageUrl = process.env.PAGE_URL || 'https://shotakabahara-collab.github.io/bonsai-app/';
            const body = [
              '# BONSAI release audit',
              '',
              `- 記録日時: ${new Date().toISOString()}`,
              `- main SHA: \`${context.sha}\``,
              '- application syntax / PWA: success',
              '- part-specific pruning and wiring: success',
              '- disease / pest / jin / shari: success',
              '- part-specific exhibition scoring: success',
              '- state image compositor / IndexedDB memorials: success',
              `- enable Pages: ${outcomes.enable}`,
              `- enable detail: ${process.env.ENABLE_DETAIL || 'none'}`,
              `- configure Pages: ${outcomes.configure}`,
              `- upload artifact: ${outcomes.artifact}`,
              `- deploy Pages: ${outcomes.deploy}`,
              `- post-deploy smoke: ${outcomes.smoke}`,
              `- Pages URL: ${pageUrl}`,
              '',
              passed
                ? '部位別作品制作・審査・状態画像保存を含む公開検査はPASSです。iPhoneのSafariから確認できます。'
                : '上記の失敗工程を確認してください。'
            ].join('\n');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: `BONSAI release audit: ${passed ? 'PASS' : 'FAIL'}`,
              body,
              state: passed ? 'closed' : 'open',
              ...(passed ? {state_reason: 'completed'} : {})
            });
      - name: Fail deployment job when an audited step failed
        if: always() && (steps.enable.outcome != 'success' || steps.configure.outcome != 'success' || steps.artifact.outcome != 'success' || steps.deployment.outcome != 'success' || steps.smoke.outcome != 'success')
        run: exit 1

  record-verify-failure:
    if: always() && needs.verify.result != 'success'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: 'BONSAI release audit: FAIL',
              body: `# BONSAI release audit\n\n- 記録日時: ${new Date().toISOString()}\n- main SHA: \`${context.sha}\`\n- verify: failure\n\n部位別審査または作品状態画像ランタイムの検査に失敗しています。`,
              state: 'open'
            });
