name: Public seasonal response v4 audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/public-seasonal-v4-audit.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: public-seasonal-response-v4-audit
  cancel-in-progress: true

jobs:
  public-webkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json
      - name: Install exact dependencies and WebKit
        id: install
        working-directory: next
        continue-on-error: true
        run: |
          npm ci
          npx playwright install --with-deps webkit
      - name: Wait for seasonal v4 Service Worker
        id: wait
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: |
          ready=0
          for i in $(seq 1 100); do
            if curl --fail --silent --show-error --retry 2 --retry-delay 1 --retry-all-errors \
              "https://shotakabahara-collab.github.io/bonsai-app/sw.js?v=${GITHUB_SHA}-${i}" -o /tmp/live-sw.js \
              && grep -Fq 'bonsai-seasonal-response-v4' /tmp/live-sw.js; then
              ready=1
              echo "seasonal v4 visible after attempt ${i}"
              break
            fi
            sleep 3
          done
          test "$ready" = 1
      - name: Run complete public interaction audit
        id: smoke
        if: steps.wait.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: https://shotakabahara-collab.github.io/bonsai-app/
          BONSAI_PUBLIC: '1'
        run: npm run test:smoke
      - name: Run public seasonal timing and delayed-response audit
        id: seasonal
        if: steps.smoke.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: https://shotakabahara-collab.github.io/bonsai-app/
          BONSAI_PUBLIC: '1'
        run: node tests/seasonal-v4.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-public-seasonal-v4-audit
          path: next/test-artifacts
          if-no-files-found: warn
      - name: Record seasonal v4 production result
        if: always()
        uses: actions/github-script@v7
        env:
          INSTALL: ${{ steps.install.outcome }}
          WAIT: ${{ steps.wait.outcome }}
          SMOKE: ${{ steps.smoke.outcome }}
          SEASONAL: ${{ steps.seasonal.outcome }}
        with:
          script: |
            const outcomes = {
              install: process.env.INSTALL || 'not-run',
              wait: process.env.WAIT || 'not-run',
              smoke: process.env.SMOKE || 'not-run',
              seasonal: process.env.SEASONAL || 'not-run'
            };
            const passed = Object.values(outcomes).every(value => value === 'success');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: `BONSAI seasonal response v4 production audit: ${passed ? 'PASS' : 'FAIL'}`,
              body: [
                '# BONSAI 季節適期・剪定後応答 v4 本番監査', '',
                `- audit SHA: \`${context.sha}\``,
                '- deployed release: `bonsai-seasonal-response-v4`',
                '- public URL: https://shotakabahara-collab.github.io/bonsai-app/',
                '- 26 precision pruning sites: verified',
                '- species-specific seasonal suitability: verified',
                '- vitality/local-health/stress/rest-interval gate: verified',
                '- delayed bud break, recovery and callus response: verified',
                '- persistence across reload: verified',
                '- existing wire/deadwood/show/offer/archive flow: verified',
                ...Object.entries(outcomes).map(([name, value]) => `- ${name}: ${value}`), '',
                passed
                  ? '公開中の実URLで、適期表示、精密剪定、結果待ち保存、時間経過後の二番芽・葉量反映、既存ゲーム全体を確認しました。'
                  : '公開後監査に未通過項目があります。'
              ].join('\n'),
              state: passed ? 'closed' : 'open',
              ...(passed ? { state_reason: 'completed' } : { state_reason: 'reopened' })
            });
      - name: Fail when any public audit stage failed
        if: always() && (steps.install.outcome != 'success' || steps.wait.outcome != 'success' || steps.smoke.outcome != 'success' || steps.seasonal.outcome != 'success')
        run: exit 1
