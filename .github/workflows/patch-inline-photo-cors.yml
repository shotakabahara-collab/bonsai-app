name: Patch inline pine image CORS

on:
  push:
    branches:
      - agent/highres-kuromatsu-v2
    paths:
      - '.github/workflows/patch-inline-photo-cors.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: patch-inline-photo-cors
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/highres-kuromatsu-v2
      - name: Put CORS attributes on the image before its first request
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '<figure class="photo-bonsai"><img src="${window.BonsaiPhotos.pine}" alt="実写品質で撮影された黒松盆栽" draggable="false"></figure>'
          new = '<figure class="photo-bonsai"><img crossorigin="anonymous" referrerpolicy="no-referrer" src="${window.BonsaiPhotos.pine}" alt="実写品質で撮影された黒松盆栽" draggable="false"></figure>'
          if new not in text:
              if old not in text:
                  raise SystemExit('pine image markup anchor missing')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate patched application
        run: |
          grep -Fq 'crossorigin="anonymous" referrerpolicy="no-referrer" src="${window.BonsaiPhotos.pine}"' index.html
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          [...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)].map(x=>x[1]).filter(x=>x.trim()).forEach((code,index)=>new vm.Script(code,{filename:`inline-${index}.js`}));
          console.log('inline pine CORS markup: PASS');
          NODE
      - name: Commit patch and remove one-shot workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git rm .github/workflows/patch-inline-photo-cors.yml
          git commit -m '黒松写真を初回要求からCORS対応で読み込む'
          git push origin HEAD:agent/highres-kuromatsu-v2
