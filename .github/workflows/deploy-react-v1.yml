name: Deploy BONSAI Material Preview v11

on:
  push:
    branches: [main]
    paths:
      - 'next/**'
      - '.github/workflows/deploy-react-v1.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages-material-preview-v11
  cancel-in-progress: false

env:
  BONSAI_RELEASE: bonsai-material-preview-v11

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install exact dependencies and visual tools
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless

      - name: Typecheck, contracts and production build
        working-directory: next
        run: |
          npm run typecheck
          npm run test:photoreal:unit
          npm run test:gameplay:unit
          npm run build
          python -m py_compile scripts/repair-material-backdrops-v10.py scripts/repair-material-floor-v11.py scripts/audit-black-pine-state-v9.py
          test "$(find public/assets/kuromatsu/base -maxdepth 1 -type f -name '*.webp' | wc -l)" -ge 5
          grep -Fq "bonsai-material-preview-v11" public/sw.js

      - name: Run local iPhone, floor, gameplay and offline audits
        working-directory: next
        run: |
          setsid npm run preview >/tmp/bonsai-v11-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-photoreal-v7-preview.pid
          trap 'kill -TERM -- -$server 2>/dev/null || true' EXIT
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && break
            sleep .25
          done
          curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null
          npm run test:smoke
          node tests/seasonal-v4.mjs
          npm run test:gameplay
          npm run test:black-pine-v9
          python scripts/audit-black-pine-state-v9.py
          npm run test:photoreal

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: next/dist
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-material-preview-v11-local-audit
          path: |
            next/test-artifacts
            next/material-preview-v11-assets.json
            next/black-pine-state-v9-visual-audit.json
            /tmp/bonsai-v11-preview.log
          if-no-files-found: warn
          retention-days: 14

  deploy:
    needs: build-and-audit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy verified production bundle
        id: deployment
        uses: actions/deploy-pages@v4

  public-iphone-audit:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install public audit dependencies
        id: install
        continue-on-error: true
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless

      - name: Wait for Material Preview v11 on Pages
        id: wait
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          base="${PAGE_URL%/}/"
          ready=0
          for i in $(seq 1 180); do
            if curl -fsS "${base}sw.js?v=${RELEASE_SHA}-${i}" -o /tmp/live-sw.js \
              && grep -Fq "$BONSAI_RELEASE" /tmp/live-sw.js \
              && curl -fsS "${base}index.html?v=${RELEASE_SHA}-${i}" -o /tmp/live-index.html \
              && grep -Fq '<title>BONSAI</title>' /tmp/live-index.html; then
              ready=1
              break
            fi
            sleep 3
          done
          test "$ready" = 1

      - name: Run public smoke and seasonal regressions
        id: basic
        if: steps.wait.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: |
          npm run test:smoke
          node tests/seasonal-v4.mjs

      - name: Audit public lower floor and gameplay
        id: gameplay
        if: steps.basic.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: npm run test:gameplay

      - name: Audit public Black Pine real flow
        id: blackpine
        if: steps.gameplay.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: |
          npm run test:black-pine-v9
          python scripts/audit-black-pine-state-v9.py

      - name: Audit public Photoreal and offline shell
        id: photoreal
        if: steps.blackpine.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: npm run test:photoreal

      - name: Verify repaired public base photographs
        id: files
        if: steps.photoreal.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          base="${PAGE_URL%/}/"
          for name in starter old blue black moon; do
            curl -fsS "${base}assets/kuromatsu/base/${name}.webp?v=${RELEASE_SHA}" -o "/tmp/${name}.webp"
            test "$(wc -c < "/tmp/${name}.webp")" -gt 100000
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-material-preview-v11-public-audit
          path: next/test-artifacts
          if-no-files-found: warn
          retention-days: 14

      - name: Record production audit
        if: always()
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          INSTALL: ${{ steps.install.outcome }}
          WAIT: ${{ steps.wait.outcome }}
          BASIC: ${{ steps.basic.outcome }}
          GAMEPLAY: ${{ steps.gameplay.outcome }}
          BLACKPINE: ${{ steps.blackpine.outcome }}
          PHOTOREAL: ${{ steps.photoreal.outcome }}
          FILES: ${{ steps.files.outcome }}
        with:
          script: |
            const outcomes = {
              install: process.env.INSTALL || 'not-run',
              wait: process.env.WAIT || 'not-run',
              basic: process.env.BASIC || 'not-run',
              gameplay: process.env.GAMEPLAY || 'not-run',
              blackpine: process.env.BLACKPINE || 'not-run',
              photoreal: process.env.PHOTOREAL || 'not-run',
              files: process.env.FILES || 'not-run'
            };
            const passed = Object.values(outcomes).every(value => value === 'success');
            const page = (process.env.PAGE_URL || 'https://shotakabahara-collab.github.io/bonsai-app/').replace(/\/$/, '') + '/';
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: passed ? 'BONSAI Material Preview v11: PUBLISHED / iPhone確認待ち' : 'BONSAI Material Preview v11 production audit: FAIL',
              body: [
                '# BONSAI Material Preview v11 本番監査', '',
                `- release SHA: \`${context.sha}\``,
                '- deployed release: `bonsai-material-preview-v11`',
                `- Pages URL: ${page}`,
                '- lower brown floor / wood shadow neutralized while pot, moss and trunk are protected',
                '- black bottom edge intentionally unchanged',
                ...Object.entries(outcomes).map(([key, value]) => `- public ${key}: ${value}`), '',
                passed ? '自動本番監査は合格しました。iPhone実画面の最終確認までIssueを開いたままにします。' : '未通過項目があります。完成扱いにしません。'
              ].join('\n'),
              state: 'open',
              state_reason: 'reopened'
            });

      - name: Fail when any public audit failed
        if: always() && (steps.install.outcome != 'success' || steps.wait.outcome != 'success' || steps.basic.outcome != 'success' || steps.gameplay.outcome != 'success' || steps.blackpine.outcome != 'success' || steps.photoreal.outcome != 'success' || steps.files.outcome != 'success')
        run: exit 1
