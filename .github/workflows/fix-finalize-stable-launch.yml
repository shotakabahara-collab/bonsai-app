name: Fix and start BONSAI stable finalizer

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-finalize-stable-launch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Move Pages environment to the job
        run: |
          python3 <<'PY'
          from pathlib import Path
          path=Path('.github/workflows/finalize-stable-launch-v1.yml')
          text=path.read_text(encoding='utf-8')
          top="""environment:\n  name: github-pages\n  url: ${{ steps.deployment.outputs.page_url }}\n\n"""
          if top in text:
              text=text.replace(top,'',1)
          job="""  finalize-test-deploy:\n    runs-on: ubuntu-latest\n"""
          replacement="""  finalize-test-deploy:\n    runs-on: ubuntu-latest\n    environment:\n      name: github-pages\n      url: ${{ steps.deployment.outputs.page_url }}\n"""
          if replacement not in text:
              if job not in text: raise SystemExit('finalizer job marker missing')
              text=text.replace(job,replacement,1)
          path.write_text(text,encoding='utf-8')
          PY
      - name: Commit corrected finalizer
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/finalize-stable-launch-v1.yml
          git diff --cached --quiet && exit 0
          git commit -m '安定版最終統合ワークフローを有効化'
          git push origin HEAD:main
