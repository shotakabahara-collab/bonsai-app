name: Build kuromatsu state images

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_kuromatsu_states.py'
      - 'scripts/normalize_photo_asset.py'
      - 'photo-assets.js'
      - '.github/workflows/build-kuromatsu-states.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kuromatsu-state-images
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install image build dependencies
        id: dependencies
        continue-on-error: true
        run: python -m pip install --disable-pip-version-check numpy opencv-python-headless pillow > /tmp/dependencies.log 2>&1
      - name: Normalize the source photograph for strict image decoders
        id: normalize
        if: steps.dependencies.outcome == 'success'
        continue-on-error: true
        run: python scripts/normalize_photo_asset.py > /tmp/normalize.log 2>&1
      - name: Generate state images and connect the game
        id: generate
        if: steps.normalize.outcome == 'success'
        continue-on-error: true
        run: python scripts/build_kuromatsu_states.py > /tmp/generate.log 2>&1
      - name: Validate generated assets and application syntax
        id: validate
        if: steps.generate.outcome == 'success'
        continue-on-error: true
        run: |
          {
          python <<'PY'
          from pathlib import Path
          from PIL import Image

          expected = [
              'assets/kuromatsu_B02_P00_V02_W02_G00_FA_M01_POT02_main.jpg',
              'assets/kuromatsu_B02_P01_V02_W02_G00_FA_M01_POT02_main.jpg',
              'assets/kuromatsu_B02_P02_V02_W02_G00_FA_M01_POT02_main.jpg',
              'assets/kuromatsu_B02_P01_V01_W01_G00_FA_M01_POT02_main.jpg',
              'assets/kuromatsu_B03_P02_V03_W03_G00_FA_M02_POT05_award.jpg',
          ]
          for name in expected:
              path = Path(name)
              if not path.exists() or path.stat().st_size < 150_000:
                  raise SystemExit(f'invalid state asset: {name}')
              with Image.open(path) as image:
                  if image.width < 800 or image.height < 1200:
                      raise SystemExit(f'insufficient resolution: {name} {image.size}')
          html = Path('index.html').read_text()
          sw = Path('sw.js').read_text()
          if 'BonsaiStateImages' not in html or 'state-images.js' not in html:
              raise SystemExit('state image resolver is not connected')
          if 'bonsai-state-images-v1' not in sw:
              raise SystemExit('state image cache version is missing')
          print('state asset validation: PASS')
          PY
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const scripts=[...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
          new vm.Script(scripts.at(-1)[1],{filename:'bonsai.js'});
          new vm.Script(fs.readFileSync('state-images.js','utf8'),{filename:'state-images.js'});
          console.log('state image JavaScript: PASS');
          NODE
          } > /tmp/validate.log 2>&1
      - name: Write build audit
        if: always()
        env:
          DEPENDENCIES: ${{ steps.dependencies.outcome }}
          NORMALIZE: ${{ steps.normalize.outcome }}
          GENERATE: ${{ steps.generate.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
        run: |
          {
            echo '# Kuromatsu state image build audit'
            echo
            echo "- commit: \`${GITHUB_SHA}\`"
            echo "- dependencies: ${DEPENDENCIES:-not-run}"
            echo "- source normalization: ${NORMALIZE:-not-run}"
            echo "- generation: ${GENERATE:-not-run}"
            echo "- validation: ${VALIDATE:-not-run}"
            echo
            echo '## Dependency log'
            echo '```text'
            tail -n 30 /tmp/dependencies.log 2>/dev/null || true
            echo '```'
            echo
            echo '## Normalization log'
            echo '```text'
            tail -n 30 /tmp/normalize.log 2>/dev/null || true
            echo '```'
            echo
            echo '## Generation log'
            echo '```text'
            tail -n 40 /tmp/generate.log 2>/dev/null || true
            echo '```'
            echo
            echo '## Validation log'
            echo '```text'
            tail -n 40 /tmp/validate.log 2>/dev/null || true
            echo '```'
          } > STATE_IMAGE_BUILD_STATUS.md
      - name: Commit generated state assets and audit
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add STATE_IMAGE_BUILD_STATUS.md
          if [ "${{ steps.generate.outcome }}" = "success" ] && [ "${{ steps.validate.outcome }}" = "success" ]; then
            git add assets state-images.js index.html sw.js
          fi
          git diff --cached --quiet && exit 0
          git commit -m '黒松状態画像生成の結果を記録'
          git push origin HEAD:main
      - name: Fail when build did not pass
        if: always() && (steps.dependencies.outcome != 'success' || steps.normalize.outcome != 'success' || steps.generate.outcome != 'success' || steps.validate.outcome != 'success')
        run: exit 1
