name: Export photoreal craft v6 source snapshot

on:
  push:
    branches: [agent/photoreal-craft-v6]
    paths:
      - '.github/workflows/export-photoreal-v6-source.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/export-photoreal-v6-source.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
      - name: Apply SHA-verified Photoreal Craft v6 base source
        run: |
          set -euxo pipefail
          cat .photoreal-v6-payload/bin-* > /tmp/photoreal-v6.patch.xz
          test "$(wc -c < /tmp/photoreal-v6.patch.xz)" -eq 17572
          echo 'ee0ff926de4965eb5b93ec0f59a6231bae468f1c766c04b2129bcb020776956c  /tmp/photoreal-v6.patch.xz' | sha256sum -c -
          xz -t /tmp/photoreal-v6.patch.xz
          xz -dc /tmp/photoreal-v6.patch.xz | git apply --whitespace=error --exclude=.github/workflows/export-photoreal-v6-source.yml
      - name: Apply SHA-verified final visual calibration
        run: |
          set -euxo pipefail
          echo '34c9c45cd2bf35491341271e1ab1c347335fbf06465c474bee19621bbbbc496d  .photoreal-v6-final.patch.xz' | sha256sum -c -
          xz -t .photoreal-v6-final.patch.xz
          xz -dc .photoreal-v6-final.patch.xz | git apply --whitespace=error --exclude=.github/workflows/export-photoreal-v6-source.yml
          git diff --check
      - name: Archive applied source tree and patch
        run: |
          git diff --binary > /tmp/bonsai-photoreal-v6-applied.patch
          tar --exclude=.git --exclude=next/node_modules --exclude=next/dist --exclude=next/test-artifacts -czf /tmp/bonsai-photoreal-v6-source.tar.gz .
          sha256sum /tmp/bonsai-photoreal-v6-source.tar.gz /tmp/bonsai-photoreal-v6-applied.patch > /tmp/bonsai-photoreal-v6-source.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: bonsai-photoreal-v6-source
          path: |
            /tmp/bonsai-photoreal-v6-source.tar.gz
            /tmp/bonsai-photoreal-v6-applied.patch
            /tmp/bonsai-photoreal-v6-source.sha256
          if-no-files-found: error
          retention-days: 3
