name: Export photoreal craft v6 source snapshot

on:
  push:
    branches: [agent/photoreal-craft-v6]
    paths:
      - '.github/workflows/export-photoreal-v6-source.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/export-photoreal-v6-source.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
      - name: Archive source tree
        run: |
          tar --exclude=.git --exclude=next/node_modules --exclude=next/dist --exclude=next/test-artifacts -czf /tmp/bonsai-photoreal-v6-source.tar.gz .
          sha256sum /tmp/bonsai-photoreal-v6-source.tar.gz > /tmp/bonsai-photoreal-v6-source.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: bonsai-photoreal-v6-source
          path: |
            /tmp/bonsai-photoreal-v6-source.tar.gz
            /tmp/bonsai-photoreal-v6-source.sha256
          if-no-files-found: error
          retention-days: 3
