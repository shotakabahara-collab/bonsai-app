name: Apply BONSAI visual v2

on:
  push:
    branches: [main]
    paths:
      - 'tree-renderer.js'
      - '.github/workflows/apply-visual-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Connect high-density bonsai renderer
        id: patch
        continue-on-error: true
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          renderer=Path('tree-renderer.js')
          rt=renderer.read_text()
          rt=rt.replace("const sp=species[s.sp],pot=pots.find(x=>x[0]===s.pot)||pots[0];","const raw=species[s.sp],sp=Array.isArray(raw)?{n:raw[0],leaf:raw[2]}:raw,pot=pots.find(x=>x[0]===s.pot)||pots[0];",1)
          renderer.write_text(rt)
          path=Path('index.html')
          text=path.read_text()
          if 'src="tree-renderer.js"' not in text:
              text=text.replace('<div id="root"></div><script>','<div id="root"></div><script src="tree-renderer.js"></script><script>',1)
          pattern=r'function svg\(\)\{.*?\}function home\(\)\{'
          replacement='function svg(){return window.BonsaiVisual.render(s,SP,POTS,season(),d())}function home(){'
          text,n=re.subn(pattern,replacement,text,count=1,flags=re.S)
          if n!=1:
              raise SystemExit(f'svg replacement failed: {n}')
          old='background:radial-gradient(circle,#81998725,transparent 60%)'
          new='background:radial-gradient(circle at 50% 24%,#b8cab322,transparent 42%),linear-gradient(180deg,#1b2b21,#0d1711 70%,#08100b)'
          text=text.replace(old,new,1)
          path.write_text(text)
          sw=Path('sw.js')
          s=sw.read_text().replace("bonsai-live-v1-20260716","bonsai-live-v2-20260716")
          if 'tree-renderer.js' not in s:
              s=s.replace("'./icon.svg']","'./icon.svg','./tree-renderer.js']")
          sw.write_text(s)
          PY
      - name: Validate patched application
        id: validate
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        run: |
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const scripts=[...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
          new vm.Script(scripts.at(-1)[1],{filename:'bonsai.js'});
          new vm.Script(fs.readFileSync('tree-renderer.js','utf8'),{filename:'tree-renderer.js'});
          if(!html.includes('window.BonsaiVisual.render(s,SP,POTS'))throw Error('visual renderer not connected');
          if(!html.includes('src="tree-renderer.js"'))throw Error('renderer script tag missing');
          if(/function svg\(\)\{let x=d\(\),col=/.test(html))throw Error('circle placeholder remains active');
          if(!fs.readFileSync('sw.js','utf8').includes('tree-renderer.js'))throw Error('renderer not cached');
          console.log('BONSAI visual v2: PASS');
          NODE
      - name: Record visual audit
        if: always()
        env:
          PATCH: ${{ steps.patch.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
        run: |
          cat > VISUAL_V2_STATUS.md <<EOF
          # BONSAI Visual v2 audit

          - commit: \`${GITHUB_SHA}\`
          - renderer patch: ${PATCH}
          - JavaScript / PWA validation: ${VALIDATE}
          - target: circle-based placeholder removed; tree-renderer.js connected
          EOF
      - name: Commit visual replacement and audit
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html sw.js tree-renderer.js VISUAL_V2_STATUS.md
          git diff --cached --quiet && exit 0
          git commit -m '丸形の仮描画を高密度盆栽表現へ置換'
          git push origin HEAD:main
      - name: Fail when visual audit failed
        if: steps.patch.outcome != 'success' || steps.validate.outcome != 'success'
        run: exit 1
