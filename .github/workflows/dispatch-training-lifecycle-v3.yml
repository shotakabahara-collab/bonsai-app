name: Dispatch authentic bonsai craft v3

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dispatch-training-lifecycle-v3.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dispatch-authentic-bonsai-craft-v3
  cancel-in-progress: true

jobs:
  build-feature-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/training-lifecycle-v3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json
      - name: Apply craft model and interface
        run: python scripts/apply_training_lifecycle_v3.py
      - name: Install exact dependencies
        working-directory: next
        run: npm ci
      - name: Typecheck and production build
        working-directory: next
        run: npm run build
      - name: Install iPhone WebKit
        working-directory: next
        run: npx playwright install --with-deps webkit
      - name: Run full iPhone-sized interaction audit
        run: |
          cd next
          npm run preview >/tmp/bonsai-craft-v3-preview.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 80); do curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && break; sleep .25; done
          npm run test:smoke
      - name: Commit verified feature branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add next scripts/apply_training_lifecycle_v3.py .github/workflows/apply-training-lifecycle-v3.yml
          git diff --cached --quiet && exit 0
          git commit -m '剪定26箇所・針金養成・神舎利工程を統合'
          git push origin HEAD:feature/training-lifecycle-v3
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: authentic-bonsai-craft-v3-audit
          path: next/test-artifacts
          if-no-files-found: warn
