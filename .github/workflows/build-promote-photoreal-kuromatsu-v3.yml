name: Build, audit and promote photoreal kuromatsu v3

on:
  push:
    branches:
      - agent/photoreal-upscale-v3
    paths:
      - 'scripts/build_photoreal_kuromatsu_v3.py'
      - '.github/workflows/build-promote-photoreal-kuromatsu-v3.yml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: photoreal-kuromatsu-v3
  cancel-in-progress: true

jobs:
  build-audit-promote:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/photoreal-upscale-v3
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install image pipeline
        id: install
        continue-on-error: true
        run: python -m pip install --disable-pip-version-check pillow numpy opencv-contrib-python-headless==4.11.0.86 > /tmp/install.log 2>&1

      - name: Download EDSR x4 model
        id: model
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: |
          mkdir -p .cache
          curl --fail --location --retry 5 --retry-delay 2 \
            --output .cache/EDSR_x4.pb \
            https://raw.githubusercontent.com/Saafke/EDSR_Tensorflow/master/models/EDSR_x4.pb \
            > /tmp/model.log 2>&1
          test "$(wc -c < .cache/EDSR_x4.pb)" -gt 30000000

      - name: Generate same-tree high-resolution assets
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: python scripts/build_photoreal_kuromatsu_v3.py > /tmp/build.log 2>&1

      - name: Validate generated visual core
        id: validate
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          {
          python <<'PY'
          from pathlib import Path
          from PIL import Image, ImageChops, ImageStat
          import json

          manifest_path = Path('assets/kuromatsu/manifest.json')
          assert manifest_path.exists(), 'manifest missing'
          manifest = json.loads(manifest_path.read_text())
          assert manifest['version'] == 'kuromatsu-photoreal-v3'
          assert manifest['sameTreeIdentity'] is True
          assert manifest['width'] >= 1200 and manifest['height'] >= 1500
          expected = {'black', 'starter', 'blue', 'moon', 'old'}
          assert set(manifest['base']) == expected

          images = {}
          for pot, rel in manifest['base'].items():
              path = Path(rel)
              assert path.exists(), path
              assert path.stat().st_size > 100_000, (pot, path.stat().st_size)
              with Image.open(path) as image:
                  assert image.format == 'WEBP', (pot, image.format)
                  assert image.size == (manifest['width'], manifest['height'])
                  images[pot] = image.convert('RGB').copy()

          black = images['black']
          crop = (0, int(manifest['height'] * .78), manifest['width'], manifest['height'])
          for pot in expected - {'black'}:
              diff = ImageChops.difference(black.crop(crop), images[pot].crop(crop))
              mean = sum(ImageStat.Stat(diff).mean) / 3
              assert mean > .65, (pot, mean)

          qa = Path('assets/kuromatsu/qa/pot-variants.webp')
          assert qa.exists() and qa.stat().st_size > 25_000
          print('image identity / dimensions / pot variants: PASS')
          PY

          node --check photo-assets.js
          node --check state-image-runtime.js
          node --check sw.js
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          for(const file of ['photo-assets.js','state-image-runtime.js','sw.js']) {
            new vm.Script(fs.readFileSync(file,'utf8'),{filename:file});
          }
          const photo=fs.readFileSync('photo-assets.js','utf8');
          for(const token of ['POT_IMAGES','pineForPot','sameTreeIdentity','kuromatsu-photoreal-v3']) {
            if(!photo.includes(token)) throw Error(`photo contract: ${token}`);
          }
          const runtime=fs.readFileSync('state-image-runtime.js','utf8');
          for(const token of ['BonsaiStateRuntime','visualSignature','deadwood','shari','indexedDB']) {
            if(!runtime.includes(token)) throw Error(`state runtime: ${token}`);
          }
          const sw=fs.readFileSync('sw.js','utf8');
          for(const token of ['black.webp','starter.webp','blue.webp','moon.webp','old.webp','assets/kuromatsu/manifest.json']) {
            if(!sw.includes(token)) throw Error(`offline cache: ${token}`);
          }
          console.log('JavaScript / state-image / offline contracts: PASS');
          NODE

          python -m http.server 4173 >/tmp/photoreal-http.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:4173/assets/kuromatsu/manifest.json >/tmp/manifest.json && break
            sleep .2
          done
          grep -Fq 'kuromatsu-photoreal-v3' /tmp/manifest.json
          for pot in black starter blue moon old; do
            curl -fsS "http://127.0.0.1:4173/assets/kuromatsu/base/${pot}.webp" -o "/tmp/${pot}.webp"
            test "$(wc -c < "/tmp/${pot}.webp")" -gt 100000
          done
          } > /tmp/validate.log 2>&1

      - name: Write reproducible build audit
        id: audit
        if: always()
        env:
          INSTALL: ${{ steps.install.outcome }}
          MODEL: ${{ steps.model.outcome }}
          BUILD: ${{ steps.build.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
        run: |
          {
            echo '# BONSAI 黒松フォトリアル v3 ビルド監査'
            echo
            echo "- trigger SHA: \`${GITHUB_SHA}\`"
            echo "- install: ${INSTALL:-not-run}"
            echo "- EDSR model: ${MODEL:-not-run}"
            echo "- build: ${BUILD:-not-run}"
            echo "- validation: ${VALIDATE:-not-run}"
            echo
            if [ -f assets/kuromatsu/manifest.json ]; then
              echo '## Generated manifest'
              echo '```json'
              cat assets/kuromatsu/manifest.json
              echo '```'
              echo
              echo '## Generated asset sizes'
              echo '```text'
              find assets/kuromatsu -type f -printf '%p %s bytes\n' | sort
              echo '```'
            fi
            for section in install model build validate; do
              echo
              echo "## ${section} log"
              echo '```text'
              tail -n 80 "/tmp/${section}.log" 2>/dev/null || true
              echo '```'
            done
          } > PHOTOREAL_BUILD_AUDIT.md

      - name: Commit candidate and audit to feature branch
        id: commit
        if: always()
        env:
          VALIDATE: ${{ steps.validate.outcome }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add PHOTOREAL_BUILD_AUDIT.md
          if [ "$VALIDATE" = 'success' ]; then
            git add assets/kuromatsu photo-assets.js sw.js PHOTOREAL_KUROMATSU_V3.md
          fi
          git diff --cached --quiet || git commit -m '黒松フォトリアルv3の生成結果と監査を記録'
          git push origin HEAD:agent/photoreal-upscale-v3
          echo "candidate_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Fast-forward main after candidate checks pass
        id: promote
        if: steps.validate.outcome == 'success'
        continue-on-error: true
        run: |
          git fetch origin main
          git merge-base --is-ancestor origin/main HEAD
          grep -Fq 'kuromatsu-photoreal-v3' assets/kuromatsu/manifest.json
          git push origin HEAD:main

      - name: Verify the public GitHub Pages build
        id: public
        if: steps.promote.outcome == 'success'
        continue-on-error: true
        env:
          PUBLIC_BASE: https://shotakabahara-collab.github.io/bonsai-app
          CANDIDATE: ${{ steps.commit.outputs.candidate_sha }}
        run: |
          ready=0
          for i in $(seq 1 100); do
            if curl -fsS --retry 2 "${PUBLIC_BASE}/photo-assets.js?candidate=${CANDIDATE}-${i}" -o /tmp/live-photo.js \
              && grep -Fq 'kuromatsu-photoreal-v3' /tmp/live-photo.js; then
              ready=1
              break
            fi
            sleep 6
          done
          test "$ready" = 1
          curl -fsS "${PUBLIC_BASE}/assets/kuromatsu/manifest.json?candidate=${CANDIDATE}" | grep -Fq 'kuromatsu-photoreal-v3'
          for pot in black starter blue moon old; do
            curl -fsS "${PUBLIC_BASE}/assets/kuromatsu/base/${pot}.webp?candidate=${CANDIDATE}" -o "/tmp/live-${pot}.webp"
            test "$(wc -c < "/tmp/live-${pot}.webp")" -gt 100000
          done
          curl -fsS "${PUBLIC_BASE}/sw.js?candidate=${CANDIDATE}" | grep -Fq 'kuromatsu-photoreal-v3'

      - name: Record promotion result in release issue
        if: always()
        uses: actions/github-script@v7
        env:
          INSTALL: ${{ steps.install.outcome }}
          MODEL: ${{ steps.model.outcome }}
          BUILD: ${{ steps.build.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
          PROMOTE: ${{ steps.promote.outcome }}
          PUBLIC: ${{ steps.public.outcome }}
          CANDIDATE: ${{ steps.commit.outputs.candidate_sha }}
        with:
          script: |
            const required = [process.env.INSTALL, process.env.BUILD, process.env.VALIDATE, process.env.PROMOTE, process.env.PUBLIC];
            const passed = required.every(value => value === 'success');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: `BONSAI release audit: ${passed ? 'PASS' : 'FAIL'}`,
              body: [
                '# BONSAI photoreal promotion audit',
                '',
                `- trigger SHA: \`${context.sha}\``,
                `- candidate SHA: \`${process.env.CANDIDATE || 'not-created'}\``,
                `- install: ${process.env.INSTALL || 'not-run'}`,
                `- EDSR model: ${process.env.MODEL || 'not-run'} (optional; Lanczos fallback supported)`,
                `- build: ${process.env.BUILD || 'not-run'}`,
                `- validation: ${process.env.VALIDATE || 'not-run'}`,
                `- main promotion: ${process.env.PROMOTE || 'not-run'}`,
                `- public Pages smoke: ${process.env.PUBLIC || 'not-run'}`,
                '- visual core: same-tree high-resolution black pine + five photographed pot states',
                '- existing state runtime: pruning / wiring / disease / pest / jin / shari / memorial snapshots',
                '- Pages URL: https://shotakabahara-collab.github.io/bonsai-app/',
                '',
                passed ? '全候補検査合格後にmainへ切り替え、公開実体まで確認しました。' : 'main切替条件を満たしていません。PHOTOREAL_BUILD_AUDIT.md を確認してください。'
              ].join('\n'),
              state: passed ? 'closed' : 'open',
              ...(passed ? {state_reason: 'completed'} : {})
            });

      - name: Fail when promotion contract is incomplete
        if: always() && (steps.install.outcome != 'success' || steps.build.outcome != 'success' || steps.validate.outcome != 'success' || steps.promote.outcome != 'success' || steps.public.outcome != 'success')
        run: exit 1
