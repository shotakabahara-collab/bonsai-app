name: Finalize Photoreal Craft v6 source

on:
  push:
    branches: [agent/photoreal-craft-v6]
    paths:
      - '.photoreal-v6-final.ready'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-photoreal-craft-v6-source
  cancel-in-progress: false

jobs:
  apply-audit-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/photoreal-craft-v6
          fetch-depth: 0

      - name: Apply SHA-verified final source patch
        run: |
          set -euxo pipefail
          echo '34c9c45cd2bf35491341271e1ab1c347335fbf06465c474bee19621bbbbc496d  .photoreal-v6-final.patch.xz' | sha256sum -c -
          xz -t .photoreal-v6-final.patch.xz
          xz -dc .photoreal-v6-final.patch.xz | git apply --whitespace=error
          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install, typecheck, model audit and production build
        working-directory: next
        run: |
          npm ci
          npm run typecheck
          npm run test:photoreal:unit
          npm run build
          node --check tests/smoke.mjs
          node --check tests/seasonal-v4.mjs
          node --check tests/authentic-v5.mjs
          python -m py_compile scripts/visual-audit-v6.py

      - name: Install iPhone WebKit and image audit tools
        working-directory: next
        run: |
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow

      - name: Start verified production preview
        working-directory: next
        run: |
          setsid npm run preview >/tmp/bonsai-photoreal-v6-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-photoreal-v6-preview.pid
          for i in $(seq 1 100); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          cat /tmp/bonsai-photoreal-v6-preview.log
          exit 1

      - name: Run 390x844 DPR3 WebKit regressions
        working-directory: next
        run: |
          npm run test:smoke
          node tests/seasonal-v4.mjs
          npm run test:photoreal

      - name: Audit photograph registration and reject pasted effects
        working-directory: next
        run: python scripts/visual-audit-v6.py --output photoreal-v6-final-visual-audit.json

      - name: Stop preview
        if: always()
        run: |
          test -f /tmp/bonsai-photoreal-v6-preview.pid && kill -TERM -- -"$(cat /tmp/bonsai-photoreal-v6-preview.pid)" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-photoreal-craft-v6-final-preflight
          path: |
            next/test-artifacts
            /tmp/bonsai-photoreal-v6-preview.log
          if-no-files-found: warn
          retention-days: 14

      - name: Commit only audited application source
        run: |
          rm -rf next/.test-cjs next/scripts/__pycache__
          rm -f .photoreal-v6-final.patch.xz .photoreal-v6-final.ready
          rm -f .github/workflows/finalize-photoreal-v6-source.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git status --short
          git commit -m '針金・神・舎利を写真座標へ密着させるPhotoreal Craft v6を実装'
          git push origin HEAD:agent/photoreal-craft-v6
