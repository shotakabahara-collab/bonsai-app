name: Final audit Material Preview v11 R2

on:
  issues:
    types: [edited]

permissions:
  contents: read
  issues: write

concurrency:
  group: final-audit-material-preview-v11-r2
  cancel-in-progress: false

jobs:
  final-audit-r2:
    if: github.event.issue.number == 1 && github.event.issue.title == '[FINAL AUDIT V11 R2] Black Pineとオフラインを再検証'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/material-preview-floor-neutralization-v11
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json
      - name: Install and build audited branch
        id: build
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless
          npm run typecheck
          npm run test:photoreal:unit
          npm run test:gameplay:unit
          npm run build
      - name: Start production preview
        id: preview
        working-directory: next
        run: |
          setsid npm run preview >/tmp/v11-r2-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/v11-r2-preview.pid
          echo "$server" >/tmp/bonsai-photoreal-v7-preview.pid
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          exit 1
      - name: Verify v10 wall and v11 lower floor
        id: material
        working-directory: next
        run: |
          node tests/material-preview-v10.mjs
          node tests/material-preview-v11.mjs
      - name: Verify Black Pine operation and pixel audit
        id: blackpine
        working-directory: next
        run: |
          npm run test:black-pine-v9
          python scripts/audit-black-pine-state-v9.py
      - name: Verify Photoreal and complete offline restart
        id: photoreal
        working-directory: next
        run: npm run test:photoreal
      - name: Stop preview
        if: always()
        run: |
          if test -f /tmp/v11-r2-preview.pid; then
            server="$(cat /tmp/v11-r2-preview.pid)"
            kill -TERM -- -"$server" 2>/dev/null || kill "$server" 2>/dev/null || true
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: material-preview-v11-r2-audit
          path: |
            next/test-artifacts
            next/black-pine-state-v9-visual-audit.json
            /tmp/v11-r2-preview.log
          if-no-files-found: warn
          retention-days: 14
      - name: Record R2 audit
        if: always()
        uses: actions/github-script@v7
        env:
          BUILD: ${{ steps.build.outcome }}
          PREVIEW: ${{ steps.preview.outcome }}
          MATERIAL: ${{ steps.material.outcome }}
          BLACKPINE: ${{ steps.blackpine.outcome }}
          PHOTOREAL: ${{ steps.photoreal.outcome }}
        with:
          script: |
            const outcomes = {
              build: process.env.BUILD || 'not-run', preview: process.env.PREVIEW || 'not-run',
              material: process.env.MATERIAL || 'not-run', blackpine: process.env.BLACKPINE || 'not-run',
              photoreal: process.env.PHOTOREAL || 'not-run'
            };
            const passed = Object.values(outcomes).every(value => value === 'success');
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: 1,
              title: passed ? 'BONSAI Material Preview v11: FINAL AUDIT PASS / 統合可能' : 'BONSAI Material Preview v11: FINAL AUDIT R2 FAIL',
              body: [
                '# Material Preview v11 最終監査 R2','',
                ...Object.entries(outcomes).map(([key,value]) => `- ${key}: ${value}`),'',
                '- lower brown floor neutralization: required',
                '- Black Pine photographed states and pixel audit: required',
                '- Photoreal save/reload and complete offline restart: required'
              ].join('\n'),
              state: 'open', state_reason: 'reopened'
            });
