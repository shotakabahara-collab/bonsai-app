name: Materialize Material Preview v10 from Issue

on:
  issues:
    types: [edited]

permissions:
  contents: write
  issues: write

concurrency:
  group: materialize-preview-v10-from-issue
  cancel-in-progress: false

jobs:
  repair:
    if: github.event.issue.number == 1 && github.event.issue.title == '[MATERIALIZE V10] 黒松候補の背景修復を確定'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/material-preview-brown-neutralization-v10
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: |
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless
          cd next
          npm ci
          npx playwright install --with-deps webkit

      - name: Repair base photographs and release markers
        id: repair
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: |
          python next/scripts/repair-material-backdrops-v10.py 2>&1 | tee /tmp/material-preview-v10-repair.log
          grep -Fq "bonsai-material-preview-v10" next/public/sw.js
          git diff --check

      - name: Typecheck and build
        id: build
        if: steps.repair.outcome == 'success'
        continue-on-error: true
        working-directory: next
        run: |
          npm run typecheck
          npm run test:photoreal:unit
          npm run test:gameplay:unit
          npm run build

      - name: Start preview
        id: preview
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: next
        run: |
          setsid npm run preview >/tmp/material-preview-v10.log 2>&1 &
          server=$!
          echo "$server" >/tmp/material-preview-v10.pid
          echo "$server" >/tmp/bonsai-photoreal-v7-preview.pid
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          cat /tmp/material-preview-v10.log
          exit 1

      - name: Run iPhone and regression audits
        id: audit
        if: steps.preview.outcome == 'success'
        continue-on-error: true
        working-directory: next
        run: |
          set -o pipefail
          npm run test:gameplay 2>&1 | tee /tmp/material-preview-v10-audit.log
          npm run test:photoreal 2>&1 | tee -a /tmp/material-preview-v10-audit.log

      - name: Stop preview
        if: always()
        run: |
          if test -f /tmp/material-preview-v10.pid; then
            server="$(cat /tmp/material-preview-v10.pid)"
            kill -TERM -- -"$server" 2>/dev/null || kill "$server" 2>/dev/null || true
          fi

      - name: Commit audited repair to PR branch
        id: commit
        if: steps.audit.outcome == 'success'
        continue-on-error: true
        run: |
          rm -rf next/node_modules next/dist next/test-artifacts next/scripts/__pycache__
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          test -n "$(git diff --cached --name-only)"
          git commit -m 'Material Preview v10：色付き背景を写真内修復'
          git push origin HEAD:agent/material-preview-brown-neutralization-v10

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: material-preview-v10-from-issue-audit
          path: |
            next/material-preview-v10-assets.json
            next/test-artifacts/material-preview-v10-result.json
            next/test-artifacts/material-preview-v10-iphone.png
            /tmp/material-preview-v10-repair.log
            /tmp/material-preview-v10-audit.log
            /tmp/material-preview-v10.log
          if-no-files-found: warn
          retention-days: 14

      - name: Record materialization diagnostics
        if: always()
        uses: actions/github-script@v7
        env:
          INSTALL: ${{ steps.install.outcome }}
          REPAIR: ${{ steps.repair.outcome }}
          BUILD: ${{ steps.build.outcome }}
          PREVIEW: ${{ steps.preview.outcome }}
          AUDIT: ${{ steps.audit.outcome }}
          COMMIT: ${{ steps.commit.outcome }}
        with:
          script: |
            const fs = require('fs');
            const outcomes = {
              install: process.env.INSTALL || 'not-run',
              repair: process.env.REPAIR || 'not-run',
              build: process.env.BUILD || 'not-run',
              preview: process.env.PREVIEW || 'not-run',
              audit: process.env.AUDIT || 'not-run',
              commit: process.env.COMMIT || 'not-run'
            };
            const success = Object.values(outcomes).every(value => value === 'success');
            const read = path => fs.existsSync(path) ? fs.readFileSync(path, 'utf8').slice(-6000) : '(not created)';
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: success ? 'BONSAI Material Preview v10: MATERIALIZED / PR監査中' : 'BONSAI Material Preview v10: MATERIALIZE FAIL',
              body: [
                '# Material Preview v10 生成診断', '',
                ...Object.entries(outcomes).map(([name, value]) => `- ${name}: ${value}`), '',
                '## Repair log', '```text', read('/tmp/material-preview-v10-repair.log'), '```', '',
                '## Material audit result', '```json', read('next/test-artifacts/material-preview-v10-result.json'), '```', '',
                '## Audit log', '```text', read('/tmp/material-preview-v10-audit.log'), '```'
              ].join('\n'),
              state: 'open'
            });

      - name: Fail incomplete materialization
        if: always() && (steps.install.outcome != 'success' || steps.repair.outcome != 'success' || steps.build.outcome != 'success' || steps.preview.outcome != 'success' || steps.audit.outcome != 'success' || steps.commit.outcome != 'success')
        run: exit 1
