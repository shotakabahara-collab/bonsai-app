name: Force Publish Material Preview v10

on:
  issues:
    types: [edited]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages-v10-force
  cancel-in-progress: false

env:
  BONSAI_RELEASE: bonsai-material-preview-v10

jobs:
  build:
    if: github.event.issue.number == 1 && github.event.issue.title == '[FORCE PUBLISH V10] 修復版を配信'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install dependencies
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless

      - name: Build and audit repaired candidate photographs
        working-directory: next
        run: |
          npm run typecheck
          npm run test:gameplay:unit
          npm run test:photoreal:unit
          npm run build
          grep -Fq "$BONSAI_RELEASE" public/sw.js
          test "$(wc -c < public/assets/kuromatsu/base/starter.webp)" -gt 100000
          test "$(wc -c < public/assets/kuromatsu/base/old.webp)" -gt 100000
          test "$(wc -c < public/assets/kuromatsu/base/blue.webp)" -gt 100000
          setsid npm run preview >/tmp/v10-force-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-photoreal-v7-preview.pid
          trap 'kill -TERM -- -$server 2>/dev/null || true' EXIT
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && break
            sleep .25
          done
          npm run test:gameplay
          npm run test:photoreal

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: next/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy v10 bundle
        id: deployment
        uses: actions/deploy-pages@v4

  public:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install public audit dependencies
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless

      - name: Wait for v10 public release
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          base="${PAGE_URL%/}/"
          ready=0
          for i in $(seq 1 160); do
            if curl -fsS "${base}sw.js?v=${GITHUB_RUN_ID}-${i}" -o /tmp/live-sw.js \
              && grep -Fq "$BONSAI_RELEASE" /tmp/live-sw.js; then
              ready=1
              break
            fi
            sleep 3
          done
          test "$ready" = 1

      - name: Verify public repaired images and iPhone flow
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: |
          npm run test:gameplay
          npm run test:photoreal
          base="${BONSAI_BASE_URL%/}/"
          for name in starter old blue; do
            curl -fsS "${base}assets/kuromatsu/base/${name}.webp?v=${GITHUB_RUN_ID}" -o "/tmp/${name}.webp"
            test "$(wc -c < /tmp/${name}.webp)" -gt 100000
          done

  report:
    needs: [build, deploy, public]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Record forced publication result
        uses: actions/github-script@v7
        env:
          BUILD: ${{ needs.build.result }}
          DEPLOY: ${{ needs.deploy.result }}
          PUBLIC: ${{ needs.public.result }}
        with:
          script: |
            const outcomes = {
              build: process.env.BUILD || 'not-run',
              deploy: process.env.DEPLOY || 'not-run',
              public: process.env.PUBLIC || 'not-run'
            };
            const passed = Object.values(outcomes).every(value => value === 'success');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: passed ? 'BONSAI Material Preview v10: PUBLISHED / iPhone確認待ち' : 'BONSAI Material Preview v10: FORCE PUBLISH FAIL',
              body: [
                '# Material Preview v10 強制公開結果', '',
                ...Object.entries(outcomes).map(([name, value]) => `- ${name}: ${value}`), '',
                '- release: `bonsai-material-preview-v10`',
                '- Pages URL: https://shotakabahara-collab.github.io/bonsai-app/',
                '- starter / old / blue colored rectangular backdrops: repaired',
                '- black bottom band: unchanged'
              ].join('\n'),
              state: 'open'
            });
