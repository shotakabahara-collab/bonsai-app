name: Apply authentic bonsai craft v3

on:
  push:
    branches: [feature/training-lifecycle-v3]
    paths:
      - 'scripts/apply_training_lifecycle_v3.py'
      - 'scripts/fix_training_v3_test.py'
      - 'scripts/fix_training_v3_normalization.py'
      - 'scripts/fix_training_v3_state_sync.py'
      - 'scripts/fix_training_v3_event_sync.py'
      - 'scripts/fix_training_v3_tab_sync.py'
      - 'scripts/fix_training_v3_persist_return.py'
      - 'scripts/fix_training_v3_wire_wait.py'
      - 'scripts/fix_training_v3_show_wait.py'
      - 'scripts/fix_training_v3_visual_audit.py'
      - '.github/workflows/apply-training-lifecycle-v3.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: authentic-bonsai-craft-v3-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/training-lifecycle-v3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json
      - name: Apply craft model and interface
        run: |
          python scripts/apply_training_lifecycle_v3.py
          python scripts/fix_training_v3_normalization.py
          python scripts/fix_training_v3_state_sync.py
          python scripts/fix_training_v3_event_sync.py
          python scripts/fix_training_v3_tab_sync.py
          python scripts/fix_training_v3_persist_return.py
          python scripts/fix_training_v3_test.py
          python scripts/fix_training_v3_wire_wait.py
          python scripts/fix_training_v3_show_wait.py
          python scripts/fix_training_v3_visual_audit.py
      - name: Install exact dependencies
        working-directory: next
        run: npm ci
      - name: Typecheck and production build
        working-directory: next
        run: npm run build
      - name: Commit typechecked feature source for direct inspection
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add next scripts/apply_training_lifecycle_v3.py scripts/fix_training_v3_test.py scripts/fix_training_v3_normalization.py scripts/fix_training_v3_state_sync.py scripts/fix_training_v3_event_sync.py scripts/fix_training_v3_tab_sync.py scripts/fix_training_v3_persist_return.py scripts/fix_training_v3_wire_wait.py scripts/fix_training_v3_show_wait.py scripts/fix_training_v3_visual_audit.py .github/workflows/apply-training-lifecycle-v3.yml
          git diff --cached --quiet || git commit -m '精密制作v3の型検査済みソースを固定'
          git push origin HEAD:feature/training-lifecycle-v3
      - name: Install iPhone WebKit and image audit tools
        working-directory: next
        run: |
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow
      - name: Run full iPhone-sized interaction audit
        run: |
          cd next
          npm run preview >/tmp/bonsai-craft-v3-preview.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 80); do curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && break; sleep .25; done
          npm run test:smoke
      - name: Verify visible iPhone screenshots are not blank
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image, ImageStat
          import json

          root = Path('next/test-artifacts')
          checked = {}
          for name in ('01-grow-visible.png', '02b-wire-coils.png', '03-show-visible.png'):
              path = root / name
              if not path.exists() or path.stat().st_size < 250_000:
                  raise SystemExit(f'{name}: missing or suspiciously small')
              image = Image.open(path).convert('RGB')
              width, height = image.size
              crop = image.crop((0, int(height * .10), width, int(height * .82))).resize((96, 160)).convert('L')
              stat = ImageStat.Stat(crop)
              pixels = list(crop.getdata())
              bright = sum(value > 42 for value in pixels) / len(pixels)
              checked[name] = {'size':[width,height], 'bytes':path.stat().st_size, 'mean':stat.mean[0], 'variance':stat.var[0], 'brightRatio':bright}
              if stat.mean[0] < 16 or stat.var[0] < 220 or bright < .05:
                  raise SystemExit(f'{name}: blank/hidden artwork {checked[name]}')
          (root / 'craft-v3-visual-audit.json').write_text(json.dumps(checked, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(checked, ensure_ascii=False))
          PY
      - name: Verify fertilizer removal and craft contracts
        run: |
          ! grep -R --line-number --exclude='package-lock.json' '施肥' next/src next/dist
          ! grep -R --line-number --exclude='package-lock.json' 'fertilizer:' next/src next/dist
          grep -Fq 'data-total-sites' next/src/CraftPanels.tsx
          grep -Fq '針金を装着中' next/src/craft-v3.ts
          grep -Fq '風化完成していない' next/src/craft-v3.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: authentic-bonsai-craft-v3-audit
          path: next/test-artifacts
          if-no-files-found: warn
