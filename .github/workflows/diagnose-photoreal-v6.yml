name: Diagnose Photoreal Craft v6 payload

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/diagnose-photoreal-v6.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'agent/photoreal-craft-v6' }}
          fetch-depth: 0
      - name: Inspect every retained payload candidate
        run: |
          set +e
          out=/tmp/photoreal-v6-diagnostic
          mkdir -p "$out"
          cat .photoreal-v6-payload/bin-* > "$out/assembled-bins.xz" 2>"$out/assembled-bins-cat.log"
          for spec in \
            source:.photoreal-v6-source.patch.xz \
            changes:.photoreal-v6-payload/changes.patch.xz \
            assembled:$out/assembled-bins.xz \
            final:.photoreal-v6-final.patch.xz; do
            name="${spec%%:*}"
            file="${spec#*:}"
            if test ! -f "$file"; then
              echo missing > "$out/$name.missing"
              continue
            fi
            sha256sum "$file" > "$out/$name.sha256.txt"
            wc -c "$file" > "$out/$name.size.txt"
            xz -t "$file" > "$out/$name.xz-test.log" 2>&1
            echo $? > "$out/$name.xz-test.status"
            xz -dc "$file" > "$out/$name.patch" 2> "$out/$name.decompress.log"
            echo $? > "$out/$name.decompress.status"
            git apply --check --verbose "$out/$name.patch" > "$out/$name.apply-check.log" 2>&1
            echo $? > "$out/$name.apply-check.status"
          done
          git status --short > "$out/status.txt"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: photoreal-v6-payload-diagnostic
          path: /tmp/photoreal-v6-diagnostic
          if-no-files-found: error
          retention-days: 3
