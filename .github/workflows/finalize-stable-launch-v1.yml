name: Finalize BONSAI stable launch v1

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-stable-launch-v1.yml'
      - 'scripts/finalize_stable_launch.py'
      - 'tests/stable_launch_webkit.mjs'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: bonsai-stable-launch-v1
  cancel-in-progress: false

jobs:
  finalize-test-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build direct-launch stable package
        id: build
        continue-on-error: true
        run: |
          python scripts/finalize_stable_launch.py > /tmp/stable-build.log 2>&1
          git checkout -- .github/workflows/pages.yml

      - name: Validate generated files and JavaScript
        id: static
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          python -m py_compile scripts/finalize_stable_launch.py 2>&1 | tee /tmp/stable-static.log
          node --check tests/stable_launch_webkit.mjs 2>&1 | tee -a /tmp/stable-static.log
          node --check sw.js 2>&1 | tee -a /tmp/stable-static.log
          for file in photo-assets.js tree-renderer.js advanced-care.js advanced-care-bridge.js completion-core.js judging-engine.js state-image-runtime.js; do
            node --check "$file" 2>&1 | tee -a /tmp/stable-static.log
          done
          test -s index.html
          test -s app.html
          test -s offline-app.html
          test -s repair.html
          test -s release.json
          grep -Fq 'stable-launch-v1-20260718' index.html
          grep -Fq 'normalizeSavedState' index.html
          grep -Fq 'bonsai-stable-worker' index.html
          grep -Fq 'advanced-care.js' index.html
          grep -Fq 'state-image-runtime.js' index.html
          grep -Fq '起動キャッシュを修復' repair.html
          grep -Fq 'stable-launch-v1-20260718' release.json
          grep -Fq 'network-first' release.json
          grep -Fq "event.request.mode==='navigate'" sw.js
          grep -Fq "cache:'no-store'" sw.js
          python - <<'PY' 2>&1 | tee -a /tmp/stable-static.log
          import json
          from pathlib import Path
          manifest=json.loads(Path('manifest.webmanifest').read_text(encoding='utf-8'))
          assert manifest['id']=='./stable-launch-v1'
          assert 'stable-launch-v1-20260718' in manifest['start_url']
          assert manifest['scope']=='./'
          assert manifest['display']=='standalone'
          print('stable launch generated-file contracts: PASS')
          PY

      - name: Install iPhone WebKit tools
        id: install
        if: steps.static.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm install --no-save playwright@1.52.0 2>&1 | tee /tmp/stable-install.log
          npx playwright install --with-deps webkit 2>&1 | tee -a /tmp/stable-install.log
          python -m pip install --disable-pip-version-check pillow 2>&1 | tee -a /tmp/stable-install.log

      - name: Test legacy save migration, repair and visible launch
        id: local
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          python3 -m http.server 4173 >/tmp/bonsai-stable-http.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          BONSAI_BASE_URL=http://127.0.0.1:4173/ node tests/stable_launch_webkit.mjs 2>&1 | tee /tmp/stable-local.log
          python3 <<'PY' 2>&1 | tee -a /tmp/stable-local.log
          from pathlib import Path
          from PIL import Image
          for name in ['01-migrated-app.png','02-repaired-app.png']:
              path=Path('stable-launch-artifacts')/name
              image=Image.open(path).convert('RGB').resize((80,160))
              pixels=list(image.getdata())
              white=sum(1 for r,g,b in pixels if r>246 and g>246 and b>246)/len(pixels)
              if white>.55:
                  raise SystemExit(f'{name}: white-screen ratio {white:.3f}')
              print(name,'white_ratio',round(white,4))
          PY

      - name: Commit verified stable package
        id: commit
        if: steps.local.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add index.html app.html offline-app.html repair.html recovery-v4.html manifest.webmanifest sw.js release.json
            git diff --cached --quiet || git commit -m 'BONSAIを単一画面・保存保持・network-first起動へ最終統合'
            git push origin HEAD:main
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          } 2>&1 | tee /tmp/stable-commit.log

      - uses: actions/configure-pages@v5
        id: configure
        if: steps.commit.outcome == 'success'
        continue-on-error: true

      - uses: actions/upload-pages-artifact@v3
        id: artifact
        if: steps.configure.outcome == 'success'
        continue-on-error: true
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
        if: steps.artifact.outcome == 'success'
        continue-on-error: true

      - name: Test the deployed app in iPhone WebKit
        id: public
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        env:
          BONSAI_BASE_URL: ${{ steps.deployment.outputs.page_url }}
          BONSAI_PUBLIC: '1'
          RELEASE_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          set -o pipefail
          node tests/stable_launch_webkit.mjs 2>&1 | tee /tmp/stable-public.log
          base="${BONSAI_BASE_URL%/}/"
          curl --fail --silent --show-error --retry 20 --retry-delay 3 --retry-all-errors "${base}release.json?v=${RELEASE_SHA}" | grep -Fq 'stable-launch-v1-20260718'
          curl --fail --silent --show-error --retry 20 --retry-delay 3 --retry-all-errors "${base}repair.html?v=${RELEASE_SHA}" | grep -Fq '起動キャッシュを修復'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-stable-launch-v1-audit
          path: stable-launch-artifacts
          if-no-files-found: warn

      - name: Record final launch audit
        if: always()
        uses: actions/github-script@v7
        env:
          BUILD: ${{ steps.build.outcome }}
          STATIC: ${{ steps.static.outcome }}
          INSTALL: ${{ steps.install.outcome }}
          LOCAL: ${{ steps.local.outcome }}
          COMMIT: ${{ steps.commit.outcome }}
          CONFIGURE: ${{ steps.configure.outcome }}
          ARTIFACT: ${{ steps.artifact.outcome }}
          DEPLOY: ${{ steps.deployment.outcome }}
          PUBLIC: ${{ steps.public.outcome }}
          RELEASE_SHA: ${{ steps.commit.outputs.sha }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const fs=require('fs');
            const names=['build','static','install','local','commit','public'];
            const logs=names.map(name=>{
              try{return `### ${name}\n\`\`\`text\n${fs.readFileSync(`/tmp/stable-${name}.log`,'utf8').slice(-3000)}\n\`\`\``}
              catch{return `### ${name}\n(no log)`}
            }).join('\n\n');
            const values={build:process.env.BUILD,static:process.env.STATIC,install:process.env.INSTALL,local:process.env.LOCAL,commit:process.env.COMMIT,configure:process.env.CONFIGURE,artifact:process.env.ARTIFACT,deploy:process.env.DEPLOY,public:process.env.PUBLIC};
            const passed=Object.values(values).every(value=>value==='success');
            await github.rest.issues.update({
              owner:context.repo.owner,
              repo:context.repo.repo,
              issue_number:1,
              title:`BONSAI stable launch audit: ${passed?'PASS':'FAIL'}`,
              body:[
                '# BONSAI 安定起動・最終公開監査','',
                `- release SHA: \`${process.env.RELEASE_SHA||'not-created'}\``,
                ...Object.entries(values).map(([key,value])=>`- ${key}: ${value||'not-run'}`),
                `- Pages URL: ${process.env.PAGE_URL||'https://shotakabahara-collab.github.io/bonsai-app/'}`,'',
                logs,'',passed?'公開中の実URLでゲーム画面の起動まで確認しました。':'失敗工程のログを上に記録しました。'
              ].join('\n'),
              state:passed?'closed':'open',
              ...(passed?{state_reason:'completed'}:{state_reason:'reopened'})
            });

      - name: Fail unless every launch stage passes
        if: always() && (steps.build.outcome != 'success' || steps.static.outcome != 'success' || steps.install.outcome != 'success' || steps.local.outcome != 'success' || steps.commit.outcome != 'success' || steps.configure.outcome != 'success' || steps.artifact.outcome != 'success' || steps.deployment.outcome != 'success' || steps.public.outcome != 'success')
        run: exit 1
