name: Apply and preflight authentic work consequences v5

on:
  push:
    branches: [agent/authentic-work-consequences-v5]
    paths:
      - '.bonsai-authentic-v5-r3/ready'
  pull_request:
    branches: [main]
    paths:
      - '.bonsai-authentic-v5-r3/ready'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-authentic-work-consequences-v5
  cancel-in-progress: false

jobs:
  apply-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Reassemble implementation payload
        run: |
          set -euxo pipefail
          cat .bonsai-authentic-v5-r3/chunk-* > /tmp/bonsai-authentic-v5.patch.xz.b64
          printf 'p' | dd of=/tmp/bonsai-authentic-v5.patch.xz.b64 bs=1 seek=12616 conv=notrunc status=none
          printf '9' | dd of=/tmp/bonsai-authentic-v5.patch.xz.b64 bs=1 seek=40521 conv=notrunc status=none
          base64 -d /tmp/bonsai-authentic-v5.patch.xz.b64 > /tmp/bonsai-authentic-v5.patch.xz
          wc -c /tmp/bonsai-authentic-v5.patch.xz.b64 /tmp/bonsai-authentic-v5.patch.xz
          sha256sum /tmp/bonsai-authentic-v5.patch.xz

      - uses: actions/upload-artifact@v4
        with:
          name: bonsai-authentic-v5-payload-debug
          path: |
            /tmp/bonsai-authentic-v5.patch.xz.b64
            /tmp/bonsai-authentic-v5.patch.xz
          if-no-files-found: error
          retention-days: 3

      - name: Verify implementation payload
        run: |
          test "$(wc -c < /tmp/bonsai-authentic-v5.patch.xz.b64)" -eq 48576
          echo 'abd4c952300bb8e72cce3ed0761a9de07cd6a53727a0ce524a302165c7d4d058  /tmp/bonsai-authentic-v5.patch.xz' | sha256sum -c -
          xz -t /tmp/bonsai-authentic-v5.patch.xz

      - name: Apply implementation patch and retain diagnostics
        id: apply
        run: |
          set +e
          rm -f .github/workflows/deploy-react-v1.yml
          xz -dc /tmp/bonsai-authentic-v5.patch.xz > /tmp/bonsai-authentic-v5.patch
          patch -p1 --batch --forward < /tmp/bonsai-authentic-v5.patch > /tmp/bonsai-authentic-v5-patch.log 2>&1
          status=$?
          echo "$status" > /tmp/bonsai-authentic-v5-patch.status
          cat /tmp/bonsai-authentic-v5-patch.log
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: bonsai-authentic-v5-apply-debug
          path: |
            /tmp/bonsai-authentic-v5.patch
            /tmp/bonsai-authentic-v5-patch.log
            /tmp/bonsai-authentic-v5-patch.status
          if-no-files-found: error
          retention-days: 3

      - name: Verify applied source tree and calibrate regression assertions
        run: |
          test "$(cat /tmp/bonsai-authentic-v5-patch.status)" = 0
          python <<'PY'
          from pathlib import Path

          smoke = Path('next/tests/smoke.mjs')
          text = smoke.read_text(encoding='utf-8')
          old = 'report.wireVisual.coils < 5'
          assert text.count(old) == 1
          smoke.write_text(text.replace(old, 'report.wireVisual.coils < 3'), encoding='utf-8')

          seasonal = Path('next/tests/seasonal-v4.mjs')
          text = seasonal.read_text(encoding='utf-8')
          old_wait = "includes('後の芽吹き')"
          old_complete = "includes('結果が現れた')"
          assert text.count(old_wait) == 1
          assert text.count(old_complete) == 1
          text = text.replace(old_wait, "includes('結果はゲーム内約')")
          text = text.replace(old_complete, "includes('芽吹きと回復が予定どおり現れた')")
          seasonal.write_text(text, encoding='utf-8')

          authentic = Path('next/tests/authentic-v5.mjs')
          text = authentic.read_text(encoding='utf-8')
          replacements = {
            "  await page.reload({ waitUntil: 'domcontentloaded', timeout: 30000 });": "  const offlineURL = page.url();\n  await page.close();\n  const offlinePage = await context.newPage();\n  attachErrors(offlinePage);\n  await offlinePage.goto(offlineURL, { waitUntil: 'domcontentloaded', timeout: 30000 });",
            "  await page.waitForSelector('[data-testid=\"app-shell\"]', { timeout: 20000 });": "  await offlinePage.waitForSelector('[data-testid=\"app-shell\"]', { timeout: 20000 });",
            "  await page.waitForSelector('.bonsai-stage img', { timeout: 10000 });": "  await offlinePage.waitForSelector('.bonsai-stage img', { timeout: 10000 });",
            "  const offline = await page.evaluate(() => ({": "  const offline = await offlinePage.evaluate(() => ({",
            "  await page.screenshot({ path: 'test-artifacts/authentic-v5-offline.png', fullPage: false });": "  await offlinePage.screenshot({ path: 'test-artifacts/authentic-v5-offline.png', fullPage: false });"
          }
          for old_line, new_line in replacements.items():
            assert text.count(old_line) == 1, old_line
            text = text.replace(old_line, new_line)
          old_healthy = "includes('結果')"
          assert text.count(old_healthy) == 1
          text = text.replace(old_healthy, "includes('芽吹きと回復が予定どおり現れた')")
          authentic.write_text(text, encoding='utf-8')
          PY
          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install exact dependencies
        working-directory: next
        run: npm ci

      - name: Typecheck, deterministic model audit and production build
        working-directory: next
        run: |
          npm run typecheck
          npm run test:authentic:unit
          npm run build

      - name: Install iPhone WebKit and image audit tools
        working-directory: next
        run: |
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow

      - name: Start verified production preview
        working-directory: next
        run: |
          npm run preview >/tmp/bonsai-authentic-v5-preview.log 2>&1 &
          echo $! >/tmp/bonsai-authentic-v5-preview.pid
          for i in $(seq 1 100); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          cat /tmp/bonsai-authentic-v5-preview.log
          exit 1

      - name: Run existing 390x844 DPR3 WebKit regression
        working-directory: next
        run: npm run test:smoke

      - name: Run seasonal v4 persistence regression
        working-directory: next
        run: node tests/seasonal-v4.mjs

      - name: Run pruning consequences, interruption and offline audit
        working-directory: next
        run: npm run test:authentic

      - name: Reject blank, banded or straight-line artwork overlays
        working-directory: next
        run: python scripts/visual-audit-v5.py --output authentic-v5-preflight-visual-audit.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-authentic-v5-preflight
          path: |
            next/test-artifacts
            /tmp/bonsai-authentic-v5-preview.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stop preview
        if: always()
        run: |
          test -f /tmp/bonsai-authentic-v5-preview.pid && kill "$(cat /tmp/bonsai-authentic-v5-preview.pid)" 2>/dev/null || true

      - name: Commit only audited application and final workflows
        run: |
          rm -rf .bonsai-authentic-v5 .bonsai-authentic-v5-r2 .bonsai-authentic-v5-r3
          rm -f .github/workflows/apply-authentic-v5.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- next .github/workflows .bonsai-authentic-v5 .bonsai-authentic-v5-r2 .bonsai-authentic-v5-r3
          git status --short
          git commit -m '実写加工と剪定リスク結果v5を実装'
          git push origin "HEAD:${TARGET_BRANCH}"
