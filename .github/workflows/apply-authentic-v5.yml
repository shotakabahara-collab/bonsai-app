name: Apply and preflight authentic work consequences v5

on:
  push:
    branches: [agent/authentic-work-consequences-v5]
    paths:
      - '.bonsai-authentic-v5/ready'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-authentic-work-consequences-v5
  cancel-in-progress: false

jobs:
  apply-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble and verify implementation payload
        run: |
          cat .bonsai-authentic-v5/chunk-* > /tmp/bonsai-authentic-v5.b64
          base64 -d /tmp/bonsai-authentic-v5.b64 > /tmp/bonsai-authentic-v5.tar.gz
          echo 'dd8eab191996b7d371942be919cd5b44a7c90b7b7a510910509a5f3ef2f3876d  /tmp/bonsai-authentic-v5.tar.gz' | sha256sum -c -
          tar -xzf /tmp/bonsai-authentic-v5.tar.gz
          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install exact dependencies
        working-directory: next
        run: npm ci

      - name: Typecheck, deterministic model audit and production build
        working-directory: next
        run: |
          npm run typecheck
          npm run test:authentic:unit
          npm run build

      - name: Install iPhone WebKit and image audit tools
        working-directory: next
        run: |
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow

      - name: Run 390x844 DPR3 WebKit regression, consequences and offline audits
        working-directory: next
        run: |
          npm run preview >/tmp/bonsai-authentic-v5-preview.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 100); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && break
            sleep .25
          done
          curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null
          npm run test:smoke
          node tests/seasonal-v4.mjs
          npm run test:authentic
          python scripts/visual-audit-v5.py --output authentic-v5-preflight-visual-audit.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-authentic-v5-preflight
          path: |
            next/test-artifacts
            /tmp/bonsai-authentic-v5-preview.log
          if-no-files-found: warn
          retention-days: 14

      - name: Commit only the audited application and final workflows
        run: |
          rm -rf .bonsai-authentic-v5
          rm -f .github/workflows/apply-authentic-v5.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- next .github/workflows .bonsai-authentic-v5
          git status --short
          git commit -m '実写加工と剪定リスク結果v5を実装'
          git push origin "HEAD:${GITHUB_REF_NAME}"
