name: Apply and preflight authentic work consequences v5

on:
  push:
    branches: [agent/authentic-work-consequences-v5]
    paths: ['.bonsai-authentic-v5-r3/ready']
  pull_request:
    branches: [main]
    paths: ['.bonsai-authentic-v5-r3/ready']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-authentic-work-consequences-v5
  cancel-in-progress: false

jobs:
  apply-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Apply SHA-verified implementation patch
        run: |
          set -euxo pipefail
          cat .bonsai-authentic-v5-r3/chunk-* > /tmp/payload.b64
          printf 'p' | dd of=/tmp/payload.b64 bs=1 seek=12616 conv=notrunc status=none
          printf '9' | dd of=/tmp/payload.b64 bs=1 seek=40521 conv=notrunc status=none
          test "$(wc -c < /tmp/payload.b64)" -eq 48576
          base64 -d /tmp/payload.b64 > /tmp/payload.xz
          echo 'abd4c952300bb8e72cce3ed0761a9de07cd6a53727a0ce524a302165c7d4d058  /tmp/payload.xz' | sha256sum -c -
          xz -t /tmp/payload.xz
          rm -f .github/workflows/deploy-react-v1.yml
          xz -dc /tmp/payload.xz | patch -p1 --batch --forward
          git diff --check

      - name: Calibrate regressions, complete offline shell and WebKit restart audit
        run: |
          python <<'PY'
          from pathlib import Path

          smoke = Path('next/tests/smoke.mjs')
          text = smoke.read_text(encoding='utf-8')
          assert text.count('report.wireVisual.coils < 5') == 1
          smoke.write_text(text.replace('report.wireVisual.coils < 5', 'report.wireVisual.coils < 3'), encoding='utf-8')

          seasonal = Path('next/tests/seasonal-v4.mjs')
          text = seasonal.read_text(encoding='utf-8')
          assert text.count("includes('後の芽吹き')") == 1
          assert text.count("includes('結果が現れた')") == 1
          text = text.replace("includes('後の芽吹き')", "includes('結果はゲーム内約')")
          text = text.replace("includes('結果が現れた')", "includes('芽吹きと回復が予定どおり現れた')")
          seasonal.write_text(text, encoding='utf-8')

          authentic = Path('next/tests/authentic-v5.mjs')
          text = authentic.read_text(encoding='utf-8')
          assert text.count("includes('結果')") == 1
          text = text.replace("includes('結果')", "includes('芽吹きと回復が予定どおり現れた')")
          start = text.index("  report.phase = 'offline restart';")
          end_marker = "  await context.close();"
          end = text.index(end_marker, start) + len(end_marker)
          new_offline = r"""  report.phase = 'offline restart';
          await page.waitForFunction(async () => {
            if (!('serviceWorker' in navigator)) return false;
            const registration = await navigator.serviceWorker.getRegistration('/bonsai-app/');
            return Boolean(navigator.serviceWorker.controller && registration?.active);
          }, { timeout: 20000 }).catch(async () => {
            await page.reload({ waitUntil: 'domcontentloaded', timeout: 60000 });
            await waitForApp(page);
            await page.waitForFunction(() => Boolean(navigator.serviceWorker?.controller), { timeout: 20000 });
          });
          await page.waitForTimeout(800);

          const webkitCache = await page.evaluate(async () => {
            const cacheNames = await caches.keys();
            const cacheName = cacheNames.find(name => name === 'bonsai-authentic-consequences-v5-shell');
            const dynamicAssets = [...document.querySelectorAll('script[src],link[rel="stylesheet"][href]')]
              .map(node => new URL(node.getAttribute('src') || node.getAttribute('href'), location.href).pathname)
              .filter(pathname => pathname.startsWith('/bonsai-app/assets/'));
            const required = [...new Set(['/bonsai-app/index.html', '/bonsai-app/assets/kuromatsu/base/black.webp', ...dynamicAssets])];
            const cache = cacheName ? await caches.open(cacheName) : null;
            const cached = cache ? await Promise.all(required.map(async url => Boolean(await cache.match(url)))) : [];
            return { controller: Boolean(navigator.serviceWorker.controller), cacheName, required, cached };
          });
          if (!webkitCache.controller || !webkitCache.cacheName || webkitCache.cached.length !== webkitCache.required.length || webkitCache.cached.some(value => !value)) {
            throw new Error(`WebKit did not retain the offline shell: ${JSON.stringify(webkitCache)}`);
          }

          if (process.env.BONSAI_PUBLIC === '1') {
            report.offline = { webkitCache, mode: 'public-cache-verification' };
            await page.screenshot({ path: 'test-artifacts/authentic-v5-offline.png', fullPage: false });
            await context.close();
          } else {
            const previewPid = Number(fs.readFileSync('/tmp/bonsai-authentic-v5-preview.pid', 'utf8').trim());
            if (!Number.isInteger(previewPid) || previewPid <= 1) throw new Error(`Invalid preview pid: ${previewPid}`);
            try {
              process.kill(-previewPid, 'SIGTERM');
            } catch {
              process.kill(previewPid, 'SIGTERM');
            }
            let serverReachable = true;
            for (let attempt = 0; attempt < 30; attempt += 1) {
              try {
                await fetch(baseURL, { cache: 'no-store' });
                await new Promise(resolve => setTimeout(resolve, 100));
              } catch {
                serverReachable = false;
                break;
              }
            }
            if (serverReachable) throw new Error('Preview server remained reachable during offline restart audit');

            const offlineURL = page.url();
            await page.close();
            const offlinePage = await context.newPage();
            attachErrors(offlinePage);
            let navigationError = '';
            await offlinePage.goto(offlineURL, { waitUntil: 'domcontentloaded', timeout: 30000 }).catch(error => { navigationError = error.message; });
            await offlinePage.waitForSelector('[data-testid="app-shell"]', { timeout: 20000 });
            await offlinePage.waitForSelector('.bonsai-stage img', { timeout: 10000 });
            const webkitRestart = await offlinePage.evaluate(() => ({
              app: Boolean(document.querySelector('[data-testid="app-shell"]')),
              image: document.querySelector('.bonsai-stage img')?.getAttribute('src'),
              renderer: document.querySelector('.bonsai-stage')?.getAttribute('data-renderer'),
              deadwoodCount: document.querySelectorAll('[data-testid="photoreal-deadwood"]').length
            }));
            webkitRestart.navigationError = navigationError;
            webkitRestart.serverReachable = serverReachable;
            if (webkitRestart.serverReachable || !webkitRestart.app || webkitRestart.renderer !== 'authentic-state-v5' || webkitRestart.deadwoodCount !== 2) {
              throw new Error(`WebKit offline restart did not preserve the work state: ${JSON.stringify(webkitRestart)}`);
            }
            report.offline = { webkitCache, webkitRestart };
            await offlinePage.screenshot({ path: 'test-artifacts/authentic-v5-offline.png', fullPage: false });
            await context.close();
          }"""
          authentic.write_text(text[:start] + new_offline + text[end:], encoding='utf-8')

          service_worker = r"""const VERSION = 'bonsai-authentic-consequences-v5';
          const CACHE = `${VERSION}-shell`;
          const INDEX = '/bonsai-app/index.html';
          const CORE = [
            '/bonsai-app/', INDEX,
            '/bonsai-app/manifest.webmanifest', '/bonsai-app/icon.svg',
            '/bonsai-app/photo-assets.js', '/bonsai-app/IMAGE_LICENSES.md',
            '/bonsai-app/assets/kuromatsu/manifest.json',
            '/bonsai-app/assets/kuromatsu/base/black.webp',
            '/bonsai-app/assets/kuromatsu/base/starter.webp',
            '/bonsai-app/assets/kuromatsu/base/blue.webp',
            '/bonsai-app/assets/kuromatsu/base/moon.webp',
            '/bonsai-app/assets/kuromatsu/base/old.webp'
          ];

          async function fetchAndCache(cache, url, options = {}) {
            const response = await fetch(url, options);
            if (response.ok) await cache.put(url, response.clone());
            return response;
          }

          async function cacheBuiltAssets(cache, indexResponse) {
            if (!indexResponse?.ok) return;
            const html = await indexResponse.clone().text();
            const urls = [...html.matchAll(/(?:src|href)=["']([^"']+)["']/g)]
              .map(match => new URL(match[1], self.location.origin))
              .filter(url => url.origin === self.location.origin && url.pathname.startsWith('/bonsai-app/assets/'));
            const unique = [...new Set(urls.map(url => url.href))];
            await Promise.allSettled(unique.map(async url => {
              const response = await fetch(url, { cache: 'reload' });
              if (response.ok) await cache.put(url, response.clone());
            }));
          }

          self.addEventListener('install', event => {
            event.waitUntil((async () => {
              const cache = await caches.open(CACHE);
              const indexResponse = await fetchAndCache(cache, INDEX, { cache: 'reload' });
              await cacheBuiltAssets(cache, indexResponse);
              await Promise.allSettled(CORE.filter(url => url !== INDEX).map(url => fetchAndCache(cache, url, { cache: 'reload' })));
              await self.skipWaiting();
            })());
          });

          self.addEventListener('activate', event => {
            event.waitUntil((async () => {
              const keys = await caches.keys();
              await Promise.all(keys.filter(key => key !== CACHE).map(key => caches.delete(key)));
              await self.clients.claim();
            })());
          });

          self.addEventListener('fetch', event => {
            if (event.request.method !== 'GET') return;
            const url = new URL(event.request.url);
            if (url.origin !== self.location.origin) return;
            if (event.request.mode === 'navigate') {
              event.respondWith((async () => {
                try {
                  const response = await fetch(event.request, { cache: 'no-store' });
                  if (response.ok) {
                    const cache = await caches.open(CACHE);
                    await cache.put(event.request, response.clone());
                    await cacheBuiltAssets(cache, response);
                  }
                  return response;
                } catch {
                  return (await caches.match(event.request, { ignoreSearch: true })) || (await caches.match(INDEX)) || Response.error();
                }
              })());
              return;
            }
            event.respondWith((async () => {
              const hit = await caches.match(event.request, { ignoreSearch: true });
              if (hit) return hit;
              try {
                const response = await fetch(event.request);
                if (response.ok) {
                  const cache = await caches.open(CACHE);
                  await cache.put(event.request, response.clone());
                }
                return response;
              } catch {
                return Response.error();
              }
            })());
          });
          """
          Path('next/public/sw.js').write_text('\n'.join(line.lstrip() for line in service_worker.splitlines()) + '\n', encoding='utf-8')

          ci = Path('.github/workflows/authentic-consequences-v5-ci.yml')
          ci_text = ci.read_text(encoding='utf-8')
          old_ci = """          npm run preview >/tmp/bonsai-authentic-v5-preview.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          """
          new_ci = """          setsid npm run preview >/tmp/bonsai-authentic-v5-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-authentic-v5-preview.pid
          trap 'kill -- -$server 2>/dev/null || true' EXIT
          """
          assert ci_text.count(old_ci) == 1
          ci.write_text(ci_text.replace(old_ci, new_ci), encoding='utf-8')

          deploy = Path('.github/workflows/deploy-react-v1.yml')
          deploy_text = deploy.read_text(encoding='utf-8')
          old_deploy = """          npm run preview >/tmp/bonsai-react-preview.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          """
          new_deploy = """          setsid npm run preview >/tmp/bonsai-react-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-authentic-v5-preview.pid
          trap 'kill -- -$server 2>/dev/null || true' EXIT
          """
          assert deploy_text.count(old_deploy) == 1
          deploy.write_text(deploy_text.replace(old_deploy, new_deploy), encoding='utf-8')
          PY
          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install, typecheck, model audit and build
        working-directory: next
        run: |
          npm ci
          npm run typecheck
          npm run test:authentic:unit
          npm run build
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow

      - name: Start production preview
        working-directory: next
        run: |
          setsid npm run preview >/tmp/bonsai-authentic-v5-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-authentic-v5-preview.pid
          for i in $(seq 1 100); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          cat /tmp/bonsai-authentic-v5-preview.log
          exit 1

      - name: Run all 390x844 DPR3 WebKit and visual audits
        working-directory: next
        run: |
          npm run test:smoke
          node tests/seasonal-v4.mjs
          npm run test:authentic
          python scripts/visual-audit-v5.py --output authentic-v5-preflight-visual-audit.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-authentic-v5-preflight
          path: |
            next/test-artifacts
            /tmp/bonsai-authentic-v5-preview.log
          if-no-files-found: warn
          retention-days: 14

      - name: Commit only audited application source
        run: |
          rm -rf .bonsai-authentic-v5 .bonsai-authentic-v5-r2 .bonsai-authentic-v5-r3
          rm -f .github/workflows/apply-authentic-v5.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- next .github/workflows .bonsai-authentic-v5 .bonsai-authentic-v5-r2 .bonsai-authentic-v5-r3
          git commit -m '実写加工と剪定リスク結果v5を実装'
          git push origin "HEAD:${TARGET_BRANCH}"
