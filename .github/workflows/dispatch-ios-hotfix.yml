name: Dispatch iPhone white-screen hotfix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dispatch-ios-hotfix.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Start normalized-state patch before the recovery build
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          echo 'Dispatching normalized-state patch before iPhone recovery build'
          gh workflow run patch-ios-hotfix-persistence.yml --repo "$REPOSITORY" --ref main
