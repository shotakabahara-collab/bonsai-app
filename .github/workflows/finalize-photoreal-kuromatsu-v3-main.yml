name: Finalize photoreal kuromatsu v3 on main

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-photoreal-kuromatsu-v3-main.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: finalize-photoreal-kuromatsu-v3-main
  cancel-in-progress: false

environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Load the validated generator from the candidate branch
        id: generator
        continue-on-error: true
        run: |
          git fetch origin agent/photoreal-upscale-v3
          mkdir -p scripts
          git show origin/agent/photoreal-upscale-v3:scripts/build_photoreal_kuromatsu_v3.py > scripts/build_photoreal_kuromatsu_v3.py
          python -m py_compile scripts/build_photoreal_kuromatsu_v3.py

      - name: Install image pipeline
        id: install
        if: steps.generator.outcome == 'success'
        continue-on-error: true
        run: python -m pip install --disable-pip-version-check pillow numpy opencv-contrib-python-headless==4.11.0.86 > /tmp/main-install.log 2>&1

      - name: Download EDSR x4 model
        id: model
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: |
          mkdir -p .cache
          curl --fail --location --retry 5 --retry-delay 2 \
            --output .cache/EDSR_x4.pb \
            https://raw.githubusercontent.com/Saafke/EDSR_Tensorflow/master/models/EDSR_x4.pb \
            > /tmp/main-model.log 2>&1
          test "$(wc -c < .cache/EDSR_x4.pb)" -gt 30000000

      - name: Generate final same-tree visual assets
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: python scripts/build_photoreal_kuromatsu_v3.py > /tmp/main-build.log 2>&1

      - name: Validate final visual core before switching
        id: validate
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          {
          python <<'PY'
          from pathlib import Path
          from PIL import Image, ImageChops, ImageStat
          import json

          manifest = json.loads(Path('assets/kuromatsu/manifest.json').read_text())
          assert manifest['version'] == 'kuromatsu-photoreal-v3'
          assert manifest['sameTreeIdentity'] is True
          assert manifest['width'] >= 1200 and manifest['height'] >= 1500
          assert manifest['sourceWidth'] >= 300 and manifest['sourceHeight'] >= 400
          expected = {'black', 'starter', 'blue', 'moon', 'old'}
          assert set(manifest['base']) == expected
          images = {}
          for pot, rel in manifest['base'].items():
              path = Path(rel)
              assert path.exists() and path.stat().st_size > 100_000, (pot, path.stat().st_size if path.exists() else -1)
              with Image.open(path) as image:
                  assert image.format == 'WEBP'
                  assert image.size == (manifest['width'], manifest['height'])
                  images[pot] = image.convert('RGB').copy()
          black = images['black']
          crop = (0, int(manifest['height'] * .78), manifest['width'], manifest['height'])
          for pot in expected - {'black'}:
              mean = sum(ImageStat.Stat(ImageChops.difference(black.crop(crop), images[pot].crop(crop))).mean) / 3
              assert mean > .65, (pot, mean)
          qa = Path('assets/kuromatsu/qa/pot-variants.webp')
          assert qa.exists() and qa.stat().st_size > 10_000
          print('same-tree photoreal image validation: PASS')
          PY

          node --check photo-assets.js
          node --check state-image-runtime.js
          node --check sw.js
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          for(const file of ['photo-assets.js','state-image-runtime.js','sw.js']) new vm.Script(fs.readFileSync(file,'utf8'),{filename:file});
          const photo=fs.readFileSync('photo-assets.js','utf8');
          for(const token of ['POT_IMAGES','pineForPot','sameTreeIdentity','kuromatsu-photoreal-v3']) if(!photo.includes(token)) throw Error(`photo ${token}`);
          const runtime=fs.readFileSync('state-image-runtime.js','utf8');
          for(const token of ['BonsaiStateRuntime','visualSignature','deadwood','shari','indexedDB']) if(!runtime.includes(token)) throw Error(`runtime ${token}`);
          const sw=fs.readFileSync('sw.js','utf8');
          for(const token of ['black.webp','starter.webp','blue.webp','moon.webp','old.webp','assets/kuromatsu/manifest.json']) if(!sw.includes(token)) throw Error(`offline ${token}`);
          console.log('state-image and PWA contracts: PASS');
          NODE

          python -m http.server 4173 >/tmp/main-http.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:4173/assets/kuromatsu/manifest.json >/tmp/main-manifest.json && break; sleep .2; done
          grep -Fq 'kuromatsu-photoreal-v3' /tmp/main-manifest.json
          for pot in black starter blue moon old; do
            curl -fsS "http://127.0.0.1:4173/assets/kuromatsu/base/${pot}.webp" -o "/tmp/main-${pot}.webp"
            test "$(wc -c < "/tmp/main-${pot}.webp")" -gt 100000
          done
          } > /tmp/main-validate.log 2>&1

      - name: Write final switch audit
        id: audit
        if: always()
        env:
          GENERATOR: ${{ steps.generator.outcome }}
          INSTALL: ${{ steps.install.outcome }}
          MODEL: ${{ steps.model.outcome }}
          BUILD: ${{ steps.build.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
        run: |
          {
            echo '# BONSAI 黒松フォトリアル v3 main切替監査'
            echo
            echo "- trigger SHA: \`${GITHUB_SHA}\`"
            echo "- generator: ${GENERATOR:-not-run}"
            echo "- install: ${INSTALL:-not-run}"
            echo "- EDSR model: ${MODEL:-not-run}"
            echo "- build: ${BUILD:-not-run}"
            echo "- validation: ${VALIDATE:-not-run}"
            echo
            if [ -f assets/kuromatsu/manifest.json ]; then
              echo '## Manifest'
              echo '```json'
              cat assets/kuromatsu/manifest.json
              echo '```'
              echo
              echo '## Asset sizes'
              echo '```text'
              find assets/kuromatsu -type f -printf '%p %s bytes\n' | sort
              echo '```'
            fi
            for section in install model build validate; do
              echo
              echo "## ${section} log"
              echo '```text'
              tail -n 80 "/tmp/main-${section}.log" 2>/dev/null || true
              echo '```'
            done
          } > PHOTOREAL_MAIN_SWITCH_AUDIT.md

      - name: Commit and switch main only after validation
        id: switch
        if: always()
        env:
          VALIDATE: ${{ steps.validate.outcome }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add PHOTOREAL_MAIN_SWITCH_AUDIT.md
          if [ "$VALIDATE" = 'success' ]; then
            git add scripts/build_photoreal_kuromatsu_v3.py assets/kuromatsu photo-assets.js sw.js PHOTOREAL_KUROMATSU_V3.md
          fi
          git diff --cached --quiet || git commit -m '黒松フォトリアルv3を検査合格後に本番へ切り替え'
          git push origin HEAD:main
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          test "$VALIDATE" = 'success'

      - name: Configure GitHub Pages
        id: configure
        if: steps.switch.outcome == 'success'
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload final Pages artifact
        id: artifact
        if: steps.switch.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy final visual core to GitHub Pages
        id: deployment
        if: steps.configure.outcome == 'success' && steps.artifact.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Verify published visual assets
        id: public
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          RELEASE_SHA: ${{ steps.switch.outputs.release_sha }}
        run: |
          base="${PAGE_URL%/}/"
          curl --fail --silent --show-error --retry 20 --retry-delay 3 --retry-all-errors "${base}photo-assets.js?v=${RELEASE_SHA}" -o /tmp/public-photo.js
          grep -Fq 'kuromatsu-photoreal-v3' /tmp/public-photo.js
          curl --fail --silent --show-error --retry 20 --retry-delay 3 --retry-all-errors "${base}assets/kuromatsu/manifest.json?v=${RELEASE_SHA}" | grep -Fq 'kuromatsu-photoreal-v3'
          for pot in black starter blue moon old; do
            curl --fail --silent --show-error --retry 20 --retry-delay 3 --retry-all-errors "${base}assets/kuromatsu/base/${pot}.webp?v=${RELEASE_SHA}" -o "/tmp/public-${pot}.webp"
            test "$(wc -c < "/tmp/public-${pot}.webp")" -gt 100000
          done
          curl --fail --silent --show-error --retry 20 --retry-delay 3 --retry-all-errors "${base}sw.js?v=${RELEASE_SHA}" | grep -Fq 'kuromatsu-photoreal-v3'

      - name: Record final release result
        if: always()
        uses: actions/github-script@v7
        env:
          GENERATOR: ${{ steps.generator.outcome }}
          INSTALL: ${{ steps.install.outcome }}
          MODEL: ${{ steps.model.outcome }}
          BUILD: ${{ steps.build.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
          SWITCH: ${{ steps.switch.outcome }}
          CONFIGURE: ${{ steps.configure.outcome }}
          ARTIFACT: ${{ steps.artifact.outcome }}
          DEPLOY: ${{ steps.deployment.outcome }}
          PUBLIC: ${{ steps.public.outcome }}
          RELEASE_SHA: ${{ steps.switch.outputs.release_sha }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const required = [process.env.GENERATOR, process.env.INSTALL, process.env.BUILD, process.env.VALIDATE, process.env.SWITCH, process.env.CONFIGURE, process.env.ARTIFACT, process.env.DEPLOY, process.env.PUBLIC];
            const passed = required.every(v => v === 'success');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: `BONSAI release audit: ${passed ? 'PASS' : 'FAIL'}`,
              body: [
                '# BONSAI 黒松フォトリアル v3 最終公開監査',
                '',
                `- trigger SHA: \`${context.sha}\``,
                `- release SHA: \`${process.env.RELEASE_SHA || 'not-created'}\``,
                `- generator: ${process.env.GENERATOR || 'not-run'}`,
                `- install: ${process.env.INSTALL || 'not-run'}`,
                `- EDSR model: ${process.env.MODEL || 'not-run'}`,
                `- build: ${process.env.BUILD || 'not-run'}`,
                `- final validation: ${process.env.VALIDATE || 'not-run'}`,
                `- main switch: ${process.env.SWITCH || 'not-run'}`,
                `- configure Pages: ${process.env.CONFIGURE || 'not-run'}`,
                `- upload artifact: ${process.env.ARTIFACT || 'not-run'}`,
                `- deploy Pages: ${process.env.DEPLOY || 'not-run'}`,
                `- public asset smoke: ${process.env.PUBLIC || 'not-run'}`,
                '- resolution: 1280×1600 WebP',
                '- visual states: five photoreal pot variants; pruning, wiring, disease, pest, jin and shari state compositor',
                '- memorial: high-resolution state snapshots retained on device',
                `- Pages URL: ${process.env.PAGE_URL || 'https://shotakabahara-collab.github.io/bonsai-app/'}`,
                '',
                passed ? '全完成条件を満たした後に本番へ切り替え、公開実体まで確認しました。' : '完成条件の一部が未達です。PHOTOREAL_MAIN_SWITCH_AUDIT.md を確認してください。'
              ].join('\n'),
              state: passed ? 'closed' : 'open',
              ...(passed ? {state_reason: 'completed'} : {})
            });

      - name: Fail unless switch and publication are complete
        if: always() && (steps.generator.outcome != 'success' || steps.install.outcome != 'success' || steps.build.outcome != 'success' || steps.validate.outcome != 'success' || steps.switch.outcome != 'success' || steps.configure.outcome != 'success' || steps.artifact.outcome != 'success' || steps.deployment.outcome != 'success' || steps.public.outcome != 'success')
        run: exit 1
