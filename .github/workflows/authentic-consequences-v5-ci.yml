name: Authentic work and consequences v5 validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'next/**'
      - '.github/workflows/authentic-consequences-v5-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: authentic-consequences-v5-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  webkit-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install exact dependencies
        working-directory: next
        run: npm ci

      - name: Typecheck, deterministic model audit and production build
        working-directory: next
        run: |
          npm run typecheck
          npm run test:authentic:unit
          npm run build

      - name: Install iPhone WebKit and image audit tools
        working-directory: next
        run: |
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow

      - name: Run all 390x844 DPR3 WebKit regressions
        working-directory: next
        run: |
          setsid npm run preview >/tmp/bonsai-authentic-v5-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-authentic-v5-preview.pid
          trap 'kill -TERM -- -$server 2>/dev/null || true' EXIT
          for i in $(seq 1 100); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && break
            sleep .25
          done
          curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null
          npm run test:smoke
          node tests/seasonal-v4.mjs
          npm run test:authentic

      - name: Pixel-audit photographed work states
        working-directory: next
        run: python scripts/visual-audit-v5.py --output authentic-v5-visual-audit.json

      - name: Preserve complete audit bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bonsai-authentic-consequences-v5-audit
          path: |
            next/test-artifacts
            /tmp/bonsai-authentic-v5-preview.log
          if-no-files-found: error
          retention-days: 14
