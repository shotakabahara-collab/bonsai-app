name: Implement Photoreal Craft v6 directly with compatibility regression

on:
  push:
    branches: [agent/photoreal-craft-v6]
    paths:
      - '.photoreal-v6-direct2.ready'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: photoreal-v6-direct2-implementation
  cancel-in-progress: true

jobs:
  implement-test-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/photoreal-craft-v6
          fetch-depth: 0

      - name: Generate the v6 source from the reviewed direct implementation recipe
        run: |
          set -euxo pipefail
          git fetch origin main
          git checkout origin/main -- next
          python -m pip install --disable-pip-version-check pyyaml
          python <<'PY'
          from pathlib import Path
          import subprocess
          import yaml

          workflow = yaml.safe_load(Path('.github/workflows/implement-photoreal-v6-direct.yml').read_text(encoding='utf-8'))
          wanted = {
              'Write the v6 photographed wire and deadwood renderer',
              'Write and run the deterministic transparent WebP generator',
              'Connect v6 renderer, tests and scripts to the existing application',
          }
          steps = workflow['jobs']['implement-test-commit']['steps']
          found = set()
          for step in steps:
              name = step.get('name')
              if name not in wanted:
                  continue
              script = step.get('run')
              if not script:
                  raise SystemExit(f'missing script for {name}')
              subprocess.run(['bash', '-euo', 'pipefail', '-c', script], check=True)
              found.add(name)
          missing = wanted - found
          if missing:
              raise SystemExit(f'missing recipe steps: {sorted(missing)}')
          PY
          # Opacity hides the legacy DOM visually while keeping the already-verified
          # lifecycle selectors measurable for the compatibility regression.
          sed -i '/visibility: hidden !important;/d' next/src/photoreal-craft-v6.css
          git diff --check
          test -f next/tests/photoreal-v6.mjs
          test -f next/tests/photoreal-v6-unit.mjs
          test -f next/scripts/visual-audit-v6.py
          test "$(find next/public/assets/kuromatsu/craft-v6 -type f -name '*.webp' | wc -l)" -eq 12

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install, typecheck, unit-audit and build
        working-directory: next
        run: |
          npm ci
          npm run typecheck
          npm run test:photoreal:unit
          npm run build
          python -m py_compile scripts/generate-photoreal-v6-assets.py scripts/visual-audit-v6.py

      - name: Install iPhone WebKit and Pillow
        working-directory: next
        run: |
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow

      - name: Run existing interaction, seasonal, work lifecycle, offline and v6 artwork audits
        working-directory: next
        run: |
          set -euxo pipefail
          setsid npm run preview >/tmp/photoreal-v6-direct2.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-photoreal-v6-preview.pid
          trap 'kill -TERM -- -$server 2>/dev/null || true' EXIT
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && break
            sleep .25
          done
          curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null
          npm run test:smoke
          node tests/seasonal-v4.mjs
          npm run test:photoreal
          python scripts/visual-audit-v6.py --output photoreal-v6-direct2-visual-audit.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-photoreal-v6-direct2-audit
          path: |
            next/test-artifacts
            /tmp/photoreal-v6-direct2.log
          if-no-files-found: warn
          retention-days: 14

      - name: Commit implemented v6 source and preserve only permanent validation workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          rm -rf next/node_modules next/dist next/test-artifacts next/.test-cjs next/scripts/__pycache__
          rm -rf .photoreal-v6-payload
          rm -f .photoreal-v6-source.patch.xz .photoreal-v6-source.ready .photoreal-v6-final.patch.xz .photoreal-v6-final.ready
          rm -f .photoreal-v6-*.ready
          find .github/workflows -maxdepth 1 -type f \( -name 'apply-photoreal-v6*.yml' -o -name 'diagnose-photoreal-v6.yml' -o -name 'export-*photoreal-v6*.yml' -o -name 'finalize-photoreal-v6-source.yml' -o -name 'materialize-photoreal-v6-source.yml' -o -name 'commit-photoreal-v6-candidate.yml' -o -name 'report-photoreal-v6*.yml' -o -name 'summarize-photoreal-v6-gates.yml' -o -name 'update-photoreal-v6-pr-status.yml' -o -name 'implement-photoreal-v6-direct.yml' -o -name 'implement-photoreal-v6-direct2.yml' \) -delete
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '針金・神・舎利を写真へ密着させるPhotoreal Craft v6を実装'
          git push origin HEAD:agent/photoreal-craft-v6
          sha=$(git rev-parse HEAD)
          gh pr edit 10 --repo "$GITHUB_REPOSITORY" --title 'Photoreal Craft v6：実装・WebKit監査PASS／iPhone確認待ち'
          gh pr ready 10 --repo "$GITHUB_REPOSITORY" || true
          gh pr comment 10 --repo "$GITHUB_REPOSITORY" --body "Photoreal Craft v6 direct compatibility gate: PASS\n\n- implementation SHA: \`${sha}\`\n- TypeScript / unit / Vite build: PASS\n- existing smoke and seasonal persistence: PASS\n- pruning consequence, interruption and offline lifecycle: PASS\n- thin independent wire and photo-derived jin/shari artwork audit: PASS\n\nProduction remains v5 until the user's iPhone review of v6 images."
