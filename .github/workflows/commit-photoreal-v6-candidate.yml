name: Commit Photoreal Craft v6 candidate source

on:
  push:
    branches: [agent/photoreal-craft-v6]
    paths:
      - '.photoreal-v6-commit-candidate.ready'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-photoreal-craft-v6-robust
  cancel-in-progress: false

jobs:
  commit-candidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/photoreal-craft-v6
          fetch-depth: 0

      - name: Normalize and apply the retained v6 patch to current main
        run: |
          set -euxo pipefail
          if test -f next/tests/photoreal-v6.mjs && test -f next/scripts/visual-audit-v6.py; then
            echo 'candidate source already present'
            exit 0
          fi
          mkdir -p /tmp/v6-candidate
          candidates=(.photoreal-v6-source.patch.xz .photoreal-v6-payload/changes.patch.xz .photoreal-v6-final.patch.xz)
          if compgen -G '.photoreal-v6-payload/bin-*' >/dev/null; then
            cat .photoreal-v6-payload/bin-* > /tmp/v6-candidate/assembled.patch.xz
            candidates+=(/tmp/v6-candidate/assembled.patch.xz)
          fi
          git fetch origin main
          git worktree add --detach /tmp/v6-main origin/main

          cat > /tmp/v6-candidate/normalize.py <<'PY'
          import re, sys
          from pathlib import Path
          src, dst = map(Path, sys.argv[1:3])
          text = src.read_bytes().decode('latin1')
          allowed = ('next/', '.github/workflows/deploy-react-v1.yml', '.github/workflows/photoreal-craft-v6-ci.yml', '.github/workflows/photoreal-v6-final-gate.yml')
          def norm(path):
              path = path.strip().strip('"')
              if path == '/dev/null': return path
              path = path.removeprefix('a/').removeprefix('b/')
              choices = [path[i:] for marker in ('next/', '.github/workflows/') if (i := path.find(marker)) >= 0]
              return next((p for p in choices if p.startswith(allowed)), None)
          output = []
          for section in re.split(r'(?=^diff --git )', text, flags=re.M):
              if not section.startswith('diff --git '): continue
              lines = section.splitlines(keepends=True)
              m = re.match(r'diff --git\s+"?a/(.+?)"?\s+"?b/(.+?)"?\s*$', lines[0].rstrip())
              if not m: continue
              old, new = norm(m.group(1)), norm(m.group(2))
              chosen = new or old
              if not chosen or not chosen.startswith(allowed): continue
              oldh = '/dev/null' if old == '/dev/null' else f'a/{old or chosen}'
              newh = '/dev/null' if new == '/dev/null' else f'b/{new or chosen}'
              fixed = [f'diff --git {oldh} {newh}\n']
              for line in lines[1:]:
                  body, ending = line.rstrip('\r\n'), line[len(line.rstrip('\r\n')):]
                  if body.startswith('--- '):
                      raw = body[4:].split('\t',1)[0]; p = norm(raw)
                      body = '--- /dev/null' if raw == '/dev/null' else f'--- a/{p or chosen}'
                  elif body.startswith('+++ '):
                      raw = body[4:].split('\t',1)[0]; p = norm(raw)
                      body = '+++ /dev/null' if raw == '/dev/null' else f'+++ b/{p or chosen}'
                  fixed.append(body + ending)
              output.append(''.join(fixed))
          dst.write_bytes(''.join(output).encode('latin1'))
          PY

          selected=''
          for candidate in "${candidates[@]}"; do
            test -f "$candidate" || continue
            xz -t "$candidate" || continue
            raw="/tmp/v6-candidate/$(basename "$candidate" .xz).raw.patch"
            normalized="/tmp/v6-candidate/$(basename "$candidate" .xz).normalized.patch"
            xz -dc "$candidate" > "$raw"
            python /tmp/v6-candidate/normalize.py "$raw" "$normalized"
            grep -Fq 'next/src/BonsaiStage.tsx' "$normalized" || continue
            grep -Fq 'next/tests/photoreal-v6.mjs' "$normalized" || continue
            cd /tmp/v6-main
            git reset --hard origin/main
            git clean -fdx
            if git apply --check --binary "$normalized"; then
              selected="$normalized"
              break
            fi
          done
          test -n "$selected"
          cd /tmp/v6-main
          git reset --hard origin/main
          git clean -fdx
          git apply --binary --whitespace=nowarn "$selected"
          git diff --check
          test -f next/tests/photoreal-v6.mjs
          test -f next/tests/photoreal-v6-unit.mjs
          test -f next/scripts/visual-audit-v6.py
          test "$(find next/public/assets/kuromatsu/craft-v6 -type f -name '*.webp' | wc -l)" -ge 12

          cd "$GITHUB_WORKSPACE"
          rm -rf next
          cp -a /tmp/v6-main/next ./next
          rm -rf next/node_modules next/dist next/test-artifacts next/.test-cjs next/scripts/__pycache__
          for workflow in deploy-react-v1.yml photoreal-craft-v6-ci.yml photoreal-v6-final-gate.yml; do
            test -f "/tmp/v6-main/.github/workflows/$workflow" && cp "/tmp/v6-main/.github/workflows/$workflow" ".github/workflows/$workflow" || true
          done
          git diff --check

      - name: Remove transport scaffolding and commit the candidate source
        run: |
          set -euxo pipefail
          rm -rf .photoreal-v6-payload
          rm -f .photoreal-v6-source.patch.xz .photoreal-v6-source.ready
          rm -f .photoreal-v6-final.patch.xz .photoreal-v6-final.ready
          rm -f .photoreal-v6-*.ready
          rm -f .github/workflows/apply-photoreal-v6.yml
          rm -f .github/workflows/apply-photoreal-v6-robust.yml
          rm -f .github/workflows/apply-photoreal-v6-worktree.yml
          rm -f .github/workflows/apply-photoreal-v6-scoped.yml
          rm -f .github/workflows/apply-photoreal-v6-autostrip.yml
          rm -f .github/workflows/apply-photoreal-v6-normalized.yml
          rm -f .github/workflows/commit-photoreal-v6-candidate.yml
          rm -f .github/workflows/diagnose-photoreal-v6.yml
          rm -f .github/workflows/export-applied-photoreal-v6.yml
          rm -f .github/workflows/export-photoreal-v6-source.yml
          rm -f .github/workflows/finalize-photoreal-v6-source.yml
          rm -f .github/workflows/report-photoreal-v6-status.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git status --short
          git commit -m 'Photoreal Craft v6の実装候補をDraft PRへ確定'
          git push origin HEAD:agent/photoreal-craft-v6
