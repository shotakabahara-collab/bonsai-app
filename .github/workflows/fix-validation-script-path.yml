name: Fix high-resolution validation script path

on:
  push:
    branches:
      - agent/highres-kuromatsu-v2
    paths:
      - '.github/workflows/fix-validation-script-path.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/highres-kuromatsu-v2
      - name: Keep the Playwright script beside node_modules
        run: |
          python3 <<'PY'
          from pathlib import Path
          path=Path('.github/workflows/validate-highres-photo.yml')
          text=path.read_text(encoding='utf-8')
          text=text.replace("cat > /tmp/browser-test.mjs <<'NODE'", "cat > browser-test.mjs <<'NODE'")
          text=text.replace('node /tmp/browser-test.mjs', 'node browser-test.mjs')
          if "cat > browser-test.mjs <<'NODE'" not in text or 'node browser-test.mjs' not in text:
              raise SystemExit('browser script path replacement failed')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit corrected validation workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/validate-highres-photo.yml
          git diff --cached --quiet && exit 0
          git commit -m 'Playwright検査をnode_modulesと同じ作業ディレクトリで実行'
          git push origin HEAD:agent/highres-kuromatsu-v2
