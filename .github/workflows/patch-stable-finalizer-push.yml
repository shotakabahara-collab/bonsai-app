name: Patch BONSAI stable finalizer push

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-stable-finalizer-push.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Keep deployment workflow outside the generated commit
        run: |
          python3 <<'PY'
          from pathlib import Path
          path=Path('.github/workflows/finalize-stable-launch-v1.yml')
          text=path.read_text(encoding='utf-8')
          old="      - name: Build direct-launch stable package\n        run: python scripts/finalize_stable_launch.py\n"
          new="      - name: Build direct-launch stable package\n        run: |\n          python scripts/finalize_stable_launch.py\n          git checkout -- .github/workflows/pages.yml\n"
          if new not in text:
              if old not in text: raise SystemExit('build step marker missing')
              text=text.replace(old,new,1)
          text=text.replace(' sw.js release.json .github/workflows/pages.yml',' sw.js release.json')
          path.write_text(text,encoding='utf-8')
          PY
      - name: Commit finalizer correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/finalize-stable-launch-v1.yml
          git diff --cached --quiet && exit 0
          git commit -m '安定版生成コミットからworkflow更新を分離'
          git push origin HEAD:main
