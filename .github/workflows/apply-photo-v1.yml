name: Apply photorealistic pine still

on:
  push:
    branches: [main]
    paths:
      - 'photo-assets.js'
      - '.github/workflows/apply-photo-v1.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Connect photorealistic still image
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text()

          if 'src="photo-assets.js"' not in text:
              if 'src="tree-renderer.js"' in text:
                  text = text.replace('<script src="tree-renderer.js"></script>', '<script src="photo-assets.js"></script><script src="tree-renderer.js"></script>', 1)
              else:
                  text = text.replace('<div id="root"></div><script>', '<div id="root"></div><script src="photo-assets.js"></script><script>', 1)

          css = '''.photo-bonsai{position:relative;width:100%;height:100%;margin:0;overflow:hidden;background:#08100b}.photo-bonsai img{width:100%;height:100%;display:block;object-fit:cover;object-position:center 48%;filter:saturate(.94) contrast(1.06) brightness(.9)}.photo-bonsai:after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 43%,transparent 42%,rgba(3,8,5,.28) 82%,rgba(2,5,3,.62) 100%),linear-gradient(180deg,rgba(255,255,255,.04),transparent 24%,rgba(0,0,0,.3));box-shadow:inset 0 0 0 1px rgba(218,193,146,.12)}.wall .photo-bonsai{width:min(94vw,700px);height:min(86vh,900px);border-radius:24px;box-shadow:0 35px 90px rgba(0,0,0,.7)}'''
          if '.photo-bonsai{' not in text:
              text = text.replace('</style>', css + '</style>', 1)

          pattern = r'function svg\(\)\{.*?\}function home\(\)\{'
          replacement = '''function svg(){if(s.sp==='pine'&&window.BonsaiPhotos&&window.BonsaiPhotos.pine){return `<figure class="photo-bonsai"><img src="${window.BonsaiPhotos.pine}" alt="実写品質で撮影された黒松盆栽" draggable="false"></figure>`}return window.BonsaiVisual.render(s,SP,POTS,season(),d())}function home(){'''
          text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1:
              raise SystemExit('svg function replacement failed')

          path.write_text(text)

          sw = Path('sw.js')
          sw_text = sw.read_text()
          sw_text = re.sub(r"const CACHE='[^']+'", "const CACHE='bonsai-photo-v1-20260717'", sw_text, count=1)
          if "'./photo-assets.js'" not in sw_text:
              sw_text = sw_text.replace("'./tree-renderer.js'", "'./tree-renderer.js','./photo-assets.js'")
          sw.write_text(sw_text)
          PY
      - name: Validate photo display and PWA cache
        run: |
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const scripts=[...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
          new vm.Script(scripts.at(-1)[1],{filename:'bonsai.js'});
          new vm.Script(fs.readFileSync('photo-assets.js','utf8'),{filename:'photo-assets.js'});
          if(!html.includes('window.BonsaiPhotos.pine')) throw Error('photo not connected');
          if(!html.includes('class="photo-bonsai"')) throw Error('photo markup missing');
          if(!fs.readFileSync('sw.js','utf8').includes('photo-assets.js')) throw Error('photo not cached');
          console.log('Photorealistic pine still: PASS');
          NODE
      - name: Commit visual upgrade
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html sw.js
          git diff --cached --quiet && exit 0
          git commit -m '黒松表示を実写静止画へアップグレード'
          git push origin HEAD:main

