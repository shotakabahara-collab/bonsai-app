name: Validate photoreal kuromatsu v3

on:
  push:
    branches:
      - agent/photoreal-upscale-v3
      - main
    paths:
      - 'assets/kuromatsu/**'
      - 'photo-assets.js'
      - 'sw.js'
      - 'state-image-runtime.js'
      - '.github/workflows/validate-photoreal-kuromatsu-v3.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install image validator
        run: python -m pip install --disable-pip-version-check pillow
      - name: Validate photoreal image contract
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image, ImageChops, ImageStat
          import json

          manifest = json.loads(Path('assets/kuromatsu/manifest.json').read_text())
          assert manifest['version'] == 'kuromatsu-photoreal-v3'
          assert manifest['sameTreeIdentity'] is True
          assert manifest['width'] >= 1200 and manifest['height'] >= 1500
          expected = {'black', 'starter', 'blue', 'moon', 'old'}
          assert set(manifest['base']) == expected

          images = {}
          for pot, rel in manifest['base'].items():
              path = Path(rel)
              assert path.exists(), path
              assert path.stat().st_size > 150_000, (pot, path.stat().st_size)
              with Image.open(path) as image:
                  assert image.format == 'WEBP'
                  assert image.size == (manifest['width'], manifest['height'])
                  images[pot] = image.convert('RGB').copy()

          black = images['black']
          crop = (0, int(manifest['height'] * .78), manifest['width'], manifest['height'])
          for pot in expected - {'black'}:
              difference = ImageChops.difference(black.crop(crop), images[pot].crop(crop))
              mean = sum(ImageStat.Stat(difference).mean) / 3
              assert mean > 2.0, (pot, mean)
          print('photoreal dimensions / pot-state differences: PASS')
          PY
      - name: Validate JavaScript and offline delivery
        run: |
          node --check photo-assets.js
          node --check state-image-runtime.js
          node --check sw.js
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          for(const file of ['photo-assets.js','state-image-runtime.js','sw.js']) {
            new vm.Script(fs.readFileSync(file,'utf8'),{filename:file});
          }
          const photo=fs.readFileSync('photo-assets.js','utf8');
          for(const token of ['POT_IMAGES','pineForPot','sameTreeIdentity','kuromatsu-photoreal-v3']) {
            if(!photo.includes(token)) throw Error(`photo contract missing: ${token}`);
          }
          const runtime=fs.readFileSync('state-image-runtime.js','utf8');
          for(const token of ['BonsaiStateRuntime','visualSignature','deadwood','shari','indexedDB']) {
            if(!runtime.includes(token)) throw Error(`state runtime missing: ${token}`);
          }
          const sw=fs.readFileSync('sw.js','utf8');
          for(const asset of ['black.webp','starter.webp','blue.webp','moon.webp','old.webp','assets/kuromatsu/manifest.json']) {
            if(!sw.includes(asset)) throw Error(`offline asset missing: ${asset}`);
          }
          console.log('photoreal JavaScript / state runtime / offline contract: PASS');
          NODE
      - name: Static HTTP smoke
        run: |
          python -m http.server 4173 >/tmp/photoreal-http.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:4173/assets/kuromatsu/manifest.json >/tmp/manifest.json && break; sleep .2; done
          grep -Fq 'kuromatsu-photoreal-v3' /tmp/manifest.json
          for pot in black starter blue moon old; do
            curl -fsS "http://127.0.0.1:4173/assets/kuromatsu/base/${pot}.webp" -o "/tmp/${pot}.webp"
            test "$(wc -c < "/tmp/${pot}.webp")" -gt 150000
          done
          curl -fsS http://127.0.0.1:4173/photo-assets.js | grep -Fq 'sameTreeIdentity'
          curl -fsS http://127.0.0.1:4173/sw.js | grep -Fq 'kuromatsu-photoreal-v3'
