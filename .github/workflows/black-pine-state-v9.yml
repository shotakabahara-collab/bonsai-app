name: Black Pine State Rendering v9 validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [agent/black-pine-state-rendering-v9]
    paths:
      - '.github/workflows/black-pine-state-v9.yml'

permissions:
  contents: write

concurrency:
  group: black-pine-state-v9-pr
  cancel-in-progress: false

jobs:
  iphone-state-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/black-pine-state-rendering-v9
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install dependencies and image tools
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless

      - name: Generate v9 photographic states
        run: |
          python next/scripts/generate-black-pine-state-v9.py
          test "$(find next/public/assets/kuromatsu/wire-photo-v9 -name '*.webp' | wc -l)" -eq 12
          test "$(find next/public/assets/kuromatsu/deadwood-photo-v9 -name '*.webp' | wc -l)" -eq 24
          test "$(find next/public/assets/kuromatsu/pruning-photo-v9 -name '*.webp' | wc -l)" -eq 18
          git diff --check

      - name: Typecheck and build
        working-directory: next
        run: |
          npm run typecheck
          npm run test:photoreal:unit
          npm run test:gameplay:unit
          npm run build

      - name: Start preview
        working-directory: next
        run: |
          setsid npm run preview >/tmp/bpv9-preview.log 2>&1 &
          echo $! >/tmp/bpv9-preview.pid
          echo $! >/tmp/bonsai-photoreal-v7-preview.pid
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          cat /tmp/bpv9-preview.log
          exit 1

      - name: Run Black Pine v9 real-flow audit
        working-directory: next
        run: |
          npm run test:black-pine-v9
          python scripts/audit-black-pine-state-v9.py

      - name: Run smoke regression
        working-directory: next
        run: npm run test:smoke

      - name: Run seasonal regression
        working-directory: next
        run: node tests/seasonal-v4.mjs

      - name: Run Gameplay regression
        working-directory: next
        run: npm run test:gameplay

      - name: Run Photoreal regression
        working-directory: next
        run: npm run test:photoreal

      - name: Run permanent visual audit
        working-directory: next
        run: python scripts/visual-audit-v6.py --output black-pine-v9-final-visual-audit.json

      - name: Stop preview
        if: always()
        run: |
          if test -f /tmp/bpv9-preview.pid; then
            server="$(cat /tmp/bpv9-preview.pid)"
            kill -TERM -- -"$server" 2>/dev/null || kill "$server" 2>/dev/null || true
          fi

      - name: Commit audited source and assets
        run: |
          rm -f .github/workflows/black-pine-state-v9.yml
          rm -f .github/workflows/black-pine-state-v9-finalize.yml
          rm -f .github/workflows/materialize-black-pine-v9.yml
          rm -f next/scripts/apply-black-pine-state-v9.py
          rm -f next/TYPECHECK_BLACK_PINE_V9.txt
          rm -rf next/node_modules next/dist next/test-artifacts next/scripts/__pycache__
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          test -n "$(git diff --cached --name-only)"
          git commit -m 'Black Pine State Rendering v9：監査済み写真状態を確定'
          git push origin HEAD:agent/black-pine-state-rendering-v9

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: black-pine-state-v9-final-audit
          path: |
            next/black-pine-state-v9-assets.json
            next/black-pine-state-v9-visual-audit.json
            next/black-pine-v9-final-visual-audit.json
            /tmp/bpv9-preview.log
          if-no-files-found: warn
          retention-days: 14
