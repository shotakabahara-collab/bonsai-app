name: Materialize Black Pine State v9

on:
  push:
    branches: [agent/black-pine-state-rendering-v9]
    paths:
      - '.github/workflows/materialize-black-pine-v9.yml'
      - 'next/scripts/generate-black-pine-state-v9.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-black-pine-v9
  cancel-in-progress: false

jobs:
  generate-audit-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/black-pine-state-rendering-v9
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install dependencies
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless

      - name: Generate and connect v9 photographic states
        run: |
          python next/scripts/generate-black-pine-state-v9.py
          python next/scripts/apply-black-pine-state-v9.py
          test "$(find next/public/assets/kuromatsu/wire-photo-v9 -name '*.webp' | wc -l)" -eq 12
          test "$(find next/public/assets/kuromatsu/deadwood-photo-v9 -name '*.webp' | wc -l)" -eq 24
          test "$(find next/public/assets/kuromatsu/pruning-photo-v9 -name '*.webp' | wc -l)" -eq 18
          git diff --check

      - name: Typecheck and build
        working-directory: next
        run: |
          npm run typecheck
          npm run test:photoreal:unit
          npm run test:gameplay:unit
          npm run build

      - name: Start preview
        working-directory: next
        run: |
          setsid npm run preview >/tmp/bpv9-preview.log 2>&1 &
          echo $! >/tmp/bpv9-preview.pid
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          cat /tmp/bpv9-preview.log
          exit 1

      - name: Run v9 and all regressions
        working-directory: next
        run: |
          npm run test:black-pine-v9
          python scripts/audit-black-pine-state-v9.py
          npm run test:smoke
          node tests/seasonal-v4.mjs
          npm run test:gameplay
          npm run test:photoreal
          python scripts/visual-audit-v6.py --root test-artifacts --output photoreal-v9-visual-audit.json

      - name: Stop preview
        if: always()
        run: |
          if test -f /tmp/bpv9-preview.pid; then
            server="$(cat /tmp/bpv9-preview.pid)"
            kill -TERM -- -"$server" 2>/dev/null || kill "$server" 2>/dev/null || true
          fi

      - name: Commit audited implementation
        run: |
          rm -f .github/workflows/materialize-black-pine-v9.yml
          rm -f next/scripts/apply-black-pine-state-v9.py
          rm -f next/TYPECHECK_BLACK_PINE_V9.txt
          rm -rf next/node_modules next/dist next/test-artifacts next/scripts/__pycache__
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          test -n "$(git diff --cached --name-only)"
          git commit -m 'Black Pine State Rendering v9：監査済み写真状態を確定'
          git push origin HEAD:agent/black-pine-state-rendering-v9
