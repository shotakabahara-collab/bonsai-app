name: Apply and preflight Photoreal Craft v6

on:
  push:
    branches: [agent/photoreal-craft-v6]
    paths:
      - '.photoreal-v6-final-text.patch'
      - '.github/workflows/apply-photoreal-v6.yml'
  pull_request:
    branches: [main]
    paths:
      - '.photoreal-v6-final-text.patch'
      - '.github/workflows/apply-photoreal-v6.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-photoreal-craft-v6-source-${{ github.sha }}
  cancel-in-progress: true

jobs:
  apply-audit-and-commit:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'agent/photoreal-craft-v6' }}
          fetch-depth: 0

      - name: Apply SHA-verified Photoreal Craft v6 implementation
        run: |
          set -euxo pipefail
          cat .photoreal-v6-payload/bin-* > /tmp/photoreal-v6-initial.patch.xz
          echo 'ee0ff926de4965eb5b93ec0f59a6231bae468f1c766c04b2129bcb020776956c  /tmp/photoreal-v6-initial.patch.xz' | sha256sum -c -
          xz -t /tmp/photoreal-v6-initial.patch.xz
          xz -dc /tmp/photoreal-v6-initial.patch.xz > /tmp/photoreal-v6-initial.patch
          git apply --check --exclude=.github/workflows/export-photoreal-v6-source.yml /tmp/photoreal-v6-initial.patch
          git apply --whitespace=error --exclude=.github/workflows/export-photoreal-v6-source.yml /tmp/photoreal-v6-initial.patch
          echo 'c68a1354ef8c08cd77af6399a19c9cfd829d4412ecc5739e049af5c26f82ec82  .photoreal-v6-final-text.patch' | sha256sum -c -
          git apply --check .photoreal-v6-final-text.patch
          git apply --whitespace=error .photoreal-v6-final-text.patch
          git diff --check

      - name: Calibrate photographed work and identical artwork captures
        run: |
          python <<'PY'
          from pathlib import Path

          stage = Path('next/src/BonsaiStage.tsx')
          text = stage.read_text(encoding='utf-8')
          old_left = """    'M400 738 C405 721 410 704 415 687 C413 707 409 725 404 742 Z'\n  ],"""
          new_left = """    'M400 738 C405 721 410 704 415 687 C413 707 409 725 404 742 Z',\n    'M447 620 C451 607 455 594 459 581 C458 596 455 610 451 624 Z'\n  ],"""
          old_right = """    'M416 738 C421 721 426 704 431 687 C429 707 425 725 420 742 Z'\n  ]"""
          new_right = """    'M416 738 C421 721 426 704 431 687 C429 707 425 725 420 742 Z',\n    'M463 620 C467 607 471 594 475 581 C474 596 471 610 467 624 Z'\n  ]"""
          assert text.count(old_left) == 1, 'left shari bark-island anchor changed'
          assert text.count(old_right) == 1, 'right shari bark-island anchor changed'
          stage.write_text(text.replace(old_left, new_left).replace(old_right, new_right), encoding='utf-8')

          css = Path('next/src/photoreal-v6.css')
          style = css.read_text(encoding='utf-8')
          assert style.count('opacity: .58;') == 1, 'base shari opacity anchor changed'
          assert style.count('opacity: .68;') == 1, 'fresh shari opacity anchor changed'
          style = style.replace('opacity: .58;', 'opacity: .50;').replace('opacity: .68;', 'opacity: .52;')
          css.write_text(style, encoding='utf-8')

          test_path = Path('next/tests/authentic-v5.mjs')
          test = test_path.read_text(encoding='utf-8')
          day_anchor = "const DAY = 86_400_000;\n"
          assert test.count(day_anchor) == 1, 'DAY anchor changed'
          test = test.replace(day_anchor, day_anchor + """const ARTWORK_CAPTURE_STYLE = `\n  .topbar, .bottom-nav, .completion-dock, .wire-status-tag,\n  .deadwood-status-tag, .dead-tree-status-tag, .wall-caption,\n  .wall-mode > button, .toast { visibility: hidden !important; }\n`;\n""")

          replacements = {
            "  await page.locator('.bonsai-stage').screenshot({ path: 'test-artifacts/authentic-v5-base-artwork.png' });":
              "  await captureArtwork(page, '.bonsai-stage [data-testid=\"bonsai-photo-canvas\"]', 'test-artifacts/authentic-v5-base-artwork.png');",
            "  await page.locator('.wall-stage [data-testid=\"bonsai-photo-canvas\"]').screenshot({ path: 'test-artifacts/photoreal-v6-wall-base-artwork.png' });":
              "  await captureArtwork(page, '.wall-stage [data-testid=\"bonsai-photo-canvas\"]', 'test-artifacts/photoreal-v6-wall-base-artwork.png');",
            "  await page.locator('.bonsai-stage').screenshot({ path: 'test-artifacts/authentic-v5-wire-artwork.png' });":
              "  await captureArtwork(page, '.bonsai-stage [data-testid=\"bonsai-photo-canvas\"]', 'test-artifacts/authentic-v5-wire-artwork.png');",
            "  await page.locator('.bonsai-stage').screenshot({ path: 'test-artifacts/authentic-v5-deadwood-fresh-artwork.png' });":
              "  await captureArtwork(page, '.bonsai-stage [data-testid=\"bonsai-photo-canvas\"]', 'test-artifacts/authentic-v5-deadwood-fresh-artwork.png');",
            "  await page.locator('.bonsai-stage').screenshot({ path: 'test-artifacts/authentic-v5-deadwood-paused-artwork.png' });":
              "  await captureArtwork(page, '.bonsai-stage [data-testid=\"bonsai-photo-canvas\"]', 'test-artifacts/authentic-v5-deadwood-paused-artwork.png');",
            "  await page.locator('.bonsai-stage').screenshot({ path: 'test-artifacts/authentic-v5-offline-artwork.png' });":
              "  await captureArtwork(page, '.bonsai-stage [data-testid=\"bonsai-photo-canvas\"]', 'test-artifacts/authentic-v5-offline-artwork.png');",
            "    await offlinePage.locator('.bonsai-stage').screenshot({ path: 'test-artifacts/authentic-v5-offline-artwork.png' });":
              "    await captureArtwork(offlinePage, '.bonsai-stage [data-testid=\"bonsai-photo-canvas\"]', 'test-artifacts/authentic-v5-offline-artwork.png');",
          }
          for old, new in replacements.items():
            assert test.count(old) == 1, old
            test = test.replace(old, new)

          combined_old = """  await page.locator('.wall-stage [data-testid=\"bonsai-photo-canvas\"]').screenshot({ path: 'test-artifacts/photoreal-v6-combined-artwork.png' });
  await page.getByRole('button', { name: '鑑賞を終了' }).click();"""
          combined_new = """  await page.getByRole('button', { name: '鑑賞を終了' }).click();
  await page.waitForSelector('.wall-mode', { state: 'detached', timeout: 5000 });
  await captureArtwork(page, '.bonsai-stage [data-testid=\"bonsai-photo-canvas\"]', 'test-artifacts/photoreal-v6-combined-artwork.png');"""
          assert test.count(combined_old) == 1, 'combined artwork capture anchor changed'
          test = test.replace(combined_old, combined_new)

          helper_anchor = "function attachErrors(page) {"
          helper = """async function captureArtwork(page, selector, path) {
  await page.locator(selector).screenshot({ path, style: ARTWORK_CAPTURE_STYLE });
}

function attachErrors(page) {"""
          assert test.count(helper_anchor) == 1, 'capture helper anchor changed'
          test_path.write_text(test.replace(helper_anchor, helper), encoding='utf-8')
          PY
          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install, typecheck, model audit and production build
        working-directory: next
        run: |
          npm ci
          npm run typecheck
          npm run test:photoreal:unit
          npm run build
          node --check tests/smoke.mjs
          node --check tests/seasonal-v4.mjs
          node --check tests/authentic-v5.mjs
          python -m py_compile scripts/visual-audit-v6.py

      - name: Install iPhone WebKit and image audit tools
        working-directory: next
        run: |
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy

      - name: Start verified production preview
        working-directory: next
        run: |
          setsid npm run preview >/tmp/bonsai-photoreal-v6-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-photoreal-v6-preview.pid
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          cat /tmp/bonsai-photoreal-v6-preview.log
          exit 1

      - name: Run existing 390x844 DPR3 WebKit regression
        working-directory: next
        run: npm run test:smoke

      - name: Run seasonal persistence regression
        working-directory: next
        run: node tests/seasonal-v4.mjs

      - name: Run photoreal work, interruption and offline audit
        working-directory: next
        run: npm run test:photoreal

      - name: Reject tubes, floating work, bright ribbons and circular markers
        working-directory: next
        run: python scripts/visual-audit-v6.py --output photoreal-v6-preflight-visual-audit.json

      - name: Preserve preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bonsai-photoreal-craft-v6-implementation-audit
          path: |
            next/test-artifacts
            /tmp/bonsai-photoreal-v6-preview.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stop preview
        if: always()
        run: |
          if test -f /tmp/bonsai-photoreal-v6-preview.pid; then
            server="$(cat /tmp/bonsai-photoreal-v6-preview.pid)"
            kill -TERM -- -"$server" 2>/dev/null || kill "$server" 2>/dev/null || true
          fi

      - name: Commit only the audited application source
        run: |
          rm -rf next/.test-cjs next/scripts/__pycache__
          rm -rf .photoreal-v6-*
          rm -f .github/workflows/apply-photoreal-v6*.yml
          rm -f .github/workflows/commit-photoreal-v6-candidate.yml
          rm -f .github/workflows/diagnose-photoreal-v6.yml
          rm -f .github/workflows/export-applied-photoreal-v6.yml
          rm -f .github/workflows/export-photoreal-v6-source.yml
          rm -f .github/workflows/photoreal-v6-final-gate.yml
          rm -f .github/workflows/report-photoreal-v6-status.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git status --short
          git commit -m '針金・神・舎利を実枝へ密着させるPhotoreal Craft v6を実装'
          git push origin "HEAD:${{ github.head_ref || 'agent/photoreal-craft-v6' }}"
