name: Diagnose Material Preview v11 floor repair

on:
  issues:
    types: [edited]

permissions:
  contents: read
  issues: write

concurrency:
  group: diagnose-material-preview-v11-floor
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.event.issue.number == 1 && github.event.issue.title == '[DIAGNOSE V11] 床面修復の回帰を分離'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/material-preview-floor-neutralization-v11
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install dependencies
        id: install
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless

      - name: Generate repaired assets
        id: repair
        working-directory: next
        run: python scripts/repair-material-floor-v11.py 2>&1 | tee /tmp/v11-repair.log

      - name: Build
        id: build
        working-directory: next
        run: |
          npm run typecheck
          npm run test:photoreal:unit
          npm run test:gameplay:unit
          npm run build

      - name: Start preview
        id: preview
        working-directory: next
        run: |
          setsid npm run preview >/tmp/v11-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/v11-preview.pid
          echo "$server" >/tmp/bonsai-photoreal-v7-preview.pid
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          exit 1

      - name: Audit v10 wall repair
        id: v10
        continue-on-error: true
        working-directory: next
        run: node tests/material-preview-v10.mjs 2>&1 | tee /tmp/v11-v10.log

      - name: Audit v11 lower floor
        id: v11
        continue-on-error: true
        working-directory: next
        run: node tests/material-preview-v11.mjs 2>&1 | tee /tmp/v11-floor.log

      - name: Audit Gameplay
        id: gameplay
        continue-on-error: true
        working-directory: next
        run: node tests/gameplay-v8.mjs 2>&1 | tee /tmp/v11-gameplay.log

      - name: Audit Black Pine state flow
        id: blackpine
        continue-on-error: true
        working-directory: next
        run: npm run test:black-pine-v9 2>&1 | tee /tmp/v11-blackpine.log

      - name: Audit Photoreal and offline restart
        id: photoreal
        continue-on-error: true
        working-directory: next
        run: npm run test:photoreal 2>&1 | tee /tmp/v11-photoreal.log

      - name: Stop preview
        if: always()
        run: |
          if test -f /tmp/v11-preview.pid; then
            server="$(cat /tmp/v11-preview.pid)"
            kill -TERM -- -"$server" 2>/dev/null || kill "$server" 2>/dev/null || true
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: material-preview-v11-diagnostic
          path: |
            next/material-preview-v11-assets.json
            next/test-artifacts
            /tmp/v11-*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Record diagnostic result
        if: always()
        uses: actions/github-script@v7
        env:
          INSTALL: ${{ steps.install.outcome }}
          REPAIR: ${{ steps.repair.outcome }}
          BUILD: ${{ steps.build.outcome }}
          PREVIEW: ${{ steps.preview.outcome }}
          V10: ${{ steps.v10.outcome }}
          V11: ${{ steps.v11.outcome }}
          GAMEPLAY: ${{ steps.gameplay.outcome }}
          BLACKPINE: ${{ steps.blackpine.outcome }}
          PHOTOREAL: ${{ steps.photoreal.outcome }}
        with:
          script: |
            const fs = require('fs');
            const outcomes = {
              install: process.env.INSTALL || 'not-run',
              repair: process.env.REPAIR || 'not-run',
              build: process.env.BUILD || 'not-run',
              preview: process.env.PREVIEW || 'not-run',
              v10: process.env.V10 || 'not-run',
              v11: process.env.V11 || 'not-run',
              gameplay: process.env.GAMEPLAY || 'not-run',
              blackpine: process.env.BLACKPINE || 'not-run',
              photoreal: process.env.PHOTOREAL || 'not-run'
            };
            const logs = ['v11-v10.log','v11-floor.log','v11-gameplay.log','v11-blackpine.log','v11-photoreal.log']
              .map(name => {
                const path = `/tmp/${name}`;
                if (!fs.existsSync(path)) return '';
                const text = fs.readFileSync(path, 'utf8');
                return `## ${name}\n\`\`\`text\n${text.slice(-3500)}\n\`\`\``;
              }).filter(Boolean);
            const passed = Object.values(outcomes).every(value => value === 'success');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              title: passed ? 'BONSAI Material Preview v11: DIAGNOSTIC PASS' : 'BONSAI Material Preview v11: DIAGNOSTIC FOUND FAILURE',
              body: ['# Material Preview v11 回帰診断','', ...Object.entries(outcomes).map(([k,v]) => `- ${k}: ${v}`), '', ...logs].join('\n'),
              state: 'open',
              state_reason: 'reopened'
            });
