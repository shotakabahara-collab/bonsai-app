name: Apply readable BONSAI React rebuild

on:
  push:
    branches: [rebuild/react-v1]
    paths:
      - 'rebuild-source/**'
      - '.github/workflows/apply-readable-react-rebuild.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-readable-bonsai-react-rebuild
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/react-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Assemble typed source files
        run: |
          cat rebuild-source/app.part-* > next/src/App.tsx
          cat rebuild-source/model.part-* > next/src/model.ts
          cat rebuild-source/styles.part-* > next/src/styles.css
          echo '328b56ba4636e460304b6f1ab91dfbd2a82c5f5f05fe2c75c05b42fda1432eaf  next/src/App.tsx' | sha256sum -c -
          echo '5224f7a3ba2751995080f096d54c4cb599d6df92d5f72eb0677729ddd59c641f  next/src/model.ts' | sha256sum -c -
          echo '0a71edd8a3bc83e0b85adaa5107896986e54288236eba75ef986793839a48559  next/src/styles.css' | sha256sum -c -
      - name: Generate deterministic dependency lock
        working-directory: next
        run: npm install --package-lock-only --ignore-scripts
      - name: Verify typecheck and production build
        working-directory: next
        run: npm ci && npm run build
      - name: Commit clean rebuilt source
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add next .github/workflows/react-rebuild-v1.yml
          git rm -r rebuild-source .github/workflows/apply-readable-react-rebuild.yml
          git commit -m 'BONSAIをReact・TypeScript・Viteで再構築'
          git push origin HEAD:rebuild/react-v1
