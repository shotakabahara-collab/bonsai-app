name: Apply audited authentic work consequences v5

on:
  pull_request:
    branches: [main]
    paths:
      - '.bonsai-authentic-v5-r4/ready'
      - '.github/workflows/apply-authentic-v5-clean.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-audited-authentic-work-v5
  cancel-in-progress: false

jobs:
  apply-audit-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Apply SHA-verified implementation payload
        run: |
          set -euxo pipefail
          cat .bonsai-authentic-v5-r3/chunk-* > /tmp/authentic-v5-base.b64
          printf 'p' | dd of=/tmp/authentic-v5-base.b64 bs=1 seek=12616 conv=notrunc status=none
          printf '9' | dd of=/tmp/authentic-v5-base.b64 bs=1 seek=40521 conv=notrunc status=none
          test "$(wc -c < /tmp/authentic-v5-base.b64)" -eq 48576
          base64 -d /tmp/authentic-v5-base.b64 > /tmp/authentic-v5-base.xz
          echo 'abd4c952300bb8e72cce3ed0761a9de07cd6a53727a0ce524a302165c7d4d058  /tmp/authentic-v5-base.xz' | sha256sum -c -
          xz -t /tmp/authentic-v5-base.xz
          rm -f .github/workflows/deploy-react-v1.yml
          xz -dc /tmp/authentic-v5-base.xz | patch -p1 --batch --forward

          cat .bonsai-authentic-v5-r4/chunk-* > /tmp/authentic-v5-calibration.b64
          test "$(wc -c < /tmp/authentic-v5-calibration.b64)" -eq 8016
          base64 -d /tmp/authentic-v5-calibration.b64 > /tmp/authentic-v5-calibration.xz
          echo 'd89e4bbb67377aa7cde4e37efc9351806cd1350bf5ec9affce475d1d193cf11c  /tmp/authentic-v5-calibration.xz' | sha256sum -c -
          xz -t /tmp/authentic-v5-calibration.xz
          xz -dc /tmp/authentic-v5-calibration.xz | patch -p1 --batch --forward
          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install, typecheck, deterministic model audit and production build
        working-directory: next
        run: |
          npm ci
          npm run typecheck
          npm run test:authentic:unit
          npm run build
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow

      - name: Start verified production preview
        working-directory: next
        run: |
          setsid npm run preview >/tmp/bonsai-authentic-v5-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-authentic-v5-preview.pid
          for i in $(seq 1 100); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          cat /tmp/bonsai-authentic-v5-preview.log
          exit 1

      - name: Run existing 390x844 DPR3 WebKit regression
        working-directory: next
        run: npm run test:smoke 2>&1 | tee /tmp/authentic-v5-smoke.log

      - name: Run seasonal v4 persistence regression
        working-directory: next
        run: node tests/seasonal-v4.mjs 2>&1 | tee /tmp/authentic-v5-seasonal.log

      - name: Run pruning consequences, interruption and offline restart audit
        working-directory: next
        run: npm run test:authentic 2>&1 | tee /tmp/authentic-v5-interaction.log

      - name: Audit only the photographed artwork region
        working-directory: next
        run: python scripts/visual-audit-v5.py --output authentic-v5-preflight-visual-audit.json 2>&1 | tee /tmp/authentic-v5-visual.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-authentic-v5-clean-preflight
          path: |
            next/test-artifacts
            /tmp/bonsai-authentic-v5-preview.log
            /tmp/authentic-v5-smoke.log
            /tmp/authentic-v5-seasonal.log
            /tmp/authentic-v5-interaction.log
            /tmp/authentic-v5-visual.log
          if-no-files-found: warn
          retention-days: 14

      - name: Commit only audited application source
        run: |
          rm -rf next/node_modules next/dist next/test-artifacts next/.test-cjs
          rm -rf .bonsai-authentic-v5 .bonsai-authentic-v5-r2 .bonsai-authentic-v5-r3 .bonsai-authentic-v5-r4
          rm -f .github/workflows/apply-authentic-v5.yml
          rm -f .github/workflows/apply-authentic-v5-final.yml
          rm -f .github/workflows/apply-authentic-v5-clean.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- next .github/workflows .bonsai-authentic-v5 .bonsai-authentic-v5-r2 .bonsai-authentic-v5-r3 .bonsai-authentic-v5-r4
          git status --short
          test -n "$(git status --short)"
          git commit -m '実写加工と剪定リスク結果v5を実装'
          git push origin "HEAD:${TARGET_BRANCH}"
