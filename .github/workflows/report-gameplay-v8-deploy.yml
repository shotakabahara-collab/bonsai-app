name: Report Gameplay v8 deploy status

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/report-gameplay-v8-deploy.yml']
  workflow_dispatch:

permissions:
  actions: read
  issues: write

jobs:
  report:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const result = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              per_page: 30
            });
            const runs = result.data.workflow_runs
              .filter(run => run.name === 'Deploy BONSAI React production')
              .slice(0, 5);
            const body = [
              '## Gameplay v8 deploy monitor',
              '',
              ...runs.map(run => `- run #${run.run_number} / id ${run.id}: **${run.status} / ${run.conclusion ?? 'pending'}** — head \`${run.head_sha}\` — event ${run.event}`)
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body
            });
