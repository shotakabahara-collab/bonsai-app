name: Materialize Material Preview v10 repaired photographs

on:
  push:
    branches: [agent/material-preview-brown-neutralization-v10]
    paths:
      - '.github/workflows/materialize-material-preview-v10.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-material-preview-v10
  cancel-in-progress: false

jobs:
  repair-audit-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/material-preview-brown-neutralization-v10
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install image and app dependencies
        run: |
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless
          cd next
          npm ci
          npx playwright install --with-deps webkit

      - name: Repair colored base-photo backdrops
        run: |
          python next/scripts/repair-material-backdrops-v10.py
          test "$(find next/public/assets/kuromatsu/base -maxdepth 1 -type f -name '*.webp' | wc -l)" -ge 5
          grep -Fq "bonsai-material-preview-v10" next/public/sw.js
          grep -Fq "BONSAI_RELEASE: bonsai-material-preview-v10" .github/workflows/deploy-react-v1.yml
          git diff --check

      - name: Typecheck, contracts and production build
        working-directory: next
        run: |
          npm run typecheck
          npm run test:photoreal:unit
          npm run test:gameplay:unit
          npm run build

      - name: Start repaired production preview
        working-directory: next
        run: |
          setsid npm run preview >/tmp/material-preview-v10.log 2>&1 &
          server=$!
          echo "$server" >/tmp/material-preview-v10.pid
          echo "$server" >/tmp/bonsai-photoreal-v7-preview.pid
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && exit 0
            sleep .25
          done
          cat /tmp/material-preview-v10.log
          exit 1

      - name: Run material, Gameplay and Photoreal WebKit audits
        working-directory: next
        run: |
          npm run test:gameplay
          npm run test:photoreal

      - name: Stop preview
        if: always()
        run: |
          if test -f /tmp/material-preview-v10.pid; then
            server="$(cat /tmp/material-preview-v10.pid)"
            kill -TERM -- -"$server" 2>/dev/null || kill "$server" 2>/dev/null || true
          fi

      - name: Commit only audited repaired sources
        run: |
          rm -f .github/workflows/materialize-material-preview-v10.yml
          rm -rf next/node_modules next/dist next/test-artifacts next/scripts/__pycache__
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          test -n "$(git diff --cached --name-only)"
          git commit -m 'Material Preview v10：色付き背景を写真内修復'
          git push origin HEAD:agent/material-preview-brown-neutralization-v10

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: material-preview-v10-repair-audit
          path: |
            next/material-preview-v10-assets.json
            next/test-artifacts/material-preview-v10-result.json
            next/test-artifacts/material-preview-v10-iphone.png
            /tmp/material-preview-v10.log
          if-no-files-found: warn
          retention-days: 14
