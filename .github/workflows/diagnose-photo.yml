name: Diagnose photorealistic still integration

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-photo.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Diagnose JavaScript
        run: |
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const scripts=[...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
          let status='PASS',detail='inline JavaScript parsed successfully';
          try{new vm.Script(scripts.at(-1)[1],{filename:'bonsai.js'});}catch(e){status='FAIL';detail=e.stack||String(e)}
          let p=html.indexOf('function svg()');
          let excerpt=p>=0?html.slice(Math.max(0,p-180),Math.min(html.length,p+850)):'function svg not found';
          fs.writeFileSync('PHOTO_DIAGNOSTIC.md',`# Photo integration diagnostic\n\n- status: ${status}\n\n## detail\n\n\`\`\`text\n${detail}\n\`\`\`\n\n## svg excerpt\n\n\`\`\`javascript\n${excerpt}\n\`\`\`\n`);
          NODE
      - name: Commit diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add PHOTO_DIAGNOSTIC.md
          git commit -m '実写静止画接続の構文診断結果を記録'
          git push origin HEAD:main
