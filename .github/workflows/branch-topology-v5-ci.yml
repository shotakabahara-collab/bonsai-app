name: Branch Topology v5 validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'next/**'
      - '.github/workflows/branch-topology-v5-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: branch-topology-v5-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Capture review source
        uses: actions/upload-artifact@v4
        with:
          name: bonsai-branch-topology-v5-source
          path: |
            .github
            next
          if-no-files-found: error
          retention-days: 3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install exact dependencies
        working-directory: next
        run: npm ci

      - name: Typecheck and production build
        working-directory: next
        run: npm run build

      - name: Install iPhone WebKit
        working-directory: next
        run: npx playwright install --with-deps webkit

      - name: Run 390x844 DPR3 regression audit
        working-directory: next
        run: |
          npm run preview >/tmp/bonsai-v5-preview.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 80); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && break
            sleep .25
          done
          npm run test:smoke

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-branch-topology-v5-audit
          path: next/test-artifacts
          if-no-files-found: warn
