name: Publish Material Preview v10 from Issue

on:
  issues:
    types: [edited]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  BONSAI_RELEASE: bonsai-material-preview-v10

jobs:
  build-and-audit:
    if: github.event.issue.number == 1 && github.event.issue.title == '[PUBLISH V10] 黒松候補の背景修復を公開'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install exact dependencies and image tools
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless

      - name: Verify v10 source, repaired materials and production build
        working-directory: next
        run: |
          npm run typecheck
          npm run test:photoreal:unit
          npm run test:gameplay:unit
          npm run build
          test "$(wc -c < public/assets/kuromatsu/base/starter.webp)" -gt 100000
          test "$(wc -c < public/assets/kuromatsu/base/old.webp)" -gt 100000
          test "$(wc -c < public/assets/kuromatsu/base/blue.webp)" -gt 100000
          grep -Fq "$BONSAI_RELEASE" public/sw.js

      - name: Run local WebKit and complete regression audits
        working-directory: next
        run: |
          setsid npm run preview >/tmp/bonsai-v10-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-photoreal-v7-preview.pid
          trap 'kill -TERM -- -$server 2>/dev/null || true' EXIT
          for i in $(seq 1 120); do
            curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null && break
            sleep .25
          done
          curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null
          npm run test:smoke
          node tests/seasonal-v4.mjs
          npm run test:gameplay
          npm run test:black-pine-v9
          python scripts/audit-black-pine-state-v9.py
          npm run test:photoreal

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: next/dist

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-material-preview-v10-local-audit
          path: |
            next/test-artifacts
            next/material-preview-v10-assets.json
            /tmp/bonsai-v10-preview.log
          if-no-files-found: warn
          retention-days: 14

  deploy:
    needs: build-and-audit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy verified production bundle
        id: deployment
        uses: actions/deploy-pages@v4

  public-iphone-audit:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install public audit dependencies
        id: install
        working-directory: next
        continue-on-error: true
        run: |
          set -o pipefail
          { npm ci; npx playwright install --with-deps webkit; python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless; } 2>&1 | tee /tmp/public-install.log

      - name: Wait for Material Preview v10 on Pages
        id: wait
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          {
            base="${PAGE_URL%/}/"
            ready=0
            for i in $(seq 1 160); do
              if curl -fsS "${base}index.html?v=${RELEASE_SHA}-${i}" -o /tmp/live-index.html \
                && grep -Fq '<title>BONSAI</title>' /tmp/live-index.html \
                && curl -fsS "${base}sw.js?v=${RELEASE_SHA}-${i}" -o /tmp/live-sw.js \
                && grep -Fq "$BONSAI_RELEASE" /tmp/live-sw.js; then
                ready=1
                break
              fi
              sleep 3
            done
            test "$ready" = 1
          } 2>&1 | tee /tmp/public-wait.log

      - name: Run public smoke
        id: smoke
        if: steps.wait.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: npm run test:smoke 2>&1 | tee /tmp/public-smoke.log

      - name: Run public seasonal regression
        id: seasonal
        if: steps.smoke.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: node tests/seasonal-v4.mjs 2>&1 | tee /tmp/public-seasonal.log

      - name: Run public Gameplay and material regression
        id: gameplay
        if: steps.seasonal.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: npm run test:gameplay 2>&1 | tee /tmp/public-gameplay.log

      - name: Run public Black Pine real-flow audit
        id: blackpine
        if: steps.gameplay.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: |
          set -o pipefail
          npm run test:black-pine-v9 2>&1 | tee /tmp/public-blackpine.log
          python scripts/audit-black-pine-state-v9.py 2>&1 | tee -a /tmp/public-blackpine.log

      - name: Run public Photoreal and offline regression
        id: photoreal
        if: steps.blackpine.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: npm run test:photoreal 2>&1 | tee /tmp/public-photoreal.log

      - name: Verify public v10 files
        id: files
        if: steps.photoreal.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          {
            base="${PAGE_URL%/}/"
            curl -fsS "${base}sw.js?v=${RELEASE_SHA}" | grep -Fq "$BONSAI_RELEASE"
            curl -fsS "${base}assets/kuromatsu/base/starter.webp?v=${RELEASE_SHA}" -o /tmp/live-starter.webp
            curl -fsS "${base}assets/kuromatsu/base/old.webp?v=${RELEASE_SHA}" -o /tmp/live-old.webp
            curl -fsS "${base}assets/kuromatsu/base/blue.webp?v=${RELEASE_SHA}" -o /tmp/live-blue.webp
            test "$(wc -c < /tmp/live-starter.webp)" -gt 100000
            test "$(wc -c < /tmp/live-old.webp)" -gt 100000
            test "$(wc -c < /tmp/live-blue.webp)" -gt 100000
          } 2>&1 | tee /tmp/public-files.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-material-preview-v10-public-audit
          path: next/test-artifacts
          if-no-files-found: warn
          retention-days: 14

      - name: Record production audit
        if: always()
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          INSTALL: ${{ steps.install.outcome }}
          WAIT: ${{ steps.wait.outcome }}
          SMOKE: ${{ steps.smoke.outcome }}
          SEASONAL: ${{ steps.seasonal.outcome }}
          GAMEPLAY: ${{ steps.gameplay.outcome }}
          BLACKPINE: ${{ steps.blackpine.outcome }}
          PHOTOREAL: ${{ steps.photoreal.outcome }}
          FILES: ${{ steps.files.outcome }}
        with:
          script: |
            const outcomes = {
              install: process.env.INSTALL || 'not-run', wait: process.env.WAIT || 'not-run',
              smoke: process.env.SMOKE || 'not-run', seasonal: process.env.SEASONAL || 'not-run',
              gameplay: process.env.GAMEPLAY || 'not-run', blackpine: process.env.BLACKPINE || 'not-run',
              photoreal: process.env.PHOTOREAL || 'not-run', files: process.env.FILES || 'not-run'
            };
            const passed = Object.values(outcomes).every(v => v === 'success');
            const page = (process.env.PAGE_URL || 'https://shotakabahara-collab.github.io/bonsai-app/').replace(/\/$/, '') + '/';
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: 1,
              title: passed ? 'BONSAI Material Preview v10: PUBLISHED / iPhone確認待ち' : 'BONSAI Material Preview v10 production audit: FAIL',
              body: [
                '# BONSAI Material Preview v10 公開監査', '',
                `- published SHA: \`${context.sha}\``, '- deployed release: `bonsai-material-preview-v10`',
                `- Pages URL: ${page}`,
                '- starter / old / blue colored rectangular backdrops: repaired and verified',
                '- black pine, pot, moss and wood table foreground: preserved',
                '- black bottom band: not changed in this release',
                ...Object.entries(outcomes).map(([k,v]) => `- public ${k}: ${v}`), '',
                passed ? '公開は完了しています。最終ゲートはiPhone実画面での見た目確認です。' : '未通過項目があります。公開完了扱いにしません。'
              ].join('\n'),
              state: 'open', state_reason: 'reopened'
            });

      - name: Fail when any public audit failed
        if: always() && (steps.install.outcome != 'success' || steps.wait.outcome != 'success' || steps.smoke.outcome != 'success' || steps.seasonal.outcome != 'success' || steps.gameplay.outcome != 'success' || steps.blackpine.outcome != 'success' || steps.photoreal.outcome != 'success' || steps.files.outcome != 'success')
        run: exit 1
