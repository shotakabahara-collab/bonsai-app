name: Apply robust Photoreal Craft v6 implementation

on:
  push:
    branches: [agent/photoreal-craft-v6]
    paths:
      - '.photoreal-v6-robust.ready'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-photoreal-craft-v6-robust
  cancel-in-progress: false

jobs:
  apply-audit-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/photoreal-craft-v6
          fetch-depth: 0

      - name: Select and apply a valid v6 implementation payload
        run: |
          set -euxo pipefail
          mkdir -p /tmp/photoreal-v6
          if compgen -G '.photoreal-v6-payload/bin-*' >/dev/null; then
            cat .photoreal-v6-payload/bin-* > /tmp/photoreal-v6/assembled.xz
          fi
          candidates=(
            .photoreal-v6-source.patch.xz
            .photoreal-v6-payload/changes.patch.xz
            /tmp/photoreal-v6/assembled.xz
            .photoreal-v6-final.patch.xz
          )
          chosen=''
          for candidate in "${candidates[@]}"; do
            test -f "$candidate" || continue
            name="$(basename "$candidate" .xz)"
            sha256sum "$candidate" | tee -a /tmp/photoreal-v6/candidates.sha256
            if ! xz -t "$candidate"; then
              echo "invalid xz: $candidate" | tee -a /tmp/photoreal-v6/selection.log
              continue
            fi
            patch_file="/tmp/photoreal-v6/${name}.patch"
            xz -dc "$candidate" > "$patch_file"
            if git apply --check --binary "$patch_file"; then
              chosen="$patch_file"
              echo "selected $candidate" | tee /tmp/photoreal-v6/selection.log
              break
            fi
            echo "cannot apply: $candidate" | tee -a /tmp/photoreal-v6/selection.log
          done
          if test -z "$chosen"; then
            cat /tmp/photoreal-v6/selection.log || true
            exit 1
          fi
          git apply --binary --whitespace=nowarn "$chosen"
          git diff --check
          test -f next/src/BonsaiStage.tsx
          test -f next/scripts/visual-audit-v6.py
          test -f next/tests/photoreal-v6.mjs
          test -f next/tests/photoreal-v6-unit.mjs
          find next/public/assets/kuromatsu/craft-v6 -type f -name '*.webp' | sort | tee /tmp/photoreal-v6/raster-assets.txt
          test "$(wc -l < /tmp/photoreal-v6/raster-assets.txt)" -ge 12

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json

      - name: Install, typecheck, unit-audit and build
        working-directory: next
        run: |
          set -euxo pipefail
          npm ci
          npm run typecheck
          npm run test:photoreal:unit
          npm run build
          node --check tests/smoke.mjs
          node --check tests/seasonal-v4.mjs
          node --check tests/photoreal-v6.mjs
          python -m py_compile scripts/visual-audit-v6.py

      - name: Install iPhone WebKit and image audit tools
        working-directory: next
        run: |
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow

      - name: Run 390x844 DPR3 WebKit, persistence, offline and visual audits
        working-directory: next
        run: |
          set -euxo pipefail
          setsid npm run preview >/tmp/bonsai-photoreal-v6-preview.log 2>&1 &
          server=$!
          echo "$server" >/tmp/bonsai-photoreal-v6-preview.pid
          trap 'kill -TERM -- -$server 2>/dev/null || true' EXIT
          ready=0
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:4173/bonsai-app/ >/dev/null; then
              ready=1
              break
            fi
            sleep .25
          done
          test "$ready" = 1
          npm run test:smoke
          node tests/seasonal-v4.mjs
          npm run test:photoreal
          python scripts/visual-audit-v6.py --output photoreal-v6-preflight-visual-audit.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bonsai-photoreal-craft-v6-robust-audit
          path: |
            next/test-artifacts
            /tmp/bonsai-photoreal-v6-preview.log
            /tmp/photoreal-v6
          if-no-files-found: warn
          retention-days: 14

      - name: Commit only audited v6 application source
        run: |
          set -euxo pipefail
          rm -rf next/.test-cjs next/scripts/__pycache__
          rm -rf .photoreal-v6-payload
          rm -f .photoreal-v6-source.patch.xz .photoreal-v6-source.ready
          rm -f .photoreal-v6-final.patch.xz .photoreal-v6-final.ready
          rm -f .photoreal-v6-robust.ready
          rm -f .github/workflows/apply-photoreal-v6.yml
          rm -f .github/workflows/apply-photoreal-v6-robust.yml
          rm -f .github/workflows/diagnose-photoreal-v6.yml
          rm -f .github/workflows/export-applied-photoreal-v6.yml
          rm -f .github/workflows/export-photoreal-v6-source.yml
          rm -f .github/workflows/finalize-photoreal-v6-source.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git status --short
          git commit -m '針金・神・舎利を写真座標へ密着させるPhotoreal Craft v6を実装'
          git push origin HEAD:agent/photoreal-craft-v6
