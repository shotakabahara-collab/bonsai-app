name: Generate local photoreal assets for React rebuild

on:
  push:
    branches: [rebuild/react-v2]
    paths:
      - '.github/workflows/generate-react-photoreal-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-react-photoreal-assets
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/react-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install image pipeline
        run: python -m pip install --disable-pip-version-check pillow
      - name: Download licensed black-pine photograph
        run: |
          curl --fail --location --retry 8 --retry-delay 3 --retry-all-errors \
            --output /tmp/kuromatsu-source.jpg \
            'https://upload.wikimedia.org/wikipedia/commons/thumb/0/01/Japanese_Black_Pine_bonsai_135%2C_October_10%2C_2008.jpg/960px-Japanese_Black_Pine_bonsai_135%2C_October_10%2C_2008.jpg'
          test "$(wc -c < /tmp/kuromatsu-source.jpg)" -gt 100000
      - name: Build same-tree pot variants and local bridge
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image, ImageChops, ImageDraw, ImageEnhance, ImageFilter, ImageOps, ImageStat
          import hashlib, json

          root = Path('next/public')
          out = root / 'assets' / 'kuromatsu' / 'base'
          out.mkdir(parents=True, exist_ok=True)
          source_path = Path('/tmp/kuromatsu-source.jpg')
          with Image.open(source_path) as opened:
              source = opened.convert('RGB')
          if source.width < 900 or source.height < 600:
              raise SystemExit(f'source resolution is too low: {source.size}')

          target = (900, 1500)
          master = ImageOps.fit(source, target, method=Image.Resampling.LANCZOS, centering=(0.5, 0.50))
          master = ImageEnhance.Contrast(master).enhance(1.035)
          master = ImageEnhance.Color(master).enhance(0.98)
          master = master.filter(ImageFilter.UnsharpMask(radius=1.0, percent=55, threshold=4))

          mask = Image.new('L', target, 0)
          draw = ImageDraw.Draw(mask)
          w, h = target
          draw.polygon([
              (int(w*.05), int(h*.79)), (int(w*.95), int(h*.79)),
              (int(w*.96), int(h*.91)), (int(w*.86), int(h*.97)),
              (int(w*.14), int(h*.97)), (int(w*.04), int(h*.91))
          ], fill=255)
          mask = mask.filter(ImageFilter.GaussianBlur(9))

          tones = {
              'black': None,
              'starter': ((151, 91, 58), .63),
              'blue': ((55, 103, 111), .52),
              'moon': ((185, 181, 168), .47),
              'old': ((117, 72, 45), .57),
          }
          images = {}
          gray = ImageOps.grayscale(master)
          for name, config in tones.items():
              if config is None:
                  image = master.copy()
              else:
                  color, strength = config
                  shadow = tuple(max(3, int(value * .19)) for value in color)
                  highlight = tuple(min(246, int(value * 1.34 + 18)) for value in color)
                  ceramic = ImageOps.colorize(gray, black=shadow, white=highlight)
                  textured = Image.blend(master, ceramic, strength)
                  image = Image.composite(textured, master, mask)
              path = out / f'{name}.webp'
              image.save(path, 'WEBP', quality=86, method=6)
              if path.stat().st_size < 100000:
                  raise SystemExit(f'asset too small: {path} {path.stat().st_size}')
              images[name] = image

          base = images['black']
          crop = (0, int(h*.78), w, h)
          for name in ('starter', 'blue', 'moon', 'old'):
              diff = ImageStat.Stat(ImageChops.difference(base.crop(crop), images[name].crop(crop))).mean
              if sum(diff) / 3 < .7:
                  raise SystemExit(f'pot variant is not visually distinct: {name}')

          sha = hashlib.sha256(source_path.read_bytes()).hexdigest()
          manifest = {
              'version': 'react-kuromatsu-photoreal-v1',
              'sourceTitle': 'Japanese Black Pine bonsai 135, October 10, 2008',
              'sourceAuthor': 'Sage Ross',
              'sourceLicense': 'CC BY-SA 3.0',
              'sourceSha256': sha,
              'width': w,
              'height': h,
              'sameTreeIdentity': True,
              'base': {name: f'assets/kuromatsu/base/{name}.webp' for name in tones}
          }
          manifest_path = root / 'assets' / 'kuromatsu' / 'manifest.json'
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          bridge = """(() => {
            'use strict';
            const POTS = Object.freeze({
              starter: './assets/kuromatsu/base/starter.webp',
              blue: './assets/kuromatsu/base/blue.webp',
              black: './assets/kuromatsu/base/black.webp',
              moon: './assets/kuromatsu/base/moon.webp',
              old: './assets/kuromatsu/base/old.webp'
            });
            function currentPot() {
              try {
                const game = JSON.parse(localStorage.getItem('bonsai:v2') || '{}');
                const bonsai = Array.isArray(game.bonsai) ? game.bonsai.find(item => item.id === game.activeBonsaiId) || game.bonsai[0] : null;
                if (bonsai && POTS[bonsai.potId]) return bonsai.potId;
                const legacy = JSON.parse(localStorage.getItem('bonsai_live_1') || '{}');
                if (POTS[legacy.pot]) return legacy.pot;
              } catch {}
              return 'black';
            }
            const photos = window.BonsaiPhotos || {};
            Object.defineProperty(photos, 'pine', { configurable: true, enumerable: true, get: () => POTS[currentPot()] || POTS.black });
            photos.pineForPot = pot => POTS[pot] || POTS.black;
            photos.pineManifest = './assets/kuromatsu/manifest.json';
            photos.pineMeta = Object.freeze({ version: 'react-kuromatsu-photoreal-v1', width: 900, height: 1500, sameTreeIdentity: true, local: true });
            window.BonsaiPhotos = photos;
          })();
          """
          (root / 'photo-assets.js').write_text(bridge, encoding='utf-8')

          license_text = """# Image licenses\n\n## Japanese black pine source photograph\n\n- Title: Japanese Black Pine bonsai 135, October 10, 2008\n- Author: Sage Ross\n- Source: Wikimedia Commons\n- License: CC BY-SA 3.0\n- Modifications: crop, tonal correction, sharpening, local WebP conversion and pot-colour variants for game state display.\n"""
          (root / 'IMAGE_LICENSES.md').write_text(license_text, encoding='utf-8')

          contact = Image.new('RGB', (250 * len(images), 420), (4, 9, 6))
          for index, (name, image) in enumerate(images.items()):
              panel = image.copy()
              panel.thumbnail((230, 380), Image.Resampling.LANCZOS)
              x = index * 250 + (250 - panel.width) // 2
              contact.paste(panel, (x, 8))
              ImageDraw.Draw(contact).text((index * 250 + 10, 397), name, fill=(238, 228, 207))
          qa = root / 'assets' / 'kuromatsu' / 'pot-variants-contact.webp'
          contact.save(qa, 'WEBP', quality=84, method=6)
          print(json.dumps(manifest, ensure_ascii=False))
          PY
      - name: Extend offline cache for local photographs
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('next/public/sw.js')
          text = path.read_text(encoding='utf-8')
          old = "  '/bonsai-app/photo-assets.js'\n];"
          new = """  '/bonsai-app/photo-assets.js',
            '/bonsai-app/IMAGE_LICENSES.md',
            '/bonsai-app/assets/kuromatsu/manifest.json',
            '/bonsai-app/assets/kuromatsu/base/black.webp',
            '/bonsai-app/assets/kuromatsu/base/starter.webp',
            '/bonsai-app/assets/kuromatsu/base/blue.webp',
            '/bonsai-app/assets/kuromatsu/base/moon.webp',
            '/bonsai-app/assets/kuromatsu/base/old.webp'
          ];"""
          if 'assets/kuromatsu/base/black.webp' not in text:
              if old not in text:
                  raise SystemExit('service worker core marker missing')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Build and validate local visual assets
        working-directory: next
        run: |
          npm ci
          npm run build
          node --check dist/photo-assets.js
          grep -Fq 'react-kuromatsu-photoreal-v1' dist/photo-assets.js
          grep -Fq 'assets/kuromatsu/base/black.webp' dist/sw.js
          for pot in black starter blue moon old; do
            test "$(wc -c < "dist/assets/kuromatsu/base/${pot}.webp")" -gt 100000
          done
      - name: Commit generated local assets
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add next/public next/scripts/copy-legacy-assets.mjs
          git rm .github/workflows/generate-react-photoreal-assets.yml
          git commit -m 'React版へ同一個体のローカル実写黒松と鉢差分を追加'
          git push origin HEAD:rebuild/react-v2
