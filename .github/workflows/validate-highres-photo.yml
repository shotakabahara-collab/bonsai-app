name: Validate high-resolution BONSAI candidate

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'photo-source-v2.js'
      - 'state-image-runtime.js'
      - 'completion-core.js'
      - 'advanced-care.js'
      - 'advanced-care-bridge.js'
      - 'sw.js'
      - 'IMAGE_LICENSES.md'
      - '.github/workflows/validate-highres-photo.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install browser and image comparison tools
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
          python -m pip install --disable-pip-version-check pillow

      - name: Validate source and application contracts
        run: |
          node --check photo-source-v2.js
          node --check state-image-runtime.js
          node --check completion-core.js
          node --check advanced-care.js
          node --check advanced-care-bridge.js
          node --check judging-engine.js
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const photoAssets=html.indexOf('<script src="photo-assets.js"></script>');
          const photoSource=html.indexOf('<script src="photo-source-v2.js"></script>');
          const inlineStart=html.indexOf('<script>');
          if(!(photoAssets>=0 && photoSource>photoAssets && photoSource<inlineStart)) throw Error('photo source script order invalid');
          const inline=[...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)].map(x=>x[1]).filter(x=>x.trim());
          inline.forEach((code,index)=>new vm.Script(code,{filename:`inline-${index}.js`}));
          const source=fs.readFileSync('photo-source-v2.js','utf8');
          for(const token of ['upload.wikimedia.org','pineFallback','CC BY-SA 3.0','BonsaiPhotoSource']) if(!source.includes(token)) throw Error(`missing photo source contract: ${token}`);
          const runtime=fs.readFileSync('state-image-runtime.js','utf8');
          for(const token of ["crossOrigin = 'anonymous'",'bonsai-state-ready','foliageReduction','drawWire','drawDisease','drawPest','drawDeadwood','drawShari']) if(!runtime.includes(token)) throw Error(`missing state renderer contract: ${token}`);
          const sw=fs.readFileSync('sw.js','utf8');
          for(const token of ['photo-source-v2.js','upload.wikimedia.org','bonsai-photo-v5-highres-state']) if(!sw.includes(token)) throw Error(`missing cache contract: ${token}`);
          console.log('candidate contracts: PASS');
          NODE

      - name: Run real-browser state image test
        run: |
          python3 -m http.server 4173 >/tmp/bonsai-browser-http.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 40); do curl -fsS http://127.0.0.1:4173/ >/dev/null && break; sleep .25; done
          mkdir -p test-artifacts
          cat > /tmp/browser-test.mjs <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const browser = await chromium.launch({headless:true});
          const page = await browser.newPage({viewport:{width:390,height:844},deviceScaleFactor:2});
          const errors=[];
          page.on('console',msg=>{ if(msg.type()==='error') errors.push(msg.text()); });
          page.on('pageerror',error=>errors.push(error.message));

          await page.goto('http://127.0.0.1:4173/',{waitUntil:'domcontentloaded'});
          await page.evaluate(()=>{
            const now=Date.now();
            localStorage.setItem('bonsai_live_1',JSON.stringify({
              started:true,name:'検証者',mentor:0,sp:'pine',tree:'黒松・検証樹',born:now-86400000*20,
              water:84,last:now,vit:91,stress:4,prune:0,wire:0,fert:2,pot:'black',money:9000,rep:180,
              owned:['starter','black'],awards:[],log:[],lastWeek:'',stats:{water:5,prune:0,wire:0,shows:0}
            }));
          });
          await page.reload({waitUntil:'networkidle'});
          await page.waitForSelector('.photo-bonsai img');
          await page.waitForFunction(()=>{
            const image=document.querySelector('.photo-bonsai img');
            return image?.complete && image.naturalWidth>=900 && document.querySelector('.bonsai-state-canvas');
          },null,{timeout:45000});

          const baseInfo=await page.evaluate(()=>{
            const image=document.querySelector('.photo-bonsai img');
            const canvas=document.querySelector('.bonsai-state-canvas');
            return {naturalWidth:image.naturalWidth,naturalHeight:image.naturalHeight,canvasWidth:canvas.width,canvasHeight:canvas.height,credit:document.querySelector('#bonsai-photo-credit')?.textContent||''};
          });
          if(baseInfo.naturalWidth<900 || baseInfo.naturalHeight<1200) throw new Error(`source resolution too low: ${JSON.stringify(baseInfo)}`);
          if(!/Sage Ross/.test(baseInfo.credit) || !/CC BY-SA 3.0/.test(baseInfo.credit)) throw new Error('photo attribution is not visible');
          await page.screenshot({path:'test-artifacts/01-home-base.png',fullPage:true});
          await page.locator('.stage').screenshot({path:'test-artifacts/02-stage-base.png'});

          const action=await page.evaluate(()=>{
            let state=JSON.parse(localStorage.getItem('bonsai_live_1'));
            state=window.BonsaiAdvancedCare.migrateState(state);
            const result=window.BonsaiAdvancedCare.applyAction(state,'first_left','prune_medium');
            if(!result.ok) return result;
            const wired=window.BonsaiAdvancedCare.applyAction(result.state,'second_right','wire_light','down');
            localStorage.setItem('bonsai_live_1',JSON.stringify(wired.state));
            return {ok:wired.ok,signature:window.BonsaiAdvancedCare.visualSignature(wired.state)};
          });
          if(!action.ok) throw new Error(`advanced action failed: ${JSON.stringify(action)}`);
          await page.waitForTimeout(1800);
          await page.waitForSelector('.bonsai-state-canvas');
          await page.locator('.stage').screenshot({path:'test-artifacts/03-stage-pruned-wired.png'});

          const exportResult=await page.evaluate(async()=>{
            const state=JSON.parse(localStorage.getItem('bonsai_live_1'));
            const image=document.querySelector('.photo-bonsai img');
            const canvas=await window.BonsaiStateRuntime.compose(state,1200,1600,image.currentSrc||image.src);
            const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',0.91));
            return {width:canvas.width,height:canvas.height,size:blob?.size||0};
          });
          if(exportResult.width!==1200 || exportResult.height!==1600 || exportResult.size<120000) throw new Error(`high-resolution export failed: ${JSON.stringify(exportResult)}`);

          await page.evaluate(()=>{
            let state=window.BonsaiAdvancedCare.migrateState(JSON.parse(localStorage.getItem('bonsai_live_1')));
            state.advanced.parts.apex.disease='needle_blight';
            state.advanced.parts.third_left.pest='spider_mite';
            state.advanced.parts.front_branch.deadwood='jin';
            state.advanced.shari={level:2,side:'left',createdAt:Date.now()};
            localStorage.setItem('bonsai_live_1',JSON.stringify(state));
          });
          await page.waitForTimeout(1800);
          await page.locator('.stage').screenshot({path:'test-artifacts/04-stage-pathology-deadwood.png'});

          fs.writeFileSync('test-artifacts/browser-result.json',JSON.stringify({baseInfo,action,exportResult,errors},null,2));
          if(errors.some(message=>/state image source failed|tainted|securityerror/i.test(message))) throw new Error(`browser errors: ${errors.join(' | ')}`);
          await browser.close();
          NODE
          node /tmp/browser-test.mjs

      - name: Verify state changes are visually measurable
        run: |
          python3 <<'PY'
          from PIL import Image, ImageChops, ImageStat
          from pathlib import Path

          base=Image.open('test-artifacts/02-stage-base.png').convert('RGB')
          styled=Image.open('test-artifacts/03-stage-pruned-wired.png').convert('RGB')
          affected=Image.open('test-artifacts/04-stage-pathology-deadwood.png').convert('RGB')
          if base.size != styled.size or base.size != affected.size:
              raise SystemExit('state screenshots have inconsistent dimensions')

          def mean_delta(left,right):
              diff=ImageChops.difference(left,right)
              return sum(ImageStat.Stat(diff).mean)/3

          styled_delta=mean_delta(base,styled)
          affected_delta=mean_delta(styled,affected)
          if styled_delta < 0.8:
              raise SystemExit(f'pruning/wiring visual delta too small: {styled_delta:.3f}')
          if affected_delta < 0.35:
              raise SystemExit(f'pathology/deadwood visual delta too small: {affected_delta:.3f}')
          Path('test-artifacts/visual-delta.txt').write_text(f'pruning_wiring_mean_delta={styled_delta:.4f}\npathology_deadwood_mean_delta={affected_delta:.4f}\n')
          print('visual state deltas: PASS', styled_delta, affected_delta)
          PY

      - name: Upload visual audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: highres-bonsai-visual-audit
          path: test-artifacts
          if-no-files-found: warn
