name: Validate high-resolution BONSAI candidate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install browser and image tools
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
          python -m pip install --disable-pip-version-check pillow

      - name: Validate static contracts
        run: |
          for file in photo-source-v2.js state-image-runtime.js completion-core.js advanced-care.js advanced-care-bridge.js judging-engine.js tests/highres-browser.mjs; do node --check "$file"; done
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const assets=html.indexOf('<script src="photo-assets.js"></script>');
          const source=html.indexOf('<script src="photo-source-v2.js"></script>');
          if(!(assets>=0 && source>assets)) throw Error('photo source order invalid');
          [...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)].map(x=>x[1]).filter(x=>x.trim()).forEach((code,index)=>new vm.Script(code,{filename:`inline-${index}.js`}));
          const photo=fs.readFileSync('photo-source-v2.js','utf8');
          for(const token of ['upload.wikimedia.org','photoCorsReady','CC BY-SA 3.0','BonsaiPhotoSource']) if(!photo.includes(token)) throw Error(`missing photo contract: ${token}`);
          const runtime=fs.readFileSync('state-image-runtime.js','utf8');
          for(const token of ['bonsai-state-ready','foliageReduction','drawWire','drawDisease','drawPest','drawDeadwood','drawShari']) if(!runtime.includes(token)) throw Error(`missing runtime contract: ${token}`);
          const sw=fs.readFileSync('sw.js','utf8');
          for(const token of ['bonsai-photo-v6-highres-state','photo-source-v2.js','upload.wikimedia.org',"event.request.mode!=='cors'"]) if(!sw.includes(token)) throw Error(`missing cache contract: ${token}`);
          console.log('static contracts: PASS');
          NODE

      - name: Run iPhone-sized browser validation
        run: |
          python3 -m http.server 4173 >/tmp/bonsai-http.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 40); do curl -fsS http://127.0.0.1:4173/ >/dev/null && break; sleep .25; done
          mkdir -p test-artifacts
          node tests/highres-browser.mjs

      - name: Verify measurable visual state changes
        run: |
          python3 <<'PY'
          from PIL import Image, ImageChops, ImageStat
          from pathlib import Path
          base=Image.open('test-artifacts/02-stage-base.png').convert('RGB')
          styled=Image.open('test-artifacts/03-stage-pruned-wired.png').convert('RGB')
          affected=Image.open('test-artifacts/04-stage-pathology-deadwood.png').convert('RGB')
          if base.size!=styled.size or base.size!=affected.size: raise SystemExit('screenshot sizes differ')
          def delta(a,b): return sum(ImageStat.Stat(ImageChops.difference(a,b)).mean)/3
          d1,d2=delta(base,styled),delta(styled,affected)
          if d1<0.8: raise SystemExit(f'pruning/wiring delta too small: {d1:.3f}')
          if d2<0.35: raise SystemExit(f'pathology/deadwood delta too small: {d2:.3f}')
          Path('test-artifacts/visual-delta.txt').write_text(f'pruning_wiring_mean_delta={d1:.4f}\npathology_deadwood_mean_delta={d2:.4f}\n')
          print('visual state deltas: PASS',d1,d2)
          PY

      - name: Upload visual audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: highres-bonsai-visual-audit
          path: test-artifacts
          if-no-files-found: warn
