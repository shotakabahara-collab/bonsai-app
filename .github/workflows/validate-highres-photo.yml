name: Validate high-resolution BONSAI candidate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install browser and image tools
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
          python -m pip install --disable-pip-version-check pillow

      - name: Validate static contracts
        run: |
          for file in photo-source-v2.js state-image-runtime.js completion-core.js advanced-care.js advanced-care-bridge.js judging-engine.js; do node --check "$file"; done
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const html=fs.readFileSync('index.html','utf8');
          const assets=html.indexOf('<script src="photo-assets.js"></script>');
          const source=html.indexOf('<script src="photo-source-v2.js"></script>');
          if(!(assets>=0 && source>assets)) throw Error('photo source order invalid');
          [...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)].map(x=>x[1]).filter(x=>x.trim()).forEach((code,index)=>new vm.Script(code,{filename:`inline-${index}.js`}));
          const photo=fs.readFileSync('photo-source-v2.js','utf8');
          for(const token of ['upload.wikimedia.org','photoCorsReady','CC BY-SA 3.0','BonsaiPhotoSource']) if(!photo.includes(token)) throw Error(`missing photo contract: ${token}`);
          const runtime=fs.readFileSync('state-image-runtime.js','utf8');
          for(const token of ['bonsai-state-ready','foliageReduction','drawWire','drawDisease','drawPest','drawDeadwood','drawShari']) if(!runtime.includes(token)) throw Error(`missing runtime contract: ${token}`);
          const sw=fs.readFileSync('sw.js','utf8');
          for(const token of ['bonsai-photo-v6-highres-state','photo-source-v2.js','upload.wikimedia.org',"event.request.mode!=='cors'"]) if(!sw.includes(token)) throw Error(`missing cache contract: ${token}`);
          console.log('static contracts: PASS');
          NODE

      - name: Run iPhone-sized browser validation
        run: |
          python3 -m http.server 4173 >/tmp/bonsai-http.log 2>&1 &
          server=$!
          trap 'kill $server' EXIT
          for i in $(seq 1 40); do curl -fsS http://127.0.0.1:4173/ >/dev/null && break; sleep .25; done
          mkdir -p test-artifacts
          cat > browser-test.mjs <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const report={phase:'launch',errors:[],failedRequests:[],responses:[]};
          let browser;
          try {
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:390,height:844},deviceScaleFactor:2});
            page.on('console',message=>{if(message.type()==='error')report.errors.push(message.text())});
            page.on('pageerror',error=>report.errors.push(error.message));
            page.on('requestfailed',request=>report.failedRequests.push({url:request.url(),error:request.failure()?.errorText||''}));
            page.on('response',response=>{if(/wikimedia|photo-source-v2|state-image-runtime/.test(response.url()))report.responses.push({url:response.url(),status:response.status(),serviceWorker:response.fromServiceWorker()})});

            report.phase='seed';
            await page.goto('http://127.0.0.1:4173/',{waitUntil:'domcontentloaded'});
            await page.evaluate(()=>{
              const now=Date.now();
              localStorage.setItem('bonsai_live_1',JSON.stringify({started:true,name:'検証者',mentor:0,sp:'pine',tree:'黒松・検証樹',born:now-1728000000,water:84,last:now,vit:91,stress:4,prune:0,wire:0,fert:2,pot:'black',money:9000,rep:180,owned:['starter','black'],awards:[],log:[],lastWeek:'',stats:{water:5,prune:0,wire:0,shows:0}}));
            });
            await page.reload({waitUntil:'networkidle'});

            report.phase='base';
            await page.waitForFunction(()=>{
              const image=document.querySelector('.photo-bonsai img');
              return image?.complete && image.naturalWidth>=900 && document.querySelector('.bonsai-state-canvas') && image.closest('.photo-bonsai')?.classList.contains('bonsai-state-ready');
            },null,{timeout:45000});
            report.base=await page.evaluate(()=>{
              const image=document.querySelector('.photo-bonsai img');
              const canvas=document.querySelector('.bonsai-state-canvas');
              return {width:image.naturalWidth,height:image.naturalHeight,crossOrigin:image.crossOrigin,src:image.currentSrc,canvasWidth:canvas.width,canvasHeight:canvas.height,credit:document.querySelector('#bonsai-photo-credit')?.textContent||''};
            });
            if(report.base.width<900||report.base.height<1200)throw Error(`source resolution too low: ${JSON.stringify(report.base)}`);
            if(report.base.crossOrigin!=='anonymous')throw Error(`source image is not CORS-enabled: ${JSON.stringify(report.base)}`);
            if(!/Sage Ross/.test(report.base.credit)||!/CC BY-SA 3.0/.test(report.base.credit))throw Error('attribution missing');
            await page.screenshot({path:'test-artifacts/01-home-base.png',fullPage:true});
            await page.locator('.stage').screenshot({path:'test-artifacts/02-stage-base.png'});

            report.phase='prune-wire';
            report.action=await page.evaluate(()=>{
              let state=window.BonsaiAdvancedCare.migrateState(JSON.parse(localStorage.getItem('bonsai_live_1')));
              const pruned=window.BonsaiAdvancedCare.applyAction(state,'first_left','prune_medium');
              if(!pruned.ok)return pruned;
              const wired=window.BonsaiAdvancedCare.applyAction(pruned.state,'second_right','wire_light','down');
              localStorage.setItem('bonsai_live_1',JSON.stringify(wired.state));
              return {ok:wired.ok,signature:window.BonsaiAdvancedCare.visualSignature(wired.state)};
            });
            if(!report.action.ok)throw Error(`advanced action failed: ${JSON.stringify(report.action)}`);
            await page.waitForTimeout(2400);
            await page.locator('.stage').screenshot({path:'test-artifacts/03-stage-pruned-wired.png'});

            report.phase='export';
            report.export=await page.evaluate(async()=>{
              const state=JSON.parse(localStorage.getItem('bonsai_live_1'));
              const image=document.querySelector('.photo-bonsai img');
              const canvas=await window.BonsaiStateRuntime.compose(state,1200,1600,image.currentSrc||image.src);
              const blob=await new Promise((resolve,reject)=>canvas.toBlob(value=>value?resolve(value):reject(Error('toBlob null')),'image/jpeg',0.91));
              return {width:canvas.width,height:canvas.height,size:blob.size};
            });
            if(report.export.width!==1200||report.export.height!==1600||report.export.size<120000)throw Error(`high-resolution export failed: ${JSON.stringify(report.export)}`);

            report.phase='disease-deadwood';
            await page.evaluate(()=>{
              const state=window.BonsaiAdvancedCare.migrateState(JSON.parse(localStorage.getItem('bonsai_live_1')));
              state.advanced.parts.apex.disease='needle_blight';
              state.advanced.parts.third_left.pest='spider_mite';
              state.advanced.parts.front_branch.deadwood='jin';
              state.advanced.shari={level:2,side:'left',createdAt:Date.now()};
              localStorage.setItem('bonsai_live_1',JSON.stringify(state));
            });
            await page.waitForTimeout(2400);
            await page.locator('.stage').screenshot({path:'test-artifacts/04-stage-pathology-deadwood.png'});
            if(report.errors.some(message=>/state image source failed|tainted|securityerror/i.test(message)))throw Error(`browser errors: ${report.errors.join(' | ')}`);
            report.phase='complete';
          } catch(error) {
            report.failure={name:error.name,message:error.message,stack:error.stack};
            throw error;
          } finally {
            fs.writeFileSync('test-artifacts/browser-result.json',JSON.stringify(report,null,2));
            if(browser)await browser.close();
          }
          NODE
          node browser-test.mjs

      - name: Verify measurable visual state changes
        run: |
          python3 <<'PY'
          from PIL import Image, ImageChops, ImageStat
          from pathlib import Path
          base=Image.open('test-artifacts/02-stage-base.png').convert('RGB')
          styled=Image.open('test-artifacts/03-stage-pruned-wired.png').convert('RGB')
          affected=Image.open('test-artifacts/04-stage-pathology-deadwood.png').convert('RGB')
          if base.size!=styled.size or base.size!=affected.size: raise SystemExit('screenshot sizes differ')
          def delta(a,b): return sum(ImageStat.Stat(ImageChops.difference(a,b)).mean)/3
          d1,d2=delta(base,styled),delta(styled,affected)
          if d1<0.8: raise SystemExit(f'pruning/wiring delta too small: {d1:.3f}')
          if d2<0.35: raise SystemExit(f'pathology/deadwood delta too small: {d2:.3f}')
          Path('test-artifacts/visual-delta.txt').write_text(f'pruning_wiring_mean_delta={d1:.4f}\npathology_deadwood_mean_delta={d2:.4f}\n')
          print('visual state deltas: PASS',d1,d2)
          PY

      - name: Upload visual audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: highres-bonsai-visual-audit
          path: test-artifacts
          if-no-files-found: warn
