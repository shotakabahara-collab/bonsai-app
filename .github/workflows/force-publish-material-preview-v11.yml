name: Force publish Material Preview v11

on:
  issues:
    types: [edited]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages-force-material-preview-v11
  cancel-in-progress: false

env:
  BONSAI_RELEASE: bonsai-material-preview-v11

jobs:
  build:
    if: github.event.issue.number == 1 && github.event.issue.title == '[FORCE PUBLISH V11] 下部床面修復版を公開'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json
      - name: Install and build main
        working-directory: next
        run: |
          npm ci
          npm run typecheck
          npm run test:photoreal:unit
          npm run test:gameplay:unit
          npm run build
          grep -Fq 'bonsai-material-preview-v11' public/sw.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: next/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy v11 production bundle
        id: deployment
        uses: actions/deploy-pages@v4

  public-audit:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: next/package-lock.json
      - name: Install public audit tools
        id: install
        continue-on-error: true
        working-directory: next
        run: |
          npm ci
          npx playwright install --with-deps webkit
          python -m pip install --disable-pip-version-check pillow numpy opencv-python-headless
      - name: Wait for v11 release
        id: wait
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          base="${PAGE_URL%/}/"
          ready=0
          for i in $(seq 1 180); do
            if curl -fsS "${base}sw.js?v=${RELEASE_SHA}-${i}" -o /tmp/live-sw.js \
              && grep -Fq "$BONSAI_RELEASE" /tmp/live-sw.js \
              && curl -fsS "${base}index.html?v=${RELEASE_SHA}-${i}" -o /tmp/live-index.html \
              && grep -Fq '<title>BONSAI</title>' /tmp/live-index.html; then
              ready=1
              break
            fi
            sleep 3
          done
          test "$ready" = 1
      - name: Audit public material photographs and Gameplay
        id: material
        if: steps.wait.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: npm run test:gameplay
      - name: Audit public Black Pine states
        id: blackpine
        if: steps.material.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: |
          npm run test:black-pine-v9
          python scripts/audit-black-pine-state-v9.py
      - name: Audit public Photoreal and offline shell
        id: photoreal
        if: steps.blackpine.outcome == 'success'
        continue-on-error: true
        working-directory: next
        env:
          BONSAI_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          BONSAI_PUBLIC: '1'
        run: npm run test:photoreal
      - name: Verify all five public base photographs
        id: files
        if: steps.photoreal.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          base="${PAGE_URL%/}/"
          for name in starter old blue black moon; do
            curl -fsS "${base}assets/kuromatsu/base/${name}.webp?v=${RELEASE_SHA}" -o "/tmp/${name}.webp"
            test "$(wc -c < "/tmp/${name}.webp")" -gt 100000
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: material-preview-v11-force-public-audit
          path: next/test-artifacts
          if-no-files-found: warn
          retention-days: 14
      - name: Record force-public result
        if: always()
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          INSTALL: ${{ steps.install.outcome }}
          WAIT: ${{ steps.wait.outcome }}
          MATERIAL: ${{ steps.material.outcome }}
          BLACKPINE: ${{ steps.blackpine.outcome }}
          PHOTOREAL: ${{ steps.photoreal.outcome }}
          FILES: ${{ steps.files.outcome }}
        with:
          script: |
            const outcomes = {
              install: process.env.INSTALL || 'not-run', wait: process.env.WAIT || 'not-run',
              material: process.env.MATERIAL || 'not-run', blackpine: process.env.BLACKPINE || 'not-run',
              photoreal: process.env.PHOTOREAL || 'not-run', files: process.env.FILES || 'not-run'
            };
            const passed = Object.values(outcomes).every(value => value === 'success');
            const page = (process.env.PAGE_URL || 'https://shotakabahara-collab.github.io/bonsai-app/').replace(/\/$/, '') + '/';
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: 1,
              title: passed ? 'BONSAI Material Preview v11: PUBLISHED / iPhone確認待ち' : 'BONSAI Material Preview v11 force publish: FAIL',
              body: [
                '# Material Preview v11 強制公開結果','',
                '- build: success','- deploy: success',
                ...Object.entries(outcomes).map(([key,value]) => `- public ${key}: ${value}`),'',
                '- release: `bonsai-material-preview-v11`',
                `- Pages URL: ${page}`,
                '- lower brown floor / wood shadow: neutralized',
                '- pot, moss, root and trunk: protected',
                '- black bottom edge: unchanged'
              ].join('\n'),
              state: 'open', state_reason: 'reopened'
            });
      - name: Fail when public audit is incomplete
        if: always() && (steps.install.outcome != 'success' || steps.wait.outcome != 'success' || steps.material.outcome != 'success' || steps.blackpine.outcome != 'success' || steps.photoreal.outcome != 'success' || steps.files.outcome != 'success')
        run: exit 1
